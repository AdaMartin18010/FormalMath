  # ========== 形式化 ==========
  formalization:
    lean4: |
      def ContinuousAt (f : ℝ → ℝ) (x₀ : ℝ) : Prop :=
        ∀ ε > 0, ∃ δ > 0, ∀ x, |x - x₀| < δ → |f x - f x₀| < ε
      
      def Continuous (f : ℝ → ℝ) : Prop :=
        ∀ x₀, ContinuousAt f x₀
    isabelle: |
      definition continuous_at :: "(real ⇒ real) ⇒ real ⇒ bool"
        where "continuous_at f x₀ ≡ ∀ε>0. ∃δ>0. ∀x. ¦x-x₀¦<δ ⟶ ¦f x-f x₀¦<ε"
    coq: |
      Definition continuous_at (f : R -> R) (x0 : R) : Prop :=
        forall eps : R, eps > 0 ->
        exists delta : R, delta > 0 ->
        forall x : R, Rabs (x - x0) < delta -> Rabs (f x - f x0) < eps.
      
