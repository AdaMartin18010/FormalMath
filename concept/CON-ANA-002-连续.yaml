concept:
  # ========== 标识信息 ==========
  id: "CON-ANA-002"
  name: "连续"
  english_name: "Continuity"
  aliases: ["連続", "Continuous", "连续性"]
  
  # ========== 分类信息 ==========
  msc_primary: "26A15"
  msc_secondary: ["26A03", "54C05"]
  branch: "分析学"
  topic: "实分析"
  difficulty: 2
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      设函数 f: D → ℝ，D ⊆ ℝ，x₀ ∈ D。若对于任意 ε > 0，存在 δ > 0，
      使得当 x ∈ D 且 |x - x₀| < δ 时，有 |f(x) - f(x₀)| < ε，
      则称 f 在 x₀ 处连续。
      
      等价定义：limₓ→ₓ₀ f(x) = f(x₀)
      
      若 f 在 D 的每一点都连续，则称 f 在 D 上连续，记作 f ∈ C(D)。
    intuitive: "连续描述的是函数图像没有断裂、跳跃，可以一笔画出，且自变量微小变化导致因变量也微小变化。"
    
  # ========== 属性 ==========
  properties:
    - property: "局部性"
      notation: "点态连续"
      description: "连续是局部性质"
    - property: "代数运算封闭性"
      notation: "f, g ∈ C ⇒ f±g, fg, f/g ∈ C"
      description: "连续函数的和、差、积、商（分母非零）仍连续"
    - property: "复合保持性"
      notation: "g ∘ f ∈ C"
      description: "连续函数的复合仍连续"
    - property: "介值性"
      notation: "中间值定理"
      description: "闭区间上连续函数取遍两端点间所有值"
      
