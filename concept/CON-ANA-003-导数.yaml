concept:
  # ========== 标识信息 ==========
  id: "CON-ANA-003"
  name: "导数"
  english_name: "Derivative"
  aliases: ["微分", "微商", "Derivative", "Differentiation"]
  
  # ========== 分类信息 ==========
  msc_primary: "26A24"
  msc_secondary: ["26A27", "58C20"]
  branch: "分析学"
  topic: "微分学"
  difficulty: 2
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      设函数 f 在点 x₀ 的某邻域内有定义。若极限
      
      f'(x₀) = lim_{h→0} [f(x₀ + h) - f(x₀)] / h
      
      存在且有限，则称 f 在 x₀ 处可导，该极限值称为 f 在 x₀ 处的导数。
      
      等价定义：f'(x₀) = lim_{x→x₀} [f(x) - f(x₀)] / (x - x₀)
    intuitive: "导数表示函数在某点处的瞬时变化率，几何上对应曲线在该点切线的斜率。"
    
  # ========== 属性 ==========
  properties:
    - property: "线性性"
      notation: "(af + bg)' = af' + bg'"
      description: "导数运算是线性算子"
    - property: "乘积法则"
      notation: "(fg)' = f'g + fg'"
      description: "乘积的导数公式"
    - property: "链式法则"
      notation: "(f ∘ g)' = (f' ∘ g) · g'"
      description: "复合函数求导法则"
    - property: "可导必连续"
      notation: "可导 ⇒ 连续"
      description: "可导函数必连续，反之不成立"
      
  # ========== 关系 ==========
  relationships:
