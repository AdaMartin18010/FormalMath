  # ========== 形式化 ==========
  formalization:
    lean4: |
      def HasDerivAt (f : ℝ → ℝ) (f' : ℝ) (x : ℝ) : Prop :=
        Tendsto (λ h => (f (x + h) - f x) / h) (𝓝[≠] 0) (𝓝 f')
      
      notation "deriv " f " at " x => HasDerivAt f (deriv f x) x
    isabelle: |
      definition has_derivative :: "(real ⇒ real) ⇒ real ⇒ real ⇒ bool"
        where "has_derivative f f' x ≡ 
          (λh. (f (x + h) - f x) / h) ─0→ f'"
    coq: |
      Definition derivable_pt (f : R -> R) (x : R) : Prop :=
        exists l : R, 
        limit (fun h => (f (x + h) - f x) / h) 0 l.
      
