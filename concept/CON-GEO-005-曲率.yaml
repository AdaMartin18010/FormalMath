  # ========== 形式化 ==========
  formalization:
    lean4: |
      -- 曲率张量
      def CurvatureTensor {M : Type*} [RiemannianManifold M n] :
        TensorField M (1, 3) :=
        fun p => fun X Y Z ↦ ∇ₓ(∇ᵧZ) - ∇ᵧ(∇ₓZ) - ∇[ₓ,ᵧ]Z
      
      notation "Riem" => CurvatureTensor
      
      -- 截面曲率
      def SectionalCurvature {M : Type*} [RiemannianManifold M n] 
        {p : M} (σ : Grassmannian 2 (TangentSpace M p)) : ℝ := ...
      
      -- Ricci曲率
      def RicciTensor {M : Type*} [RiemannianManifold M n] :
        TensorField M (0, 2) :=
        fun p X Y => Finset.sum univ (fun i => 
          g p (Riem p (TangentSpace.ι i) X Y) (TangentSpace.ι i))
      
      -- 标量曲率
      def ScalarCurvature {M : Type*} [RiemannianManifold M n] :
        SmoothFunction M ℝ :=
        fun p => Finset.sum univ (fun i => 
          g.inv p (RicciTensor p) (TangentSpace.ι i) (TangentSpace.ι i))
      
      -- Gauss-Bonnet定理
      theorem GaussBonnet {M : Type*} [RiemannianManifold M 2] :
        ∫ p in M, ScalarCurvature p = 2 * π * EulerCharacteristic M := ...
    isabelle: |
      definition riemann_curvature :: "'a::riemannian_manifold ⇒ 
        'a tangent ⇒ 'a tangent ⇒ 'a tangent ⇒ 'a tangent"
        where "riemann_curvature p X Y Z ≡ 
          cov_deriv X (cov_deriv Y Z) - cov_deriv Y (cov_deriv X Z) - 
          cov_deriv (lie_bracket X Y) Z"
      
      definition sectional_curvature :: "'a::riemannian_manifold ⇒ 
        'a tangent ⇒ 'a tangent ⇒ real"
        where "sectional_curvature p X Y ≡ ..."
    coq: |
      Definition curvature_tensor {n} {M: Type} 
        `{RiemannianManifold n M} (p: M) : 
        multilinear_map 4 (tangent_space p) R :=
        fun X Y Z W => ...
      
      Definition ricci_curvature {n} {M: Type}
        `{RiemannianManifold n M} (p: M) :
        bilinear_form (tangent_space p) :=
        fun X Y => trace (fun Z => curvature_tensor p Z X Y).
      
      Definition scalar_curvature {n} {M: Type}
        `{RiemannianManifold n M} (p: M) : R :=
        trace (ricci_curvature p).
      
