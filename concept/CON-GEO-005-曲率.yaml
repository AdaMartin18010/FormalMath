concept:
  # ========== 标识信息 ==========
  id: "CON-GEO-005"
  name: "曲率"
  english_name: "Curvature"
  aliases: ["Curvature", "曲率", "截面曲率", "Ricci曲率", "Scalar曲率"]
  
  # ========== 分类信息 ==========
  msc_primary: "53B21"
  msc_secondary: ["53A04", "53C21"]
  branch: "几何学"
  topic: "黎曼几何"
  difficulty: 5
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      **曲率张量的定义**：设 (M, g) 是黎曼流形，∇ 是Levi-Civita联络。
      
      **Riemann曲率张量**：
      - R(X, Y)Z = ∇ₓ∇ᵧZ - ∇ᵧ∇ₓZ - ∇[ₓ,ᵧ]Z
      
      在坐标下：Rⁱⱼₖₗ = ∂ₖΓⁱⱼₗ - ∂ₗΓⁱⱼₖ + ΓⁱₘₖΓᵐⱼₗ - ΓⁱₘₗΓᵐⱼₖ
      
      **截面曲率**：对于二维平面 σ = span{v, w}，
      - K(σ) = ⟨R(v, w)w, v⟩ / (|v|²|w|² - ⟨v, w⟩²)
      
      **Ricci曲率**：Ric(X, Y) = tr(Z ↦ R(Z, X)Y)，即曲率张量的迹
      
      **标量曲率**：S = tr_g(Ric) = gⁱʲRicᵢⱼ
      
      **高斯曲率**（曲面）：K = det(II) / det(I)，主曲率的乘积
    intuitive: "曲率度量了空间偏离欧氏平面的程度。它描述了几何对象的'弯曲'——正曲率如球面(三角形内角和>180°)，负曲率如马鞍面(三角形内角和<180°)。在广义相对论中，曲率描述了引力场；在几何分析中，曲率流(如Ricci流)用于研究流形的拓扑结构。"
    
  # ========== 属性 ==========
  properties:
    - property: "对称性"
      notation: "Rᵢⱼₖₗ = -Rⱼᵢₖₗ = -Rᵢⱼₗₖ"
      description: "Riemann张量的反对称性"
    - property: "第一Bianchi恒等式"
      notation: "R(X,Y)Z + R(Y,Z)X + R(Z,X)Y = 0"
      description: "曲率张量的代数恒等式"
    - property: "截面曲率决定曲率"
      notation: "K 决定 R"
      description: "截面曲率完全确定Riemann曲率张量"
    - property: "常曲率空间"
      notation: "K = 常数"
      description: "球面、欧氏空间、双曲空间"
      
