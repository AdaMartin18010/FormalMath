  # ========== 定义 ==========
  definition:
    formal: |
      **群的定义**：群是一个有序对 (G, ·)，其中 G 是集合，·: G × G → G 是二元运算，满足：
      
      1. **结合律**：∀a, b, c ∈ G: (a · b) · c = a · (b · c)
      2. **单位元**：∃e ∈ G, ∀a ∈ G: e · a = a · e = a
      3. **逆元**：∀a ∈ G, ∃a⁻¹ ∈ G: a · a⁻¹ = a⁻¹ · a = e
      
      若还满足交换律 ∀a, b ∈ G: a · b = b · a，则称为**阿贝尔群**（或交换群）。
    intuitive: "群是带有可逆运算的代数结构，描述了对称性的数学抽象。群论是现代数学的核心分支，在物理、化学、密码学等领域有广泛应用。"
    
  # ========== 属性 ==========
  properties:
    - property: "阶"
      notation: "|G| 或 #G"
      description: "群的元素个数（可能无限）"
    - property: "交换性"
      notation: "G 是阿贝尔群"
      description: "运算满足交换律"
    - property: "消去律"
      notation: "ab = ac ⇒ b = c"
      description: "群运算满足左右消去律"
    - property: "单位元唯一性"
      notation: "e 唯一"
      description: "群的单位元是唯一的"
    - property: "逆元唯一性"
      notation: "a⁻¹ 唯一"
      description: "每个元素的逆元是唯一的"
      
