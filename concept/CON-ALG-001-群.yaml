  # ========== 标识信息 ==========
  id: "CON-ALG-001"
  name: "群"
  english_name: "Group"
  aliases: ["Group", "抽象群", "群结构", "グループ"]
  
  # ========== 分类信息 ==========
  msc_primary: "20A05"
