  # ========== 形式化 ==========
  formalization:
    lean4: |
      class Group (G : Type*) extends Mul G, One G, Inv G where
        mul_assoc : ∀ a b c : G, (a * b) * c = a * (b * c)
        one_mul : ∀ a : G, 1 * a = a
        mul_one : ∀ a : G, a * 1 = a
        inv_mul_cancel : ∀ a : G, a⁻¹ * a = 1
        mul_inv_cancel : ∀ a : G, a * a⁻¹ = 1
      
      class CommGroup (G : Type*) extends Group G where
        mul_comm : ∀ a b : G, a * b = b * a
    isabelle: |
      locale group =
        fixes G :: "'a set" and mult :: "['a, 'a] ⇒ 'a" (infixl "⊗" 70)
          and one :: 'a ("𝟙") and inv :: "'a ⇒ 'a"
        assumes closed: "⟦x ∈ G; y ∈ G⟧ ⟹ x ⊗ y ∈ G"
          and assoc: "⟦x ∈ G; y ∈ G; z ∈ G⟧ ⟹ (x ⊗ y) ⊗ z = x ⊗ (y ⊗ z)"
          and identity: "x ∈ G ⟹ 𝟙 ⊗ x = x"
          and inverse: "x ∈ G ⟹ inv x ⊗ x = 𝟙"
    coq: |
      Class Group (G : Type) := {
        mult : G -> G -> G;
        one : G;
        inv : G -> G;
        assoc : forall a b c, mult (mult a b) c = mult a (mult b c);
        id_left : forall a, mult one a = a;
        id_right : forall a, mult a one = a;
        inv_left : forall a, mult (inv a) a = one;
        inv_right : forall a, mult a (inv a) = one
      }.
      
