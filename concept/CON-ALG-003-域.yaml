  # ========== 定义 ==========
  definition:
    formal: |
      **域的定义**：域是一个三元组 (F, +, ·)，满足：
      
      1. **(F, +) 是Abel群**，单位元记为 0
      
      2. **(F \\{0\\}, ·) 是Abel群**，单位元记为 1
      
      3. **乘法对加法满足分配律**：
         - a · (b + c) = a · b + a · c
      
      等价定义：域是交换环，且每个非零元素都有乘法逆元。
      
      若乘法不一定交换，则称为**除环**或**体**（如四元数）。
    intuitive: "域是代数结构的精华，在其中可以进行加、减、乘、除（除数非零）四则运算。有理数、实数、复数都是域的典型例子。域论是代数几何、数论和编码理论的基础。"
    
  # ========== 属性 ==========
  properties:
    - property: "无零因子"
      notation: "ab = 0 ⇒ a = 0 或 b = 0"
      description: "域是整环"
    - property: "特征"
      notation: "char(F) = p 或 0"
      description: "最小的正整数 p 使得 p·1 = 0，或0表示无此性质"
    - property: "素域"
      notation: "ℚ 或 𝔽ₚ"
      description: "最小的子域，同构于ℚ或𝔽ₚ"
    - property: "代数封闭性"
      notation: "代数闭域"
      description: "每个多项式都有根（如ℂ）"
      
