  # ========== 形式化 ==========
  formalization:
    lean4: |
      class Field (F : Type*) extends CommRing F, DivInvMonoid F where
        -- 非零元构成乘法群
        mul_inv_cancel : ∀ a : F, a ≠ 0 → a * a⁻¹ = 1
        inv_zero : (0 : F)⁻¹ = 0
      
      -- 域的基本性质
      theorem Field.mul_ne_zero {F : Type*} [Field F] {a b : F} 
        (ha : a ≠ 0) (hb : b ≠ 0) : a * b ≠ 0 := by
        intro h
        apply ha
        rw [← mul_one a, ← mul_inv_cancel b hb, ← mul_assoc, h, zero_mul]
    isabelle: |
      locale field = ring R add mult zero minus uminus + 
        comm_monoid R mult one
        for R :: "'a set" and add :: "['a, 'a] ⇒ 'a" 
        and mult :: "['a, 'a] ⇒ 'a" and zero :: 'a 
        and minus :: "['a, 'a] ⇒ 'a" and uminus :: "'a ⇒ 'a" 
        and one :: 'a +
        assumes field_Units: "Units R = R - {𝟬}"
    coq: |
      Class Field (F : Type) := {
        field_ring :> Ring F;
        field_mul_comm : forall a b, mul a b = mul b a;
        field_inv : forall a, a <> zero -> exists b, mul a b = one;
        field_nonzero : zero <> one
      }.
      
