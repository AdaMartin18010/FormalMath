  # ========== 定义 ==========
  definition:
    formal: |
      **环的定义**：环是一个三元组 (R, +, ·)，其中 R 是集合，+ 和 · 是 R 上的二元运算，满足：
      
      1. **(R, +) 是阿贝尔群**：
         - 结合律、交换律
         - 存在零元 0
         - 每个元素有加法逆元
      
      2. **(R, ·) 是半群**：
         - 乘法结合律
      
      3. **分配律**：
         - a · (b + c) = a · b + a · c
         - (a + b) · c = a · c + b · c
      
      若存在乘法单位元 1 且 1 ≠ 0，称为**含幺环**。
      若乘法交换，称为**交换环**。
    intuitive: "环是具有两种运算（加法和乘法）的代数结构，推广了整数、多项式、矩阵等对象的代数性质。环论是代数学的基石。"
    
  # ========== 属性 ==========
  properties:
    - property: "零元性质"
      notation: "0 · a = a · 0 = 0"
      description: "零元与任何元素相乘得零"
    - property: "负元性质"
      notation: "(-a) · b = -(a · b)"
      description: "负元的乘法性质"
    - property: "子环"
      notation: "S ⊆ R 子环"
      description: "对运算封闭的子集"
    - property: "理想"
      notation: "I ⊆ R 理想"
      description: "类似于正规子群的概念"
      
