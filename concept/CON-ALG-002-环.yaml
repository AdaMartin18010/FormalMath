  # ========== 形式化 ==========
  formalization:
    lean4: |
      class Ring (R : Type*) extends Add R, Mul R, Neg R, Zero R where
        -- 加法Abel群
        add_assoc : ∀ a b c : R, (a + b) + c = a + (b + c)
        add_comm : ∀ a b : R, a + b = b + a
        zero_add : ∀ a : R, 0 + a = a
        add_zero : ∀ a : R, a + 0 = a
        add_left_neg : ∀ a : R, -a + a = 0
        -- 乘法半群
        mul_assoc : ∀ a b c : R, (a * b) * c = a * (b * c)
        -- 分配律
        left_distrib : ∀ a b c : R, a * (b + c) = a * b + a * c
        right_distrib : ∀ a b c : R, (a + b) * c = a * c + b * c
      
      class CommRing (R : Type*) extends Ring R where
        mul_comm : ∀ a b : R, a * b = b * a
    isabelle: |
      locale ring = abelian_group R add zero minus uminus + monoid R mult one
        for R :: "'a set" and add :: "['a, 'a] ⇒ 'a" (infixl "⊕" 65)
        and mult :: "['a, 'a] ⇒ 'a" (infixl "⊗" 70)
        and zero :: 'a ("𝟬") and one :: 'a ("𝟭")
        and minus :: "['a, 'a] ⇒ 'a" (infixl "⊖" 65)
        and uminus :: "'a ⇒ 'a" ("⊟ _" [81] 80) +
        assumes l_distr: "⟦x ∈ R; y ∈ R; z ∈ R⟧ ⟹ (x ⊕ y) ⊗ z = x ⊗ z ⊕ y ⊗ z"
          and r_distr: "⟦x ∈ R; y ∈ R; z ∈ R⟧ ⟹ z ⊗ (x ⊕ y) = z ⊗ x ⊕ z ⊗ y"
    coq: |
      Class Ring (R : Type) := {
        -- 加法结构
        ring_add :> AbelianGroup R;
        -- 乘法结构
        ring_mul :> Monoid R;
        -- 分配律
        distrib_left : forall a b c, mul a (add b c) = add (mul a b) (mul a c);
        distrib_right : forall a b c, mul (add a b) c = add (mul a c) (mul b c)
      }.
      
