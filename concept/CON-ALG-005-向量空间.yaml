  # ========== 定义 ==========
  definition:
    formal: |
      **向量空间的定义**：设 F 是域，V 是非空集合。若 V 上有加法运算 + 和数乘运算 ·: F × V → V，满足：
      
      **(V, +) 是Abel群**：
      1. 结合律：u + (v + w) = (u + v) + w
      2. 交换律：u + v = v + u
      3. 零元：∃0 ∈ V, ∀v ∈ V: 0 + v = v
      4. 负元：∀v ∈ V, ∃(-v) ∈ V: v + (-v) = 0
      
      **数乘性质**：
      5. 分配律：a · (u + v) = a·u + a·v
      6. 分配律：(a + b) · v = a·v + b·v
      7. 结合律：(ab) · v = a · (b·v)
      8. 单位元：1 · v = v
      
      则称 V 为 F 上的**向量空间**（或线性空间）。
    intuitive: "向量空间是线性代数的核心概念，推广了平面和空间中向量的代数性质。它提供了研究线性方程组、线性变换、特征值等问题的抽象框架，在物理、工程和计算机科学中有广泛应用。"
    
