  # ========== 形式化 ==========
  formalization:
    lean4: |
      class VectorSpace (F : Type*) [Field F] (V : Type*) extends AddCommGroup V where
        smul : F → V → V
        -- 分配律
        smul_add : ∀ (a : F) (u v : V), a • (u + v) = a • u + a • v
        add_smul : ∀ (a b : F) (v : V), (a + b) • v = a • v + b • v
        -- 结合律
        mul_smul : ∀ (a b : F) (v : V), (a * b) • v = a • (b • v)
        -- 单位元
        one_smul : ∀ v : V, (1 : F) • v = v
      
      -- 有限维向量空间
      structure FiniteDimVectorSpace (F : Type*) [Field F] (n : ℕ) where
        carrier : Type*
        is_vector_space : VectorSpace F carrier
        dim_eq : FiniteDimensional.finrank F carrier = n
    isabelle: |
      locale vector_space =
        fixes scale :: "['a::field, 'b::ab_group_add] ⇒ 'b" (infixr "*s" 75)
        assumes scale_right_distrib: "a *s (x + y) = a *s x + a *s y"
          and scale_left_distrib: "(a + b) *s x = a *s x + b *s x"
          and scale_scale: "a *s (b *s x) = (a * b) *s x"
          and scale_one: "1 *s x = x"
    coq: |
      Class VectorSpace (F : Type) (V : Type) `{Field F} `{AbelianGroup V} := {
        vsmul : F -> V -> V;
        vsmul_add_distr : forall a u v,
          vsmul a (add u v) = add (vsmul a u) (vsmul a v);
        vsmul_add : forall a b v,
          vsmul (add a b) v = add (vsmul a v) (vsmul b v);
        vsmul_mul : forall a b v,
          vsmul (mul a b) v = vsmul a (vsmul b v);
        vsmul_one : forall v, vsmul one v = v
      }.
      
