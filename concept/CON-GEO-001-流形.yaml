  # ========== 形式化 ==========
  formalization:
    lean4: |
      -- 光滑图册
      structure SmoothAtlas (M : Type*) [TopologicalSpace M] (n : ℕ) where
        charts : Set (LocalHomeomorph M (EuclideanSpace ℝ (Fin n)))
        covers : ⋃ c ∈ charts, c.source = Set.univ
        smooth_transitions : ∀ c₁ ∈ charts, ∀ c₂ ∈ charts,
          ContDiffOn ℝ ∞ (c₂ ∘ c₁.symm) (c₁.symm ⁻¹' c₂.source)
      
      -- 微分流形结构
      class SmoothManifold (M : Type*) (n : ℕ) where
        toTopologicalSpace : TopologicalSpace M
        isHausdorff : T2Space M
        isSecondCountable : SecondCountableTopology M
        atlas : SmoothAtlas M n
    isabelle: |
      locale manifold =
        fixes charts :: "('a::topological_space, 'b::euclidean_space) chart set"
        assumes chart_euclidean: "∀c ∈ charts. domain c ⊆ UNIV"
          and chart_pairwise_compat: "∀c1 ∈ charts. ∀c2 ∈ charts. 
            k-smooth_compat c1 c2"
          and chart_cover: "(⋃c∈charts. domain c) = UNIV"
    coq: |
      Record atlas {n: nat} (M: Type) : Type := {
        chart:> Type;
        domain: chart -> M -> Prop;
        map: forall c, domain c -> R^n;
        map_inv: forall c, R^n -> M;
        smooth_transition: forall c1 c2, 
          forall x, domain c1 x -> domain c2 x ->
          smooth (map c2 ∘ map_inv c1)
      }.
      
      Class Manifold (n: nat) (M: Type) := {
        atlas_M :> atlas n M;
        hausdorff :> Hausdorff M;
        second_countable :> SecondCountable M
      }.
      
