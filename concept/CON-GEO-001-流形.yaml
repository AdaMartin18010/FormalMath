concept:
  # ========== 标识信息 ==========
  id: "CON-GEO-001"
  name: "流形"
  english_name: "Manifold"
  aliases: ["Manifold", "多様体", "微分流形", "Differentiable Manifold"]
  
  # ========== 分类信息 ==========
  msc_primary: "57N99"
  msc_secondary: ["53A99", "58A05"]
  branch: "几何学"
  topic: "微分几何"
  difficulty: 4
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      **拓扑流形**：Hausdorff拓扑空间 M 称为 **n维拓扑流形**，若：
      1. **局部欧氏性**：∀ p ∈ M，存在 p 的邻域 U 和同胚 φ: U → V，
         其中 V ⊆ ℝⁿ 是开集
      2. **第二可数性**：M 具有可数基
      
      **微分流形**：拓扑流形 M 配备**光滑图册** {(Uₐ, φₐ)}ₐ∈ₐ，满足：
      1. **覆盖性**：∪ₐ Uₐ = M
      2. **光滑相容性**：∀ α, β，转移映射 φᵦ ∘ φₐ⁻¹ 是光滑的（C^∞）
      
      **光滑函数**：f: M → ℝ 光滑，若 ∀ (U, φ)，f ∘ φ⁻¹ 是光滑的。
    intuitive: "流形是局部看起来像欧氏空间的拓扑空间，是曲线和曲面的高维推广。微分流形是现代几何学和物理学的核心舞台——广义相对论在四维时空流形上展开，规范场论在纤维丛上建立。流形理论统一了分析、几何和拓扑。"
    
  # ========== 属性 ==========
  properties:
