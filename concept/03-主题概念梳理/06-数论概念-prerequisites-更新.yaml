# Wikipedia对齐 - 数论概念前置条件更新
# 创建日期: 2026-04-04
# 版本: 1.0

metadata:
  title: "数论概念前置条件配置'
  description: "与Wikipedia结构对齐的数论概念前置条件"
  source: 'Wikipedia Mathematics"
  last_updated: "2026-04-04'

# 核心概念定义
concepts:
  # 初等数论
  elementary_number_theory:
    id: "NT-001"
    name: '初等数论"
    name_en: "Elementary Number Theory'
    category: "number_theory"
    prerequisites: []
    core_concepts:
      - id: 'NT-001-01"
        name: "整除'
        name_en: "Divisibility"
        definition: 'a|b当且仅当存在整数c使得b=ac"
        wiki_ref: "https://en.wikipedia.org/wiki/Divisibility_rule'
      
      - id: "NT-001-02"
        name: '最大公约数"
        name_en: "Greatest Common Divisor'
        symbol: "gcd(a,b)"
        definition: 'gcd(a,b)=max{d∈Z+:d|a且d|b}"
        algorithms:
          - 欧几里得算法
          - 扩展欧几里得算法
        wiki_ref: "https://en.wikipedia.org/wiki/Greatest_common_divisor'
      
      - id: "NT-001-03"
        name: '同余"
        name_en: "Congruence'
        symbol: "a≡b(mod m)"
        definition: 'm|(a-b)"
        wiki_ref: "https://en.wikipedia.org/wiki/Modular_arithmetic'
        formalmath_ref: "C.CORE.027"
      
      - id: 'NT-001-04"
        name: "素数'
        name_en: "Prime Number"
        definition: '大于1的整数，其正因子只有1和自身"
        wiki_ref: "https://en.wikipedia.org/wiki/Prime_number'
        formalmath_ref: "C.CORE.026"

  # 解析数论
  analytic_number_theory:
    id: 'NT-002"
    name: "解析数论'
    name_en: "Analytic Number Theory"
    category: 'number_theory"
    prerequisites:
      - 复分析基础
      - 级数理论
      - 初等数论
    core_concepts:
      - id: "NT-002-01'
        name: "黎曼ζ函数"
        name_en: 'Riemann Zeta Function"
        symbol: "ζ(s)'
        definition: "ζ(s)=Σ(1/n^s)，Re(s)>1"
        wiki_ref: 'https://en.wikipedia.org/wiki/Riemann_zeta_function"
        formalmath_ref: "C.CORE.028'
      
      - id: "NT-002-02"
        name: '素数定理"
        name_en: "Prime Number Theorem'
        symbol: "π(x)~x/ln(x)"
        wiki_ref: 'https://en.wikipedia.org/wiki/Prime_number_theorem"
      
      - id: "NT-002-03'
        name: "黎曼假设"
        name_en: 'Riemann Hypothesis"
        statement: "ζ(s)的所有非平凡零点都在Re(s)=1/2上'
        wiki_ref: "https://en.wikipedia.org/wiki/Riemann_hypothesis"
      
      - id: 'NT-002-04"
        name: "Dirichlet L函数'
        name_en: "Dirichlet L-function"
        symbol: 'L(s,χ)"
        wiki_ref: "https://en.wikipedia.org/wiki/Dirichlet_L-function'

  # 代数数论
  algebraic_number_theory:
    id: "NT-003"
    name: '代数数论"
    name_en: "Algebraic Number Theory'
    category: "number_theory"
    prerequisites:
      - 抽象代数
      - Galois理论
      - 线性代数
    core_concepts:
      - id: 'NT-003-01"
        name: "代数整数'
        name_en: "Algebraic Integer"
        definition: '首一整数系数多项式的根"
        wiki_ref: "https://en.wikipedia.org/wiki/Algebraic_integer'
      
      - id: "NT-003-02"
        name: '代数数域"
        name_en: "Algebraic Number Field'
        definition: "Q的有限扩张"
        wiki_ref: 'https://en.wikipedia.org/wiki/Algebraic_number_field"
      
      - id: "NT-003-03'
        name: "整数环"
        name_en: 'Ring of Integers"
        symbol: "O_K'
        wiki_ref: "https://en.wikipedia.org/wiki/Ring_of_integers"
      
      - id: 'NT-003-04"
        name: "理想类群'
        name_en: "Ideal Class Group"
        wiki_ref: 'https://en.wikipedia.org/wiki/Ideal_class_group"
      
      - id: "NT-003-05'
        name: "类域论"
        name_en: 'Class Field Theory"
        wiki_ref: "https://en.wikipedia.org/wiki/Class_field_theory'
      
      - id: "NT-003-06"
        name: 'Dirichlet单位定理"
        name_en: "Dirichlet's Unit Theorem'
        wiki_ref: "https://en.wikipedia.org/wiki/Dirichlet%27s_unit_theorem"

  # 待补充概念
  missing_concepts:
    high_priority:
      - id: 'NT-004-01"
        name: "模形式'
        name_en: "Modular Forms"
        wiki_ref: 'https://en.wikipedia.org/wiki/Modular_form"
        status: "missing'
      
      - id: "NT-004-02"
        name: '椭圆曲线"
        name_en: "Elliptic Curves'
        wiki_ref: "https://en.wikipedia.org/wiki/Elliptic_curve"
        status: 'missing"
      
      - id: "NT-004-03'
        name: "Pell方程"
        name_en: 'Pell's Equation"
        wiki_ref: "https://en.wikipedia.org/wiki/Pell%27s_equation'
        status: "missing"

