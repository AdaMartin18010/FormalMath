concept:
  # ========== 标识信息 ==========
  id: "CON-TOP-004"
  name: "连通性"
  english_name: "Connectedness"
  aliases: ["连通", "連結", "Connected", "Zusammenhang"]
  
  # ========== 分类信息 ==========
  msc_primary: "54D05"
  msc_secondary: ["54A99", "54F15"]
  branch: "拓扑学"
  topic: "一般拓扑学"
  difficulty: 2
  importance: 4
  
  # ========== 定义 ==========
  definition:
    formal: |
      **连通性的定义**：设 (X, τ) 是拓扑空间。
      
      **不连通**：若存在非空开集 U, V 使得：
      - X = U ∪ V
      - U ∩ V = ∅
      
      则称 X 是**不连通的**（或可分离的）。
      
      **连通**：若 X 不是不连通的，则称 X 是**连通的**。
      
      **等价刻画**：
      - X 中既开又闭的子集只有 ∅ 和 X
      - 任意连续映射 f: X → {0, 1}（离散拓扑）是常值的
      
      **道路连通**：若 ∀ x, y ∈ X，存在连续映射 γ: [0,1] → X 
      使得 γ(0) = x, γ(1) = y。
    intuitive: "连通性描述了空间的'整体性'——空间是否由多块分离的部分组成。连通空间不能被分割成两个非空的开集，类似于实数轴的连续性。道路连通是更强的条件，要求任意两点可以被'路径'连接。"
    
  # ========== 属性 ==========
  properties:
    - property: "连续像保持"
      notation: "f(X) 连通"
      description: "连通空间的连续像是连通的"
    - property: "闭包保持"
      notation: "Ā 连通"
      description: "连通集的闭包仍连通"
    - property: "积空间"
      notation: "X × Y 连通"
      description: "连通空间的积仍连通"
    - property: "连通分支"
      notation: "连通分支"
      description: "最大的连通子集"
      
