  # ========== 形式化 ==========
  formalization:
    lean4: |
      def IsConnected [TopologicalSpace X] (s : Set X) : Prop :=
        ∀ u v : Set X, IsOpen u → IsOpen v → s ⊆ u ∪ v → 
        (s ∩ u) ∩ (s ∩ v) = ∅ → s ⊆ u ∨ s ⊆ v
      
      -- 等价定义
      def IsConnected' [TopologicalSpace X] (s : Set X) : Prop :=
        ∀ t : Set X, t ⊆ s → IsOpen t → IsClosed t → 
        t = ∅ ∨ t = s
      
      def IsPathConnected [TopologicalSpace X] (s : Set X) : Prop :=
        ∀ x ∈ s, ∀ y ∈ s, ∃ γ : I → X, Continuous γ ∧ 
        γ 0 = x ∧ γ 1 = y ∧ ∀ t, γ t ∈ s
      
      class ConnectedSpace (X : Type*) [TopologicalSpace X] : Prop where
        isConnected_univ : IsConnected (Set.univ : Set X)
    isabelle: |
      definition connected :: "'a::topological_space set ⇒ bool"
        where "connected s ≡ ¬(∃A B. open A ∧ open B ∧ 
          s ⊆ A ∪ B ∧ A ∩ B ∩ s = {} ∧ A ∩ s ≠ {} ∧ B ∩ s ≠ {})"
      
      class connected_space = topological_space +
        assumes connected_univ: "connected UNIV"
    coq: |
      Definition connected {X : Type} `{TopologicalSpace X}
        (A : X -> Prop) : Prop :=
        forall U V : X -> Prop,
        open_set U -> open_set V ->
        (forall x, A x -> U x \/ V x) ->
        (forall x, A x -> U x -> V x -> False) ->
        (forall x, A x -> U x) \/ (forall x, A x -> V x).
      
