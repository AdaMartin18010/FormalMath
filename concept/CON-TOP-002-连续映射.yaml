  # ========== 形式化 ==========
  formalization:
    lean4: |
      def Continuous [TopologicalSpace X] [TopologicalSpace Y] 
        (f : X → Y) : Prop :=
        ∀ s, IsOpen s → IsOpen (f ⁻¹' s)
      
      -- 在一点连续
      def ContinuousAt [TopologicalSpace X] [TopologicalSpace Y] 
        (f : X → Y) (x : X) : Prop :=
        ∀ s ∈ 𝓝 (f x), f ⁻¹' s ∈ 𝓝 x
    isabelle: |
      definition continuous :: "('a::topological_space ⇒ 'b::topological_space) ⇒ bool"
        where "continuous f ≡ ∀s. open s ⟶ open (f -` s)"
      
      definition continuous_at :: "('a::topological_space ⇒ 'b::topological_space) 
        ⇒ 'a ⇒ bool"
        where "continuous_at f x ≡ ∀s. open s ⟶ f x ∈ s 
          ⟶ (∃t. open t ∧ x ∈ t ∧ f ` t ⊆ s)"
    coq: |
      Definition continuous {X Y : Type} 
        `{TopologicalSpace X} `{TopologicalSpace Y} 
        (f : X -> Y) : Prop :=
        forall V : Y -> Prop, open_set V -> open_set (fun x => V (f x)).
      
      Definition continuous_at {X Y : Type}
        `{TopologicalSpace X} `{TopologicalSpace Y}
        (f : X -> Y) (x : X) : Prop :=
        forall V : Y -> Prop, open_set V -> V (f x) ->
        exists U : X -> Prop, open_set U /\ U x /\ 
          (forall x', U x' -> V (f x')).
      
