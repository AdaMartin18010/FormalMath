  # ========== 形式化 ==========
  formalization:
    lean4: |
      -- 切向量作为导子
      structure TangentVector (M : Type*) [SmoothManifold M n] (p : M) where
        toFun : (SmoothFunction M ℝ) → ℝ
        linear : IsLinearMap ℝ toFun
        leibniz : ∀ (f g : SmoothFunction M ℝ),
          toFun (f * g) = toFun f * g p + f p * toFun g
      
      -- 切空间
      def TangentSpace (M : Type*) [SmoothManifold M n] (p : M) : Type* :=
        TangentVector M p
      
      notation "T_" p " M" => TangentSpace M p
      
      instance : AddCommGroup (TangentSpace M p) := ...
      instance : Module ℝ (TangentSpace M p) := ...
    isabelle: |
      typedef (overloaded) 'a tangent = 
        "{v::('a::manifold ⇒ real) ⇒ real. 
          linear v ∧ (∀f g. v (λx. f x * g x) = v f * g arbitrary + f arbitrary * v g)}"
      
      definition tangent_space :: "'a::manifold ⇒ 'a tangent set"
        where "tangent_space p ≡ {v. ∀f. smooth f ⟶ v f = 0}"
    coq: |
      Definition derivation {M: Type} `{Manifold n M} (p: M) :=
        {v : smooth_function M -> R |
          (forall f g, v (f + g) = v f + v g) /\
          (forall c f, v (c * f) = c * v f) /\
          (forall f g, v (f * g) = v f * g p + f p * v g)}.
      
      Definition tangent_space {M: Type} `{Manifold n M} (p: M) :=
        derivation p.
      
