concept:
  # ========== 标识信息 ==========
  id: "CON-GEO-002"
  name: "切空间"
  english_name: "Tangent Space"
  aliases: ["Tangent Space", "接空間", "切平面", "切向量"]
  
  # ========== 分类信息 ==========
  msc_primary: "53B21"
  msc_secondary: ["58A05", "53A99"]
  branch: "几何学"
  topic: "微分几何"
  difficulty: 4
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      **几何定义**：设 M 是 n 维光滑流形，p ∈ M。
      
      **光滑曲线**：γ: (-ε, ε) → M，γ(0) = p
      
      **切向量等价类**：两条曲线 γ₁, γ₂ 在 p 点**相切**，若对某个（从而任意）
      坐标卡 (U, φ)，有 (φ ∘ γ₁)'(0) = (φ ∘ γ₂)'(0)。
      
      **切空间**：TₚM = { 过 p 的光滑曲线相切类 }
      
      **导子定义**：切向量也可定义为满足莱布尼茨法则的导子：
      - v: C^∞(M) → ℝ 是线性的
      - v(fg) = v(f)g(p) + f(p)v(g)
      
      TₚM 构成 n 维实向量空间。
    intuitive: "切空间是流形在某一点的'最佳线性近似'，推广了曲面的切平面概念。它是将流形局部线性化的工具，使得我们可以在弯曲空间上进行微积分运算。切丛（所有切空间的并）是向量场和微分方程的舞台。"
    
  # ========== 属性 ==========
  properties:
    - property: "维数"
      notation: "dim(TₚM) = dim(M)"
      description: "切空间维数等于流形维数"
    - property: "向量空间结构"
      notation: "TₚM ≅ ℝⁿ"
      description: "切空间是n维实向量空间"
    - property: "自然同构"
      notation: "dφₚ: TₚM → ℝⁿ"
      description: "坐标卡诱导的同构"
    - property: "微分映射"
      notation: "dfₚ: TₚM → T_{f(p)}N"
      description: "光滑映射诱导的切空间映射"
      
