  # ========== 形式化 ==========
  formalization:
    lean4: |
      structure Homeomorphism (X Y : Type*) [TopologicalSpace X] 
        [TopologicalSpace Y] extends X ≃ Y where
        continuous_toFun : Continuous toFun
        continuous_invFun : Continuous invFun
      
      infixl:25 " ≃ₜ " => Homeomorphism
      
      def IsHomeomorph [TopologicalSpace X] [TopologicalSpace Y] 
        (f : X → Y) : Prop :=
        ∃ h : X ≃ₜ Y, h = f
    isabelle: |
      definition homeomorphic :: "'a::topological_space set 
        ⇒ 'b::topological_space set ⇒ bool" (infixr "homeomorphic" 60)
        where "s homeomorphic t ≡ ∃f g. homeomorphism s t f g"
      
      definition homeomorphism :: "'a set ⇒ 'b set ⇒ ('a ⇒ 'b) 
        ⇒ ('b ⇒ 'a) ⇒ bool"
        where "homeomorphism s t f g ≡ (∀x∈s. g(f x) = x) ∧ 
          (∀y∈t. f(g y) = y) ∧ continuous_on f s ∧ 
          f ` s ⊆ t ∧ continuous_on g t ∧ g ` t ⊆ s"
    coq: |
      Definition homeomorphism {X Y : Type}
        `{TopologicalSpace X} `{TopologicalSpace Y}
        (f : X -> Y) (g : Y -> X) : Prop :=
        (forall x, g (f x) = x) /\
        (forall y, f (g y) = y) /\
        continuous f /\
        continuous g.
      
      Definition homeomorphic {X Y : Type}
        `{TopologicalSpace X} `{TopologicalSpace Y} : Prop :=
        exists f : X -> Y, exists g : Y -> X,
        homeomorphism f g.
      
