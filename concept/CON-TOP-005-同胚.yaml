concept:
  # ========== 标识信息 ==========
  id: "CON-TOP-005"
  name: "同胚"
  english_name: "Homeomorphism"
  aliases: ["同胚", "同相", "Homeomorphism", "Homeomorphie", "位相同型"]
  
  # ========== 分类信息 ==========
  msc_primary: "54C10"
  msc_secondary: ["54A10", "57N99"]
  branch: "拓扑学"
  topic: "一般拓扑学"
  difficulty: 2
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      **同胚的定义**：设 (X, τₓ) 和 (Y, τᵧ) 是拓扑空间，f: X → Y 是映射。若 f 满足：
      
      1. **双射**：f 是一一对应
      2. **连续**：f 是连续映射
      3. **逆映射连续**：f⁻¹: Y → X 也是连续映射
      
      则称 f 是**同胚映射**（或拓扑同构）。
      
      若存在同胚 f: X → Y，则称 X 和 Y **同胚**，记作 X ≅ Y。
      
      **等价条件**：
      - f 是双射且 f 和 f⁻¹ 都是连续开映射
      - f 是双射且将开集双射地映射到开集
    intuitive: "同胚是拓扑学中的等价关系，类似于代数学中的同构。同胚的空间具有完全相同的拓扑性质——连通性、紧致性、分离性等。拓扑学的基本问题之一就是判断两个空间是否同胚，这也是庞加莱猜想的核心内容。"
    
  # ========== 属性 ==========
  properties:
    - property: "等价关系"
      notation: "X ≅ Y"
      description: "同胚是拓扑空间上的等价关系"
    - property: "拓扑不变量保持"
      notation: "P(X) = P(Y)"
      description: "同胚空间具有相同的拓扑不变量"
    - property: "可逆性"
      notation: "(f⁻¹)⁻¹ = f"
      description: "同胚的逆也是同胚"
    - property: "复合保持"
      notation: "g ∘ f 同胚"
      description: "同胚的复合仍同胚"
      
