  # ========== 形式化 ==========
  formalization:
    lean4: |
      def IsCompact [TopologicalSpace X] (s : Set X) : Prop :=
        ∀ ⦃f⦄, f ≤ 𝓟 s → f ≠ ⊥ → ∃ x ∈ s, ClusterPt x f
      
      -- 开覆盖定义
      def IsCompact' [TopologicalSpace X] (s : Set X) : Prop :=
        ∀ (ι : Type _) (U : ι → Set X), 
        s ⊆ ⋃ i, U i → (∀ i, IsOpen (U i)) →
        ∃ t : Finset ι, s ⊆ ⋃ i ∈ t, U i
      
      class CompactSpace (X : Type*) [TopologicalSpace X] : Prop where
        isCompact_univ : IsCompact (Set.univ : Set X)
    isabelle: |
      definition compact :: "'a::topological_space set ⇒ bool"
        where "compact s ≡ ∀C. (∀c∈C. open c) ∧ s ⊆ ⋃C ⟶ 
          (∃D⊆C. finite D ∧ s ⊆ ⋃D)"
      
      class compact_space = topological_space +
        assumes compact_univ: "compact UNIV"
    coq: |
      Definition compact {X : Type} `{TopologicalSpace X} 
        (A : X -> Prop) : Prop :=
        forall U : (X -> Prop) -> Prop,
        (forall V, U V -> open_set V) ->
        (forall x, A x -> exists V, U V /\ V x) ->
        exists U', (forall V, U' V -> U V) /\
          (exists L, forall V, U' V -> In V L) /\
          forall x, A x -> exists V, U' V /\ V x.
      
