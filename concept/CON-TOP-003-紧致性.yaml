  # ========== 定义 ==========
  definition:
    formal: |
      **紧致性的定义**：设 (X, τ) 是拓扑空间。若满足以下等价条件之一：
      
      1. **开覆盖定义**：
         - X 的任意开覆盖有有限子覆盖
         - 即 ∀ {Uᵢ}ᵢ∈ᵢ ⊆ τ, X = ∪ᵢ∈ᵢ Uᵢ ⇒ ∃有限 J ⊆ I, X = ∪ⱼ∈ᴶ Uⱼ
      
      2. **有限交性质定义**：
         - 具有有限交性质的闭集族有非空交
      
      3. **网收敛定义**（Hausdorff空间）：
         - X 中任意网有收敛子网
      
      4. **序列紧致**（可度量化空间）：
         - X 中任意序列有收敛子列
      
      若子集 K ⊆ X 作为子空间是紧的，则称 K 是 X 的**紧子集**。
    intuitive: "紧致性是拓扑空间最重要的性质之一，推广了有限集和闭区间的优良性质。紧空间具有极值可达性、一致连续性等分析学中至关重要的性质。Heine-Borel定理指出：ℝⁿ的子集紧致当且仅当它是有界闭集。"
    
  # ========== 属性 ==========
  properties:
