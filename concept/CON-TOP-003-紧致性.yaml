      description: "紧集的连续像是紧的"
    - property: "Tychonoff定理"
      notation: "紧空间的积紧致"
      description: "任意多个紧空间的积空间紧致"
    - property: "极值定理"
      notation: "f(K) 有最值"
      description: "紧集上连续实函数达到最值"
      
