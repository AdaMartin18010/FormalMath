  # ========== 形式化 ==========
  formalization:
    lean4: |
      def Tendsto (f : ℕ → ℝ) (L : ℝ) : Prop :=
        ∀ ε > 0, ∃ N, ∀ n ≥ N, |f n - L| < ε
      
      notation "lim " f " = " L => Tendsto f L
    isabelle: |
      definition tendsto :: "(nat ⇒ real) ⇒ real ⇒ bool"
        where "tendsto f L ≡ ∀ε>0. ∃N. ∀n≥N. ¦f n - L¦ < ε"
    coq: |
      Definition limit (f : nat -> R) (L : R) : Prop :=
        forall eps : R, eps > 0 ->
        exists N : nat, forall n : nat,
        (n >= N)%nat -> Rabs (f n - L) < eps.
      
