concept:
  # ========== 标识信息 ==========
  id: "CON-ANA-001"
  name: "极限"
  english_name: "Limit"
  aliases: ["極限", "Limit", "收敛", "Convergence"]
  
  # ========== 分类信息 ==========
  msc_primary: "26A03"
  msc_secondary: ["40A05", "26-01"]
  branch: "分析学"
  topic: "实分析"
  difficulty: 1
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      设 {xₙ} 为数列，L ∈ ℝ。若对于任意 ε > 0，存在正整数 N，使得当 n > N 时，
      有 |xₙ - L| < ε，则称数列 {xₙ} 收敛于 L，记作 limₙ→∞ xₙ = L。
      
      对于函数极限：设函数 f 在点 a 的某去心邻域内有定义，L ∈ ℝ。若对于任意 ε > 0，
      存在 δ > 0，使得当 0 < |x - a| < δ 时，有 |f(x) - L| < ε，
      则称 limₓ→ₐ f(x) = L。
    intuitive: "极限描述的是一个变量无限接近某个确定值的过程，是微积分的理论基础。"
    
  # ========== 属性 ==========
  properties:
    - property: "唯一性"
      notation: "lim xₙ = L 唯一"
      description: "若极限存在，则必唯一"
    - property: "有界性"
      notation: "收敛 ⇒ 有界"
      description: "收敛数列必有界"
    - property: "保号性"
      notation: "xₙ ≥ 0 ⇒ lim xₙ ≥ 0"
      description: "非负数列的极限非负"
    - property: "夹逼性"
      notation: "夹逼定理"
      description: "若 aₙ ≤ bₙ ≤ cₙ 且 lim aₙ = lim cₙ = L，则 lim bₙ = L"
      
