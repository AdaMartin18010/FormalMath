concept:
  # ========== 标识信息 ==========
  id: "CON-TOP-001"
  name: "拓扑空间"
  english_name: "Topological Space"
  aliases: ["Topological Space", "位相空間", "Topology", "位相"]
  
  # ========== 分类信息 ==========
  msc_primary: "54A05"
  msc_secondary: ["54-01", "54B99"]
  branch: "拓扑学"
  topic: "一般拓扑学"
  difficulty: 2
  importance: 5
  
  # ========== 定义 ==========
  definition:
    formal: |
      **拓扑空间的定义**：设 X 是非空集合，τ ⊆ P(X) 是 X 的子集族。若 τ 满足：
      
      1. **空集和全集属于τ**：
         - ∅ ∈ τ, X ∈ τ
      
      2. **任意并封闭**：
         - 若 {Uᵢ}ᵢ∈ᵢ ⊆ τ，则 ∪ᵢ∈ᵢ Uᵢ ∈ τ
      
      3. **有限交封闭**：
         - 若 U₁, U₂, ..., Uₙ ∈ τ，则 ∩ᵢ₌₁ⁿ Uᵢ ∈ τ
      
      则称 (X, τ) 为**拓扑空间**，τ 称为 X 上的**拓扑**，τ 中的元素称为**开集**。
      
      **邻域**：若 N ⊆ X 且存在开集 U 使得 x ∈ U ⊆ N，则称 N 为 x 的邻域。
    intuitive: "拓扑空间是研究连续性、邻域、收敛等概念的抽象框架。它摒弃了距离的概念，只关注'开集'这一核心结构，使得连续性可以在更广泛的背景下研究，包括函数空间、流形等。"
    
  # ========== 属性 ==========
  properties:
    - property: "开集"
      notation: "U ∈ τ"
      description: "拓扑的基本元素"
    - property: "闭集"
      notation: "F = X \\ U"
      description: "开集的补集"
    - property: "基"
      notation: "B ⊆ τ"
      description: "生成拓扑的开集族"
    - property: "子空间拓扑"
      notation: "τ|ₐ"
      description: "子集继承的拓扑"
      
