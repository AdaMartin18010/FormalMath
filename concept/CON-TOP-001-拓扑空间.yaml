  # ========== 形式化 ==========
  formalization:
    lean4: |
      structure TopologicalSpace (X : Type*) where
        IsOpen : Set X → Prop
        isOpen_univ : IsOpen Set.univ
        isOpen_inter : ∀ s t, IsOpen s → IsOpen t → IsOpen (s ∩ t)
        isOpen_sUnion : ∀ s, (∀ t ∈ s, IsOpen t) → IsOpen (⋃₀ s)
      
      -- 开集族
      def OpenSets (X : Type*) [TopologicalSpace X] : Set (Set X) :=
        {s | TopologicalSpace.IsOpen s}
    isabelle: |
      locale topological_space =
        fixes X :: "'a set" and T :: "'a set set"
        assumes open_empty: "{} ∈ T"
          and open_univ: "X ∈ T"
          and open_inter: "⟦U ∈ T; V ∈ T⟧ ⟹ U ∩ V ∈ T"
          and open_union: "∀U ∈ S. U ∈ T ⟹ ⋃S ∈ T"
    coq: |
      Class TopologicalSpace (X : Type) := {
        open_set : (X -> Prop) -> Prop;
        open_set_empty : open_set (fun _ => False);
        open_set_full : open_set (fun _ => True);
        open_set_inter : forall A B, open_set A -> open_set B -> 
          open_set (fun x => A x /\ B x);
        open_set_union : forall F, (forall A, F A -> open_set A) ->
          open_set (fun x => exists A, F A /\ A x)
      }.
      
