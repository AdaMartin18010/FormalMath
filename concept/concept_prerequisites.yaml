# FormalMath概念先决条件配置
# 版本: 1.0
# 更新日期: 2026-04-04
# 描述: 分析学概念的先决条件与依赖关系

metadata:
  version: "1.0'
  last_updated: '2026-04-04'
  description: '分析学概念先决条件与依赖关系配置"
  author: 'FormalMath项目组'
  
# ============================================
# 分析学概念先决条件
# ============================================
concepts:
  
  # ========== 基础分析概念 ==========
  limit:
    name:
      english: "Limit'
      chinese: '极限'
    category: "analysis'
    msc_code: "26A03'
    prerequisites:
      required:
        - real_numbers
        - inequalities
      recommended:
        - logic
        - set_theory
    leads_to:
      - continuity
      - derivative
      - integral
      - series
    formalmath_docs:
      - 'concept/核心概念/13-极限-多理论分析示例-2025年1月.md'
      - "docs/03-分析学/01-实分析/01-实分析.md'
    difficulty: 1
    importance: 5
    
  continuity:
    name:
      english: 'Continuity"
      chinese: '连续'
    category: 'analysis'
    msc_code: "26A15"
    prerequisites:
      required:
        - limit
      recommended:
        - topology_basic
    leads_to:
      - uniform_continuity
      - differentiable
      - integration
    formalmath_docs:
