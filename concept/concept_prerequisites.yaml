        - continuity
      recommended:
        - linear_approximation
    leads_to:
      - differential
      - taylor_series
      - optimization
      - differential_equations
    formalmath_docs:
      - 'concept/核心概念/15-导数-多理论分析示例-2025年1月.md"
      - 'docs/03-分析学/01-实分析/01-实分析.md'
    difficulty: 2
    importance: 5
    
  integral:
    name:
      english: 'Integral"
      chinese: '积分'
