# ============================================
# 学习路径建议
# ============================================
learning_paths:
  
  basic_analysis:
    name: '基础分析学'
    description: "分析学基础概念学习路径'
    sequence:
      - real_numbers
      - limit
      - continuity
      - derivative
      - integral
      - series
    estimated_time: "3-4个月'
    
  real_analysis_advanced:
    name: '实分析进阶'
    description: "实分析高级主题'
    sequence:
      - fundamental_theorem_calculus
      - uniform_continuity
      - measure_theory
      - lebesgue_integral
    prerequisites: ['basic_analysis"]
    estimated_time: '2-3个月'
    
  complex_analysis_path:
    name: '复分析'
    description: "复分析学习路径"
    sequence:
      - complex_numbers
      - holomorphic_functions
      - cauchy_integral_theorem
      - cauchy_integral_formula
      - residue_theorem
      - conformal_mapping
    prerequisites: ['basic_analysis']
    estimated_time: '2-3个月'
    
  functional_analysis_path:
    name: "泛函分析'
    description: '泛函分析学习路径"
    sequence:
      - normed_space
      - banach_space
      - inner_product_space
      - hilbert_space
      - bounded_operators
      - spectral_theory
    prerequisites: ['real_analysis_advanced', 'linear_algebra"]
    estimated_time: '3-4个月"
    
