  # ========== 形式化 ==========
  formalization:
    lean4: |
      def HasSum (f : ℕ → ℝ) (S : ℝ) : Prop :=
        Tendsto (λ n => ∑ i in Finset.range n, f i) atTop (𝓝 S)
      
      notation "∑' n, " f => HasSum (λ n => f n)
      
      def Summable (f : ℕ → ℝ) : Prop :=
        ∃ S, HasSum f S
    isabelle: |
      definition summable :: "(nat ⇒ real) ⇒ bool"
        where "summable f ≡ ∃s. (λn. ∑i<n. f i) ⇢ s"
      
      definition suminf :: "(nat ⇒ real) ⇒ real"
        where "suminf f ≡ THE s. (λn. ∑i<n. f i) ⇢ s"
    coq: |
      Definition infinite_sum (a : nat -> R) (l : R) : Prop :=
        forall eps : R, eps > 0 ->
        exists N : nat, forall n : nat,
        (n >= N)%nat -> Rabs (sum_f_R0 a n - l) < eps.
      
      Definition convergent (a : nat -> R) : Prop :=
        exists l : R, infinite_sum a l.
      
