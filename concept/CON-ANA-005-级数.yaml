concept:
  # ========== 标识信息 ==========
  id: "CON-ANA-005"
  name: "级数"
  english_name: "Series"
  aliases: ["級數", "无穷级数", "Infinite Series", "数项级数"]
  
  # ========== 分类信息 ==========
  msc_primary: "40-XX"
  msc_secondary: ["40A05", "40A30"]
  branch: "分析学"
  topic: "级数理论"
  difficulty: 3
  importance: 4
  
  # ========== 定义 ==========
  definition:
    formal: |
      **数项级数**：给定数列 {aₙ}，形式和 Σₙ₌₁^∞ aₙ = a₁ + a₂ + a₃ + ... 称为无穷级数。
      
      **收敛性**：令 Sₙ = Σₖ₌₁ⁿ aₖ 为部分和。若数列 {Sₙ} 收敛于 S，
      则称级数 Σₙ₌₁^∞ aₙ 收敛，和为 S，记作 Σₙ₌₁^∞ aₙ = S。
      
      **绝对收敛**：若 Σₙ₌₁^∞ |aₙ| 收敛，则称原级数绝对收敛。
      
      **条件收敛**：若 Σₙ₌₁^∞ aₙ 收敛但 Σₙ₌₁^∞ |aₙ| 发散，则称条件收敛。
    intuitive: "级数是无穷多个数的求和，通过部分和序列的极限来定义。收敛级数如同有限和的推广，在近似计算和函数表示中有重要应用。"
    
  # ========== 属性 ==========
  properties:
    - property: "线性性"
      notation: "Σ(caₙ + dbₙ) = cΣaₙ + dΣbₙ"
      description: "收敛级数的线性组合仍收敛"
    - property: "Cauchy准则"
      notation: "∀ε>0, ∃N, m>n≥N ⇒ |Σₖ₌ₙ₊₁ᵐ aₖ|<ε"
      description: "级数收敛的充要条件"
    - property: "必要条件"
      notation: "Σaₙ 收敛 ⇒ aₙ → 0"
      description: "通项趋于零是收敛的必要条件"
    - property: "重排定理"
      notation: "Riemann重排定理"
      description: "条件收敛级数可重排收敛到任意值"
      
