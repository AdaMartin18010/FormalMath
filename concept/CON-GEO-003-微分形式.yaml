  # ========== 定义 ==========
  definition:
    formal: |
      **微分形式的定义**：设 M 是 n 维光滑流形。
      
      **余切空间**：Tₚ*M = (TₚM)*，即切空间的对偶空间
      
      **k-形式**：在 p ∈ M 点的 k-形式是 TₚM 上的 k 重反对称多重线性映射：
      - ωₚ : TₚM × ... × TₚM (k 次) → ℝ
      - ωₚ 对每一变量是线性的
      - ωₚ(..., v, ..., w, ...) = -ωₚ(..., w, ..., v, ...)
      
      **光滑k-形式场**：ω: p ↦ ωₚ，使得在局部坐标下系数函数是光滑的。
      
      **楔积**：∧ : Ωᵏ(M) × Ωˡ(M) → Ωᵏ⁺ˡ(M)，满足分次交换律。
    intuitive: "微分形式是流形上积分的自然对象，推广了曲线积分、曲面积分和体积积分。它们是坐标无关的，具有完美的微分运算——外微分，且满足Poincaré引理。Stokes定理统一了微积分基本定理、格林公式、高斯公式和斯托克斯公式。"
    
  # ========== 属性 ==========
  properties:
    - property: "外微分"
      notation: "d: Ωᵏ → Ωᵏ⁺¹"
      description: "满足 d² = 0 的微分算子"
    - property: "楔积"
      notation: "ω ∧ η"
      description: "分次交换的乘法：ω ∧ η = (-1)ᵏˡ η ∧ ω"
    - property: "拉回"
      notation: "f*ω"
      description: "光滑映射诱导的形式拉回"
    - property: "Stokes定理"
      notation: "∫_M dω = ∫_{∂M} ω"
      description: "微分形式的基本积分定理"
      
