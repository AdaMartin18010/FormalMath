  # ========== 形式化 ==========
  formalization:
    lean4: |
      -- k-形式丛
      def AlternatingMap (k : ℕ) (V W : Type*) [AddCommGroup V] [Module ℝ V]
        [AddCommGroup W] [Module ℝ W] : Type* :=
        {f : (Fin k → V) → W // ∀ σ : Equiv.Perm (Fin k),
          f ∘ (fun v => v ∘ σ) = Equiv.sign σ • f}
      
      -- 微分形式
      def DifferentialForm (M : Type*) [SmoothManifold M n] (k : ℕ) : Type* :=
        ∀ p : M, AlternatingMap k (TangentSpace M p) ℝ
      
      notation "Ω^" k "(" M ")" => DifferentialForm M k
      
      -- 外微分
      def exteriorDerivative {k : ℕ} : Ω^k(M) → Ω^(k+1)(M) := ...
      notation "d" => exteriorDerivative
      
      -- Stokes定理
      theorem StokesTheorem {k : ℕ} (ω : Ω^k M) :
        ∫ x in M, (d ω) x = ∫ x in ∂M, ω x := ...
    isabelle: |
      typedef 'a differential_form = 
        "{ω::'a::manifold ⇒ ('a tangent) list ⇒ real.
          ∀p. alternating (ω p) ∧ smooth (λp. ω p)}"
      
      definition exterior_derivative :: 
        "'a differential_form ⇒ 'a differential_form"
        where "exterior_derivative ω ≡ ..."
    coq: |
      Definition k_form {M: Type} `{Manifold n M} (k: nat) :=
        forall p: M, alternating_map k (tangent_space p) R.
      
      Definition exterior_derivative {M: Type} `{Manifold n M}
        {k: nat} (omega: k_form k) : k_form (S k) :=
        fun p => ...
      
      Theorem Stokes : forall M k (omega: @k_form M _ k),
        integral M (exterior_derivative omega) =
        integral (boundary M) omega.
      
