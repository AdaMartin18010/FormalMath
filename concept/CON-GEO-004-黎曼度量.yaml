  # ========== 定义 ==========
  definition:
    formal: |
      **黎曼度量的定义**：设 M 是 n 维光滑流形。
      
      **度量张量**：光滑映射 g，使得 ∀ p ∈ M：
      - gₚ : TₚM × TₚM → ℝ 是对称双线性形式
      - gₚ 是正定的：∀ v ≠ 0, gₚ(v, v) > 0
      
      即 g 是切丛 TM 上的光滑正定对称 (0,2)-张量场。
      
      **局部坐标表示**：在坐标 (x¹, ..., xⁿ) 下，
      - g = Σᵢ,ⱼ gᵢⱼ dxⁱ ⊗ dxʲ，其中 gᵢⱼ = g(∂ᵢ, ∂ⱼ)
      - gᵢⱼ 构成正定对称矩阵
      
      **诱导范数**：‖v‖² = g(v, v)，使 TₚM 成为内积空间。
      
      **黎曼流形**：配备黎曼度量 (M, g) 的流形。
    intuitive: "黎曼度量赋予流形'距离'和'角度'的概念，使其具有几何结构。它是广义相对论的数学基础——爱因斯坦场方程描述了时空度量的演化。黎曼几何研究曲率、测地线、体积等几何量，是连接分析与几何的桥梁。"
    
  # ========== 属性 ==========
  properties:
    - property: "诱导距离"
      notation: "d(p, q) = inf{∫‖γ'(t)‖dt}"
      description: "曲线长度的下确界定义距离"
    - property: "Levi-Civita联络"
      notation: "∇"
      description: "与度量相容的无挠联络"
    - property: "体积形式"
      notation: "dV = √det(g) dx¹∧...∧dxⁿ"
      description: "诱导的定向体积元"
    - property: "等距映射"
      notation: "φ*g = h"
      description: "保持度量的微分同胚"
      
