  # ========== 形式化 ==========
  formalization:
    lean4: |
      -- 黎曼度量结构
      class RiemannianMetric (M : Type*) [SmoothManifold M n] where
        toTensor : TensorField M (0, 2)  -- (0,2)-张量场
        symmetric : ∀ p, Symmetric (toTensor p)
        positive_definite : ∀ p, PositiveDefinite (toTensor p)
        smooth : Smooth toTensor
      
      -- 黎曼流形
      class RiemannianManifold (M : Type*) (n : ℕ) extends
        SmoothManifold M n, RiemannianMetric M
      
      -- 诱导范数
      def norm {M : Type*} [RiemannianManifold M n] {p : M} 
        (v : TangentSpace M p) : ℝ := Real.sqrt (g p v v)
      
      -- 距离函数
      def dist {M : Type*} [RiemannianManifold M n] (p q : M) : ℝ :=
        ⨅ γ : Path p q, ∫ t, ‖γ'(t)‖
    isabelle: |
      typedef 'a riemannian_metric = 
        "{g::'a::manifold ⇒ 'a tangent ⇒ 'a tangent ⇒ real.
          ∀p. bilinear (g p) ∧ symmetric (g p) ∧ 
              positive_definite (g p) ∧ smooth (λp. g p)}"
      
      locale riemannian_manifold = manifold + 
        fixes g :: "'a riemannian_metric"
        assumes metric_smooth: "smooth_metric g"
    coq: |
      Class RiemannianMetric {n: nat} {M: Type} 
        `{Manifold n M} := {
        metric_tensor :> TensorField M (0, 2);
        metric_symmetric : forall p v w,
          metric_tensor p v w = metric_tensor p w v;
        metric_positive_definite : forall p v,
          v <> 0 -> metric_tensor p v v > 0;
        metric_smooth : Smooth metric_tensor
      }.
      
      Definition RiemannianManifold (n: nat) (M: Type) :=
        Manifold n M * RiemannianMetric (n:=n) (M:=M).
      
