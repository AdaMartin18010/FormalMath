  # ========== 形式化 ==========
  formalization:
    lean4: |
      class Module (R : Type*) [Ring R] (M : Type*) [AddCommGroup M] where
        smul : R → M → M
        -- 分配律
        smul_add : ∀ (r : R) (x y : M), r • (x + y) = r • x + r • y
        add_smul : ∀ (r s : R) (x : M), (r + s) • x = r • x + s • x
        -- 结合律
        mul_smul : ∀ (r s : R) (x : M), (r * s) • x = r • (s • x)
        -- 单位元
        one_smul : ∀ x : M, (1 : R) • x = x
    isabelle: |
      locale module = ring R add mult zero minus uminus one +
        abelian_group M addm zerom minusm uminusm
        for R :: "'a set" and add :: "['a, 'a] ⇒ 'a"
        and mult :: "['a, 'a] ⇒ 'a" and zero :: 'a
        and minus :: "['a, 'a] ⇒ 'a" and uminus :: "'a ⇒ 'a"
        and one :: 'a and M :: "'b set"
        and addm :: "['b, 'b] ⇒ 'b" and zerom :: 'b
        and minusm :: "['b, 'b] ⇒ 'b" and uminusm :: "'b ⇒ 'b" +
        fixes scale :: "['a, 'b] ⇒ 'b" (infixl "⋅" 70)
        assumes smult_closed: "⟦r ∈ R; m ∈ M⟧ ⟹ r ⋅ m ∈ M"
          and smult_l_distr: "⟦r ∈ R; x ∈ M; y ∈ M⟧ ⟹ r ⋅ (x ⊕ y) = r ⋅ x ⊕ r ⋅ y"
    coq: |
      Class Module (R : Type) (M : Type) `{Ring R} `{AbelianGroup M} := {
        scalar_mult : R -> M -> M;
        scalar_mult_add_distr : forall r x y,
          scalar_mult r (add x y) = add (scalar_mult r x) (scalar_mult r y);
        scalar_mult_distrib : forall r s x,
          scalar_mult (add r s) x = add (scalar_mult r x) (scalar_mult s x);
        scalar_mult_assoc : forall r s x,
          scalar_mult (mul r s) x = scalar_mult r (scalar_mult s x);
        scalar_one : forall x, scalar_mult one x = x
      }.
      
