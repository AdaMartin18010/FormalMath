concept:
  # ========== 标识信息 ==========
  id: "CON-ALG-004"
  name: "模"
  english_name: "Module"
  aliases: ["Module", "R-模", "左模", "右模", "加群作用"]
  
  # ========== 分类信息 ==========
  msc_primary: "13C99"
  msc_secondary: ["16D80", "18F99"]
  branch: "代数学"
  topic: "模论"
  difficulty: 3
  importance: 4
  
  # ========== 定义 ==========
  definition:
    formal: |
      **左R-模的定义**：设 R 是环，M 是Abel群。若存在映射 R × M → M，记为 (r, m) ↦ r·m，满足：
      
      1. **分配律**：
         - r · (m + n) = r·m + r·n
         - (r + s) · m = r·m + s·m
      
      2. **结合律**：
         - (rs) · m = r · (s·m)
      
      3. **单位元作用**：
         - 1 · m = m （若 R 含幺）
      
      则称 M 为**左R-模**。
      
      类似可定义**右R-模**。
    intuitive: "模是向量空间的推广，其中系数来自环而非域。模论统一了线性代数、表示论和同调代数的核心概念，是现代代数学的通用语言。"
    
  # ========== 属性 ==========
  properties:
    - property: "子模"
      notation: "N ≤ M"
      description: "对R-作用封闭的子群"
    - property: "商模"
      notation: "M/N"
      description: "模同余类构成的模"
    - property: "直和"
      notation: "M ⊕ N"
      description: "模的直和构造"
    - property: "自由模"
      notation: "Rⁿ"
      description: "具有基的模，类似于向量空间"
      
