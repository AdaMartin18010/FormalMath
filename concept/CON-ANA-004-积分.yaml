  # ========== 定义 ==========
  definition:
    formal: |
      **Riemann积分**：设 f 在 [a, b] 上有界。对于分割 P: a = x₀ < x₁ < ... < xₙ = b，
      取 ξᵢ ∈ [x_{i-1}, xᵢ]，Riemann和为 S(P, f) = Σᵢ₌₁ⁿ f(ξᵢ)Δxᵢ。
      
      若存在 I ∈ ℝ，使得对于任意 ε > 0，存在 δ > 0，当分割的模 ‖P‖ < δ 时，
      有 |S(P, f) - I| < ε，则称 f 在 [a, b] 上Riemann可积，I 称为定积分，
      记作 ∫ₐᵇ f(x)dx = I。
    intuitive: "积分是求和的极限，几何上表示曲线下方的面积，是微积分的另一核心运算，与导数互为逆运算。"
    
  # ========== 属性 ==========
  properties:
    - property: "线性性"
      notation: "∫(af + bg) = a∫f + b∫g"
      description: "积分是线性泛函"
    - property: "区间可加性"
      notation: "∫ₐᵇ + ∫ᵇᶜ = ∫ₐᶜ"
      description: "积分对积分区间具有可加性"
    - property: "单调性"
      notation: "f ≤ g ⇒ ∫f ≤ ∫g"
      description: "保序性"
    - property: "积分中值定理"
      notation: "∃ξ, ∫ₐᵇf = f(ξ)(b-a)"
      description: "连续函数的积分中值性质"
      
