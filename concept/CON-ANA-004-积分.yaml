  # ========== 形式化 ==========
  formalization:
    lean4: |
      structure Partition (a b : ℝ) where
        points : Finset ℝ
        mono : ∀ x ∈ points, a ≤ x ∧ x ≤ b
        endpoints : a ∈ points ∧ b ∈ points
      
      def RiemannSum (f : ℝ → ℝ) (P : Partition a b) (ξ : ℝ → ℝ) : ℝ :=
        ∑ i in P.points, f (ξ i) * (i - P.prev i)
      
      def Integrable (f : ℝ → ℝ) (a b : ℝ) : Prop :=
        ∃ I : ℝ, ∀ ε > 0, ∃ δ > 0, ∀ P, ‖P‖ < δ → |RiemannSum f P ξ - I| < ε
    isabelle: |
      definition has_integral :: "(real ⇒ real) ⇒ real ⇒ (real × real) ⇒ bool"
        where "has_integral f I (a,b) ≡ ∀ε>0. ∃δ>0. ∀p tagged. 
          p fine δ ⟶ ¦(∑(x,K)∈p. content K * f x) - I¦ < ε"
    coq: |
      Definition Riemann_integrable (f : R -> R) (a b : R) : Prop :=
        exists l : R,
        forall eps : R, eps > 0 ->
        exists delta : R, delta > 0 ->
        forall ptd : partition, 
        partition_size ptd < delta ->
        Rabs (Riemann_sum f ptd - l) < eps.
      
