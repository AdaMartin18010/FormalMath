# ============================================
# FormalMath - Docker容器日志轮转配置
# 使用logrotate进行日志管理
# ============================================

# 应用日志轮转
/var/log/formalmath/*.log {
    # 每日轮转
    daily
    # 保留30天的日志
    rotate 30
    # 压缩旧日志
    compress
    # 延迟压缩（最近一次的日志不压缩）
    delaycompress
    # 缺失日志不报错
    missingok
    # 空日志不轮转
    notifempty
    # 创建新日志文件
    create 0644 formalmath formalmath
    # 使用日期作为后缀
    dateext
    dateformat -%Y%m%d-%s
    # 共享脚本（只执行一次）
    sharedscripts
    # 轮转后执行的脚本
    postrotate
        # 通知应用重新打开日志文件
        /usr/bin/killall -HUP rsyslogd 2>/dev/null || true
        # 通知Docker容器刷新日志
        /usr/bin/docker kill --signal=HUP formalmath-backend 2>/dev/null || true
    endscript
}

# Nginx访问日志
/var/log/nginx/access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        # 重新打开Nginx日志
        /bin/kill -USR1 $(cat /var/run/nginx.pid 2>/dev/null) 2>/dev/null || true
    endscript
}

# Nginx错误日志
/var/log/nginx/error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        /bin/kill -USR1 $(cat /var/run/nginx.pid 2>/dev/null) 2>/dev/null || true
    endscript
}

# 应用结构化JSON日志
/var/log/formalmath/app.json {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 formalmath formalmath
    dateext
    dateformat -%Y%m%d
    # 日志大小限制（100MB）
    size 100M
    sharedscripts
}

# 审计日志（保留更长时间）
/var/log/formalmath/audit.log {
    daily
    rotate 365
    compress
    delaycompress
    missingok
    notifempty
    create 0600 formalmath formalmath
    dateext
    dateformat -%Y%m%d
    # 立即同步到磁盘
    copytruncate
}

# Docker容器日志
/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    # 大小限制
    size 100M
    # 不创建新文件（由Docker管理）
    nocreate
    # 截断日志文件而不是删除
    copytruncate
}
