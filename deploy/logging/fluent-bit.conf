# ============================================
# Fluent Bit - 日志收集与转发配置
# 用于收集Docker容器日志并发送到中央存储
# ============================================

[SERVICE]
    # 刷新间隔
    Flush        5
    # 守护进程模式
    Daemon       Off
    # 日志级别
    Log_Level    info
    # 解析器配置文件
    Parsers_File parsers.conf
    # HTTP服务器（用于监控）
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# 输入：Docker容器日志
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     50MB
    Refresh_Interval  10
    Skip_Long_Lines   On
    Docker_Mode       On

# 输入：应用日志文件
[INPUT]
    Name              tail
    Tag               app.*
    Path              /logs/app/*.log
    Parser            json
    DB                /var/log/flb_app.db
    Mem_Buf_Limit     30MB
    Refresh_Interval  5

# 输入：Nginx访问日志
[INPUT]
    Name              tail
    Tag               nginx.access
    Path              /logs/nginx/access.log
    Parser            nginx
    DB                /var/log/flb_nginx.db
    Mem_Buf_Limit     20MB

# 输入：Nginx错误日志
[INPUT]
    Name              tail
    Tag               nginx.error
    Path              /logs/nginx/error.log
    Parser            nginx_error
    DB                /var/log/flb_nginx_error.db
    Mem_Buf_Limit     20MB

# 输入：系统日志
[INPUT]
    Name              tail
    Tag               syslog
    Path              /var/log/syslog
    Parser            syslog
    DB                /var/log/flb_syslog.db
    Mem_Buf_Limit     10MB

# 过滤器：添加Kubernetes元数据（如适用）
[FILTER]
    Name                kubernetes
    Match               docker.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Merge_Log           On
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off

# 过滤器：添加通用字段
[FILTER]
    Name      record_modifier
    Match     *
    Record    hostname ${HOSTNAME}
    Record    environment production
    Record    service formalmath

# 过滤器：解析JSON日志
[FILTER]
    Name      parser
    Match     app.*
    Key_Name  log
    Parser    json
    Reserve_Data On
    Preserve_Key Off

# 过滤器：修改标签
[FILTER]
    Name      rewrite_tag
    Match     docker.*
    Rule      $kubernetes['container_name'] .* $kubernetes['container_name'] false
    Emitter_Name  re_emitted

# 输出：Elasticsearch（主存储）
[OUTPUT]
    Name            es
    Match           *
    Host            ${ELASTICSEARCH_HOST}
    Port            9200
    Index           formalmath-logs
    Type            _doc
    HTTP_User       ${ELASTICSEARCH_USER}
    HTTP_Passwd     ${ELASTICSEARCH_PASSWORD}
    Logstash_Format On
    Logstash_Prefix formalmath
    Trace_Output    Off
    Suppress_Type_Name On
    # TLS配置
    tls             On
    tls.verify      On
    tls.ca_file     /etc/ssl/certs/ca-certificates.crt

# 输出：本地文件备份
[OUTPUT]
    Name      file
    Match     *
    Path      /var/log/fluent-bit-output
    Format    json_lines
    # 按日期分目录
    # 2024/01/01/log.json

# 输出：标准输出（调试）
[OUTPUT]
    Name   stdout
    Match  app.*
    Format json_lines
