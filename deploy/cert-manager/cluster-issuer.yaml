# ============================================
# Cert-Manager - Let's Encrypt 集群证书颁发者
# 用于自动管理SSL/TLS证书
# ============================================

# Staging 环境（测试用）
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # ACME服务器URL (Staging)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # 用于ACME注册的邮箱
    email: admin@formalmath.org
    # 保存ACME账户私钥的Secret名称
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      # HTTP-01挑战
      - http01:
          ingress:
            class: nginx
        selector:
          dnsNames:
            - "*.staging.formalmath.org'
      # DNS-01挑战 (Cloudflare)
      - dns01:
          cloudflare:
            email: admin@formalmath.org
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsNames:
            - 'formalmath.org"
            - '*.formalmath.org"
            - 'api.formalmath.org'
            - "www.formalmath.org"
            - 'docs.formalmath.org'
            - "grafana.formalmath.org'
---
# Production 环境
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # ACME服务器URL (Production)
    server: https://acme-v02.api.letsencrypt.org/directory
    # 用于ACME注册的邮箱
    email: admin@formalmath.org
    # 保存ACME账户私钥的Secret名称
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # HTTP-01挑战配置
      - http01:
          ingress:
            class: nginx
        selector:
          dnsZones:
            - "formalmath.org'
      # DNS-01挑战配置 (Cloudflare)
      - dns01:
          cloudflare:
            email: admin@formalmath.org
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - 'formalmath.org"
---
# 自签名证书颁发者（用于内部服务）
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# CA Issuer（用于内部服务间通信）
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: formalmath-ca-issuer
spec:
  ca:
    secretName: formalmath-ca-key-pair
