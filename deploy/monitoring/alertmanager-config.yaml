# ============================================
# Alertmanager - 告警管理配置
# 用于告警分组、抑制和路由
# ============================================

apiVersion: monitoring.coreos.com/v1
kind: AlertmanagerConfig
metadata:
  name: formalmath-alerts
  namespace: formalmath-prod
  labels:
    alertmanagerConfig: formalmath
spec:
  route:
    # 默认接收者
    receiver: default
    # 分组配置
    group_by: ['alertname', 'severity', 'team']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    
    # 子路由
    routes:
      # P0 紧急告警 - 立即通知
      - match:
          severity: critical
        receiver: p0-alerts
        group_wait: 0s
        group_interval: 1m
        repeat_interval: 5m
        continue: true
      
      # P1 严重告警
      - match:
          severity: warning
        receiver: p1-alerts
        group_wait: 1m
        group_interval: 5m
        repeat_interval: 1h
        continue: true
      
      # 数据库相关告警
      - match:
          team: dba
        receiver: dba-team
        group_by: ['alertname', 'instance']
        continue: true
      
      # 后端服务告警
      - match:
          team: backend
        receiver: backend-team
        continue: true
      
      # 运维告警
      - match:
          team: ops
        receiver: ops-team
        continue: true
      
      # 产品告警
      - match:
          team: product
        receiver: product-team
        continue: true
  
  # 抑制规则
  inhibit_rules:
    # 高优先级抑制低优先级
    - source_match:
        severity: critical
      target_match:
        severity: warning
      equal: ['alertname', 'instance']
    
    # 同一实例的磁盘告警抑制
    - source_match:
        alertname: DiskSpaceLow
      target_match:
        alertname: DiskSpaceWarning
      equal: ['instance']
  
  # 接收者配置
  receivers:
    # 默认接收者
    - name: default
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#alerts'
          title: '{{ .GroupLabels.alertname }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          send_resolved: true
      email_configs:
        - to: 'ops@formalmath.org'
          from: 'alerts@formalmath.org'
          smarthost: 'smtp.formalmath.org:587'
          auth_username: 'alerts@formalmath.org'
          auth_password: '${SMTP_PASSWORD}'
          send_resolved: true
    
    # P0 紧急告警
    - name: p0-alerts
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#p0-alerts'
          title: '🚨 P0告警: {{ .GroupLabels.alertname }}'
          text: |
            {{ range .Alerts }}
            *告警:* {{ .Annotations.summary }}
            *描述:* {{ .Annotations.description }}
            *实例:* {{ .Labels.instance }}
            *时间:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
            {{ end }}
          send_resolved: true
      pagerduty_configs:
        - service_key: '${PAGERDUTY_SERVICE_KEY}'
          severity: critical
      webhook_configs:
        - url: 'https://api.formalmath.org/alerts/p0'
          send_resolved: true
    
    # P1 严重告警
    - name: p1-alerts
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#p1-alerts'
          title: '⚠️ P1告警: {{ .GroupLabels.alertname }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          send_resolved: true
    
    # DBA团队
    - name: dba-team
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#dba-alerts'
          title: '数据库告警: {{ .GroupLabels.alertname }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          send_resolved: true
      email_configs:
        - to: 'dba@formalmath.org'
          from: 'alerts@formalmath.org'
          smarthost: 'smtp.formalmath.org:587'
          auth_username: 'alerts@formalmath.org'
          auth_password: '${SMTP_PASSWORD}'
          send_resolved: true
    
    # 后端团队
    - name: backend-team
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#backend-alerts'
          title: '后端告警: {{ .GroupLabels.alertname }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          send_resolved: true
    
    # 运维团队
    - name: ops-team
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#ops-alerts'
          title: '运维告警: {{ .GroupLabels.alertname }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          send_resolved: true
      email_configs:
        - to: 'ops@formalmath.org'
          from: 'alerts@formalmath.org'
          smarthost: 'smtp.formalmath.org:587'
          auth_username: 'alerts@formalmath.org'
          auth_password: '${SMTP_PASSWORD}'
          send_resolved: true
    
    # 产品团队
    - name: product-team
      slack_configs:
        - api_url: '${SLACK_WEBHOOK_URL}'
          channel: '#product-alerts'
          title: '产品告警: {{ .GroupLabels.alertname }}'
          text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
          send_resolved: true
