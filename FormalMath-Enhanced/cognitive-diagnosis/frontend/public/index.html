<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="认知诊断系统 - FormalMath项目 - 基于知识图谱的数学认知诊断" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="认知诊断" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="认知诊断" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#1976d2" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- iOS Splash Screen -->
    <link rel="apple-touch-startup-image" href="/logo512.png" />
    
    <title>认知诊断系统</title>
    
    <style>
      /* 首屏加载优化 */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* 避免FOUC */
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
      }
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e3f2fd;
        border-top-color: #1976d2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center;">
        <h1>需要启用JavaScript</h1>
        <p>认知诊断系统需要JavaScript才能正常运行，请在浏览器设置中启用JavaScript。</p>
      </div>
    </noscript>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    
    <script>
      // 注册Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW注册成功: ', registration.scope);
            })
            .catch(function(err) {
              console.log('SW注册失败: ', err);
            });
        });
        
        // 监听网络状态
        window.addEventListener('online', () => {
          console.log('网络已连接');
          document.body.classList.remove('offline');
        });
        window.addEventListener('offline', () => {
          console.log('网络已断开');
          document.body.classList.add('offline');
        });
      }
    </script>
  </body>
</html>
