# FormalMath-Enhanced Prometheus Configuration
# 监控配置文件 - 收集所有服务的指标

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'formalmath-enhanced'
    replica: '{{.ExternalURL}}'

# 告警规则文件
rule_files:
  - "rules/api_alerts.yml"
  - "rules/system_alerts.yml"
  - "rules/business_alerts.yml"

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
      timeout: 10s
      api_version: v2

# 监控目标配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # API 服务监控
  - job_name: 'formalmath-api'
    static_configs:
      - targets: 
        - 'api:8000'
        - 'api:8080'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # 自适应学习后端
  - job_name: 'adaptive-learning-backend'
    static_configs:
      - targets: ['adaptive-backend:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  # 认知诊断系统
  - job_name: 'cognitive-diagnosis'
    static_configs:
      - targets: ['diagnosis-backend:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  # 评估系统
  - job_name: 'evaluation-system'
    static_configs:
      - targets: ['evaluation-backend:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  # Redis 缓存监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics

  # PostgreSQL 数据库监控 (通过 postgres_exporter)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Celery 任务队列监控
  - job_name: 'celery'
    static_configs:
      - targets: ['celery-exporter:9540']

  # Node Exporter - 系统级监控
  - job_name: 'node-exporter'
    static_configs:
      - targets:
        - 'node-exporter:9100'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # cAdvisor - 容器监控
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Lean4 编译监控
  - job_name: 'lean4-compiler'
    static_configs:
      - targets: ['lean4-service:9000']
    metrics_path: /metrics
    scrape_interval: 30s

  # AI 形式化服务监控
  - job_name: 'ai-formalization'
    static_configs:
      - targets: ['ai-service:8000']
    metrics_path: /metrics
    scrape_interval: 20s

  # 知识图谱服务
  - job_name: 'knowledge-graph'
    static_configs:
      - targets: ['kg-service:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  # 文件存储服务
  - job_name: 'file-storage'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster
    scrape_interval: 30s

  # Elasticsearch 集群监控
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: /_prometheus/metrics
    scrape_interval: 30s

