# 业务逻辑告警规则
# 定义 FormalMath 业务相关的监控告警

groups:
  - name: learning_system
    interval: 60s
    rules:
      # 学习路径生成失败告警
      - alert: LearningPathGenerationFailure
        expr: |
          rate(learning_path_generation_total{status="error'}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: learning
        annotations:
          summary: '学习路径生成失败率过高"
          description: '学习路径生成失败率达到 {{ $value | humanizePercentage }}"

      # 推荐系统延迟告警
      - alert: RecommendationLatencyHigh
        expr: |
          histogram_quantile(0.95, 
            sum(rate(recommendation_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: learning
        annotations:
          summary: '推荐系统响应延迟高'
          description: "推荐系统 P95 延迟超过 2 秒"

      # 认知诊断失败告警
      - alert: CognitiveDiagnosisFailure
        expr: |
          rate(cognitive_diagnosis_total{status='error'}[10m]) > 0.05
        for: 3m
        labels:
          severity: critical
          team: learning
        annotations:
          summary: "认知诊断系统故障'
          description: "认知诊断失败率超过 5%'

  - name: lean4_compilation
    interval: 60s
    rules:
      # Lean4 编译失败告警
      - alert: Lean4CompilationFailure
        expr: |
          rate(lean4_compilation_total{status='failure"}[10m]) > 0.2
        for: 5m
        labels:
          severity: warning
          team: formalization
        annotations:
          summary: "Lean4 编译失败率过高'
          description: 'Lean4 编译失败率达到 {{ $value | humanizePercentage }}"

      # Lean4 编译时间过长告警
      - alert: Lean4CompilationSlow
        expr: |
          histogram_quantile(0.95, 
            sum(rate(lean4_compilation_duration_seconds_bucket[10m])) by (le)
          ) > 300
        for: 10m
        labels:
          severity: warning
          team: formalization
        annotations:
          summary: 'Lean4 编译时间过长"
          description: 'P95 编译时间超过 5 分钟'

      # Mathlib4 同步延迟告警
      - alert: Mathlib4SyncDelayed
        expr: |
          time() - mathlib4_last_sync_timestamp > 86400
        for: 1h
        labels:
          severity: warning
          team: formalization
        annotations:
          summary: "Mathlib4 同步延迟"
          description: '超过 24 小时未同步 Mathlib4 更新'

  - name: ai_formalization
    interval: 60s
    rules:
      # AI 形式化失败告警
      - alert: AIFormalizationFailure
        expr: |
          rate(ai_formalization_total{status="error'}[15m]) > 0.3
        for: 10m
        labels:
          severity: warning
          team: ai
        annotations:
          summary: "AI 形式化失败率过高'
          description: 'AI 形式化失败率达到 {{ $value | humanizePercentage }}"

      # AI 服务响应超时告警
      - alert: AIServiceTimeout
        expr: |
          histogram_quantile(0.95, 
            sum(rate(ai_request_duration_seconds_bucket[5m])) by (le)
          ) > 30
        for: 5m
        labels:
          severity: critical
          team: ai
        annotations:
          summary: "AI 服务响应超时'
          description: 'AI 服务 P95 响应时间超过 30 秒"

      # AI API 配额告警
      - alert: AIAPIQuotaLow
        expr: |
          ai_api_remaining_quota / ai_api_total_quota < 0.1
        for: 1h
        labels:
          severity: warning
          team: ai
        annotations:
          summary: 'AI API 配额不足"
          description: 'API 配额剩余少于 10%'

  - name: user_engagement
    interval: 300s
    rules:
      # 用户活跃度下降告警
      - alert: UserActivityDrop
        expr: |
          (
            sum(rate(user_sessions_total[1h]))
            /
            avg_over_time(sum(rate(user_sessions_total[1h]))[24h:1h])
          ) < 0.5
        for: 2h
        labels:
          severity: info
          team: product
        annotations:
          summary: "用户活跃度显著下降"
          description: '用户活跃度降至平均水平的 50% 以下'

      # IMO 题目访问异常告警
      - alert: IMOProblemAccessAnomaly
        expr: |
          abs(
            rate(imo_problem_views_total[1h]) - 
            avg_over_time(rate(imo_problem_views_total[1h])[24h:1h])
          ) / stddev_over_time(rate(imo_problem_views_total[1h])[24h:1h]) > 3
        for: 30m
        labels:
          severity: info
          team: product
        annotations:
          summary: "IMO 题目访问量异常'
          description: "IMO 题目访问量偏离正常范围'

  - name: data_quality
    interval: 300s
    rules:
      # 知识图谱数据质量告警
      - alert: KnowledgeGraphDataQualityIssue
        expr: |
          knowledge_graph_entities_without_description / knowledge_graph_total_entities > 0.1
        for: 1h
        labels:
          severity: warning
          team: data
        annotations:
          summary: '知识图谱数据质量问题"
          description: "超过 10% 的实体缺少描述信息'

      # MSC 编码缺失告警
      - alert: MSCCodingMissing
        expr: |
          msc_coded_theorems / total_theorems < 0.95
        for: 1d
        labels:
          severity: info
          team: data
        annotations:
          summary: 'MSC 编码覆盖率低"
          description: 'MSC 编码覆盖率低于 95%"
