# Alertmanager 配置
# 定义告警路由和通知渠道

global:
  # SMTP 配置（用于邮件告警）
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@formalmath.io'
  smtp_auth_username: 'alerts@formalmath.io'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true
  
  # Slack API URL
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  
  # PagerDuty 密钥
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  
  # 告警模板
  resolve_timeout: 5m

# 模板文件位置
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# 抑制规则 - 防止重复告警
inhibit_rules:
  # 当 Critical 级别告警触发时，抑制同实例的 Warning 级别告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # 当服务宕机时，抑制该服务的其他告警
  - source_match:
      alertname: 'APIDown'
    target_match_re:
      alertname: 'APIHighErrorRate|APIHighLatency'
    equal: ['instance']

# 路由配置 - 决定告警如何分组和发送
route:
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  
  # 子路由
  routes:
    # Critical 级别告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
      group_wait: 10s
      repeat_interval: 30m
    
    # 基础设施相关告警
    - match_re:
        team: infrastructure|database
      receiver: 'infrastructure-team'
      group_by: ['alertname', 'instance']
      group_wait: 1m
    
    # 后端服务告警
    - match_re:
        team: backend|learning|ai
      receiver: 'backend-team'
      group_by: ['alertname', 'service']
      group_wait: 30s
    
    # 安全相关告警
    - match:
        team: security
      receiver: 'security-team'
      group_wait: 0s
      repeat_interval: 1h
    
    # 产品/业务告警 - 低优先级
    - match:
        team: product
      receiver: 'product-team'
      group_wait: 5m
      repeat_interval: 12h

# 接收器配置 - 定义通知渠道
receivers:
  # 默认接收器
  - name: 'default'
    email_configs:
      - to: 'ops@formalmath.io'
        send_resolved: true
        subject: '[FormalMath Alert] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Instance: {{ .Labels.instance }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # 关键告警接收器
  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@formalmath.io,cto@formalmath.io'
        send_resolved: true
        subject: '[CRITICAL] FormalMath Alert: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#critical-alerts'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: critical
        description: '{{ .GroupLabels.alertname }}'
        details:
          summary: '{{ .CommonAnnotations.summary }}'
          description: '{{ .CommonAnnotations.description }}'

  # 基础设施团队
  - name: 'infrastructure-team'
    email_configs:
      - to: 'infrastructure@formalmath.io'
        send_resolved: true
    slack_configs:
      - channel: '#infrastructure-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  # 后端团队
  - name: 'backend-team'
    email_configs:
      - to: 'backend@formalmath.io'
        send_resolved: true
    slack_configs:
      - channel: '#backend-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  # 安全团队
  - name: 'security-team'
    email_configs:
      - to: 'security@formalmath.io'
        send_resolved: true
    slack_configs:
      - channel: '#security-alerts'
        send_resolved: true
        title: 'Security Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  # 产品团队
  - name: 'product-team'
    email_configs:
      - to: 'product@formalmath.io'
        send_resolved: true
    slack_configs:
      - channel: '#product-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  # Webhook 接收器 - 用于自定义集成
  - name: 'webhook'
    webhook_configs:
      - url: 'http://formalmath-api:8000/webhooks/alerts'
        send_resolved: true
        http_config:
          bearer_token: '${WEBHOOK_SECRET}'
