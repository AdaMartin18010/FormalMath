# Grafana 仪表盘配置
# 自动加载所有仪表盘 JSON 文件

apiVersion: 1

providers:
  - name: 'FormalMath Dashboards'
    orgId: 1
    folder: 'FormalMath'
    folderUid: 'formalmath'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
