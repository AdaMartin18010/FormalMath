# Filebeat 配置文件
# 收集 FormalMath 所有服务的日志

filebeat.inputs:
  # API 服务日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/api/*.log
      - /var/log/formalmath/api/*.json
    fields:
      service: api
      environment: ${ENVIRONMENT:production}
    fields_under_root: false
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message

  # 自适应学习后端日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/adaptive-learning/*.log
    fields:
      service: adaptive-learning
      environment: ${ENVIRONMENT:production}
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after

  # 认知诊断系统日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/cognitive-diagnosis/*.log
    fields:
      service: cognitive-diagnosis
      environment: ${ENVIRONMENT:production}

  # 评估系统日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/evaluation-system/*.log
    fields:
      service: evaluation-system
      environment: ${ENVIRONMENT:production}

  # Lean4 编译日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/lean4/*.log
      - /var/log/formalmath/lean4/build/*.log
    fields:
      service: lean4
      environment: ${ENVIRONMENT:production}
    multiline.pattern: '^info:|^warning:|^error:'
    multiline.negate: true
    multiline.match: after

  # AI 形式化服务日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/ai-formalization/*.log
    fields:
      service: ai-formalization
      environment: ${ENVIRONMENT:production}

  # 知识图谱服务日志
  - type: log
    enabled: true
    paths:
      - /var/log/formalmath/knowledge-graph/*.log
    fields:
      service: knowledge-graph
      environment: ${ENVIRONMENT:production}

  # Nginx/Traefik 访问日志
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/access.log
      - /var/log/nginx/error.log
      - /var/log/traefik/*.log
    fields:
      service: gateway
      environment: ${ENVIRONMENT:production}

  # 系统日志
  - type: log
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/auth.log
    fields:
      service: system
      environment: ${ENVIRONMENT:production}

# 容器日志收集（如果使用 Docker）
filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true
      templates:
        - condition:
            contains:
              docker.container.name: formalmath
          config:
            - type: container
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              fields:
                service: ${data.docker.container.name}
              multiline.pattern: '^\d{4}-\d{2}-\d{2}'
              multiline.negate: true
              multiline.match: after

# Filebeat 模块
filebeat.modules:
  - module: system
    syslog:
      enabled: true
    auth:
      enabled: true
  - module: nginx
    access:
      enabled: true
      var.paths: ["/var/log/nginx/access.log*']
    error:
      enabled: true
      var.paths: ["/var/log/nginx/error.log*"]
  - module: postgresql
    log:
      enabled: true
      var.paths: ['/var/log/postgresql/*.log*"]
  - module: redis
    log:
      enabled: true
      var.paths: ["/var/log/redis/*.log*']

# 处理器配置
processors:
  # 添加主机信息
  - add_host_metadata:
      when.not.contains.tags: forwarded
      
  # 添加云服务商信息
  - add_cloud_metadata: ~
  
  # 添加 Docker 元数据
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
      
  # 添加 Kubernetes 元数据（如适用）
  - add_kubernetes_metadata:
      host: 'unix:///var/run/docker.sock"
      
  # 解码 JSON 字段
  - decode_json_fields:
      fields: ["message']
      target: ""
      overwrite_keys: true
      when:
        regexp:
          message: '^\{'
          
  # 删除无用字段
  - drop_fields:
      fields: ['agent", "ecs', "input", 'log", "tags']
      ignore_missing: true
      when:
        has_fields: ["message"]

# 输出配置
output.logstash:
  hosts: ['${LOGSTASH_HOSTS:logstash:5044}"]
  ssl.enabled: false
  worker: 2
  compression_level: 3
  loadbalance: true

# 如果 Logstash 不可用，使用 Elasticsearch 直接输出
# output.elasticsearch:
#   hosts: ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}']
#   index: "formalmath-logs-%{+yyyy.MM.dd}"

# 日志队列配置
queue.mem:
  events: 4096
  flush.min_events: 512
  flush.timeout: 5s

# 日志文件配置
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# 监控配置
monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ['${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]

# 指标收集
metricbeat:
  modules:
    - module: system
      metricsets:
        - cpu
        - memory
        - network
      enabled: true
      period: 10s
