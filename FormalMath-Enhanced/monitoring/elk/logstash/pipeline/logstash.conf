# Logstash 配置文件
# 处理 FormalMath 所有服务的日志

input {
  # Beats 输入
  beats {
    port => 5044
    type => "filebeat"
  }
  
  # TCP 输入（用于直接推送）
  tcp {
    port => 5000
    type => "tcp"
    codec => json {
      target => "[parsed_json]"
    }
  }
  
  # UDP 输入（用于 syslog）
  udp {
    port => 5001
    type => "syslog"
  }
}

filter {
  # 通用字段解析
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "formalmath-logs"
    }
  }
  
  # 根据服务类型解析
  if [fields][service] {
    mutate {
      add_field => {
        "service" => "%{[fields][service]}"
        "environment" => "%{[fields][environment]}"
      }
    }
  }
  
  # API 服务日志解析
  if [service] == "api" or [service] == "adaptive-learning" or [service] == "cognitive-diagnosis" or [service] == "evaluation-system" {
    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} %{DATA:request_id} %{WORD:method} %{URIPATH:path} %{NUMBER:status_code:int} %{NUMBER:duration:float}ms",
          "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} %{GREEDYDATA:log_message}"
        ]
      }
      overwrite => ["timestamp"]
    }
    
    # 解析 JSON 日志
    if [message] =~ "^\\{" {
      json {
        source => "message"
        target => "[log_json]"
        skip_on_invalid_json => true
      }
    }
  }
  
  # Lean4 编译日志解析
  if [service] == "lean4" {
    grok {
      match => {
        "message" => [
          "%{DATA:compile_time} %{DATA:file} %{DATA:status} %{NUMBER:compile_duration:float}s",
          "%{DATA:file}:%{NUMBER:line:int}:%{NUMBER:column:int}: %{DATA:error_type}: %{GREEDYDATA:error_message}"
        ]
      }
    }
  }
  
  # AI 形式化服务日志解析
  if [service] == "ai-formalization" {
    grok {
      match => {
        "message" => [
          "Request %{UUID:request_id} %{WORD:status} %{NUMBER:processing_time:float}s",
          "%{DATA:model} inference: %{NUMBER:tokens:int} tokens, %{NUMBER:cost:float} USD"
        ]
      }
    }
  }
  
  # 知识图谱服务日志解析
  if [service] == "knowledge-graph" {
    grok {
      match => {
        "message" => [
          "Query %{DATA:query_type} %{NUMBER:query_duration:float}ms %{NUMBER:results:int} results",
          "Entity %{DATA:entity_type} %{WORD:operation} %{DATA:entity_id}"
        ]
      }
    }
  }
  
  # 日期解析
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }
  
  # 日志级别标准化
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }
  
  # 错误日志标记
  if [level] == "ERROR" or [level] == "FATAL" or [level] == "CRITICAL" {
    mutate {
      add_tag => ["error"]
      add_field => { "error_flag" => true }
    }
  }
  
  # 慢查询标记
  if [duration] and [duration] > 1000 {
    mutate {
      add_tag => ["slow_request"]
    }
  }
  
  # 移除无用字段
  mutate {
    remove_field => ["[parsed_json]", "agent", "ecs", "input", "log", "tags"]
  }
}

output {
  # 调试输出（开发环境）
  if "${LOGSTASH_DEBUG}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
  
  # 写入 Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    template => "/usr/share/logstash/templates/formalmath-logs-template.json"
    template_name => "formalmath-logs"
    template_overwrite => true
    ilm_enabled => true
    ilm_rollover_alias => "formalmath-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "formalmath-logs-policy"
  }
  
  # 错误日志单独索引
  if "error" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      index => "formalmath-errors-%{+YYYY.MM.dd}"
    }
  }
  
  # 慢查询单独索引
  if "slow_request" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      index => "formalmath-slow-queries-%{+YYYY.MM.dd}"
    }
  }
}
