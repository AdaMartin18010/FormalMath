<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#1a365d" />
    <meta name="description" content="FormalMath 评估系统 - 五维数学能力评估" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="数学评估" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="数学评估" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#1a365d" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    
    <title>FormalMath 评估系统</title>
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f7fa;
      }
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top-color: #1a365d;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center;">
        <h1>需要启用JavaScript</h1>
        <p>评估系统需要JavaScript才能正常运行。</p>
      </div>
    </noscript>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW注册成功: ', registration.scope);
            })
            .catch(function(err) {
              console.log('SW注册失败: ', err);
            });
        });
        
        window.addEventListener('online', () => {
          document.body.classList.remove('offline');
        });
        window.addEventListener('offline', () => {
          document.body.classList.add('offline');
        });
      }
    </script>
  </body>
</html>
