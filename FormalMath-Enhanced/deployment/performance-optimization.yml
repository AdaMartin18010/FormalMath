# ============================================
# FormalMath - 生产环境性能优化配置
# 目标：支持1000并发用户，响应时间<200ms (P95)
# ============================================

version: '3.8'

services:
  # Nginx - 高性能配置
  nginx:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      replicas: 2
    environment:
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=2048
      - NGINX_WORKER_RLIMIT_NOFILE=65535
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535
      - net.ipv4.ip_local_port_range=1024 65535

  # Backend - 高性能配置
  backend:
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
      replicas: 4
      update_config:
        parallelism: 2
        delay: 10s
        failure_action: rollback
    environment:
      - WORKERS=8
      - WORKER_CONNECTIONS=1000
      - KEEPALIVE_TIMEOUT=65
      - REQUEST_TIMEOUT=30
      - MAX_REQUESTS=10000
      - MAX_REQUESTS_JITTER=1000
      - BACKLOG=2048
      - GRACEFUL_TIMEOUT=30

  # Redis - 高性能配置
  redis:
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
      --tcp-keepalive 60
      --timeout 0
      --maxclients 10000
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
      --activedefrag yes
      --active-defrag-threshold-lower 10
      --active-defrag-threshold-upper 100
      --active-defrag-cycle-min 25
      --active-defrag-cycle-max 75
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    sysctls:
      - net.core.somaxconn=65535
      - vm.overcommit_memory=1

  # Celery Worker - 高性能配置
  celery-worker:
    command: celery -A celery_worker worker 
      --loglevel=INFO 
      --concurrency=8 
      --prefetch-multiplier=1
      --max-tasks-per-child=1000
      --max-memory-per-child=512000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      replicas: 4
