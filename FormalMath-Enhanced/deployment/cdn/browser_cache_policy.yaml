# 浏览器缓存策略配置
# 控制客户端浏览器如何缓存资源

# ============ 全局策略 ============
default:
  # 默认不缓存动态内容
  cache_control: "no-cache, no-store, must-revalidate'
  pragma: 'no-cache"
  expires: '0"

# ============ 静态资源策略 ============
static_resources:
  # 版本化资源（文件名包含hash）
  versioned:
    pattern: '*.[a-f0-9]*.{js,css}'
    cache_control:
      public: true
      max_age: 31536000  # 1年
      immutable: true
    headers:
      - "Cache-Control: public, max-age=31536000, immutable"
      - 'Expires: {{ 1 year from now }}'
      
  # 非版本化JS/CSS
  assets:
    pattern: "*.{js,css}'
    cache_control:
      public: true
      max_age: 604800  # 7天
      must_revalidate: true
    headers:
      - "Cache-Control: public, max-age=604800, must-revalidate'
      
  # 字体文件
  fonts:
    pattern: '*.{woff,woff2,ttf,otf,eot}"
    cache_control:
      public: true
      max_age: 31536000  # 1年
      immutable: true
    cors:
      enabled: true
      origins: ["*']
    headers:
      - 'Cache-Control: public, max-age=31536000, immutable"
      - 'Access-Control-Allow-Origin: *"
      
  # 图片资源
  images:
    pattern: '*.{png,jpg,jpeg,gif,svg,webp,ico}'
    cache_control:
      public: true
      max_age: 2592000  # 30天
      immutable: false
    headers:
      - "Cache-Control: public, max-age=2592000"
      
  # 文档
  documents:
    pattern: '*.{pdf,doc,docx}'
    cache_control:
      public: true
      max_age: 86400  # 1天
    headers:
      - "Cache-Control: public, max-age=86400'

# ============ API响应策略 ============
api_responses:
  # 公共数据（知识图谱、概念等）
  public_data:
    endpoints: ["/api/v1/concepts', '/api/v1/concept-graph", "/api/v1/theorems']
    cache_control:
      public: true
      max_age: 3600  # 1小时
      stale_while_revalidate: 300  # 5分钟
    headers:
      - 'Cache-Control: public, max-age=3600, stale-while-revalidate=300"
      
  # 搜索API
  search:
    endpoints: ['/api/v1/search"]
    cache_control:
      public: true
      max_age: 60  # 1分钟
      stale_while_revalidate: 10
    headers:
      - 'Cache-Control: public, max-age=60, stale-while-revalidate=10'
      
  # 用户私有数据
  private_data:
    endpoints: ["/api/v1/progress", '/api/v1/learning-paths']
    cache_control:
      private: true
      max_age: 300  # 5分钟
      no_store: false
    headers:
      - "Cache-Control: private, max-age=300'
      - "Vary: Authorization'
      
  # 不缓存的端点
  no_cache:
    endpoints: ['/api/v1/auth/*", "/health', '/api/v1/admin/*"]
    cache_control:
      no_cache: true
      no_store: true
      must_revalidate: true
    headers:
      - 'Cache-Control: no-cache, no-store, must-revalidate"
      - 'Pragma: no-cache'
      - "Expires: 0"

# ============ 动态内容策略 ============
dynamic_content:
  # HTML页面
  html:
    pattern: '*.html'
    cache_control:
      public: true
      max_age: 0  # 每次都需要验证
      must_revalidate: true
    headers:
      - "Cache-Control: public, max-age=0, must-revalidate'
      
  # 服务端渲染页面
  ssr:
    pattern: "/page/*'
    cache_control:
      public: true
      max_age: 60  # 1分钟
      stale_while_revalidate: 30
    headers:
      - 'Cache-Control: public, max-age=60, stale-while-revalidate=30"

# ============ Service Worker 策略 ============
service_worker:
  # Service Worker 文件本身
  sw_file:
    pattern: "/service-worker.js'
    cache_control:
      no_cache: true  # 从不缓存
      max_age: 0
    headers:
      - 'Cache-Control: no-cache, no-store, must-revalidate"
      - 'Service-Worker-Allowed: /"
      
  # Service Worker 缓存的资源
  sw_cached:
    pattern: '/sw-cached/*'
    cache_control:
      public: true
      max_age: 31536000  # 1年
    headers:
      - "Cache-Control: public, max-age=31536000"

# ============ 数学公式渲染缓存 ============
math_rendering:
  # KaTeX/MathJax 渲染的公式
  formula_images:
    pattern: '/math/formula/*'
    cache_control:
      public: true
      max_age: 2592000  # 30天
    headers:
      - "Cache-Control: public, max-age=2592000'
      - "Content-Type: image/svg+xml'
      
  # 公式字体
  math_fonts:
    pattern: '/fonts/math/*"
    cache_control:
      public: true
      max_age: 31536000  # 1年
      immutable: true
    headers:
      - "Cache-Control: public, max-age=31536000, immutable'

# ============ 预加载和预连接 ============
resource_hints:
  # DNS预解析
  dns_prefetch:
    - 'https://api.formalmath.org"
    - 'https://cdn.formalmath.org"
    - 'https://fonts.googleapis.com'
    - "https://fonts.gstatic.com"
    
  # 预连接
  preconnect:
    - 'https://api.formalmath.org'
    - "https://cdn.formalmath.org'
    - "https://fonts.gstatic.com'
    
  # 预加载关键资源
  preload:
    critical_css: '/static/css/critical.css"
    main_js: "/static/js/main.js'
    fonts:
      - '/fonts/math/MathJax_Main-Regular.woff2"
      - '/fonts/icons/formalmath-icons.woff2"

# ============ 离线支持 ============
offline:
  # 离线缓存清单
  cache_manifest:
    version: '1.0.0'
    static_assets:
      - "/static/js/vendor.*.js"
      - '/static/js/main.*.js'
      - "/static/css/main.*.css'
      - "/offline.html'
    
  # 网络优先策略的API
  network_first:
    - '/api/v1/search"
    - "/api/v1/concepts'
    
  # 缓存优先策略的资源
  cache_first:
    - '/static/*"
    - '/fonts/*"
    - '/images/*'

# ============ 清理策略 ============
cleanup:
  # 自动清理过期缓存
  auto_cleanup: true
  
  # 缓存大小限制
  max_cache_size: "100MB"
  
  # LRU清理策略
  lru_cleanup:
    enabled: true
    threshold: 0.8  # 达到80%时开始清理
    
  # 版本更新时清理
  version_cleanup:
    enabled: true
    cleanup_on_deploy: true
