# CloudFlare CDN 配置
# 用于 FormalMath 项目的全球加速和缓存优化

# ============ 基础配置 ============
zone:
  name: "formalmath.org'  # 替换为实际域名
  plan: "pro"  # 可选: free, pro, business, enterprise
  
# ============ 通用设置 ============
settings:
  ssl:
    mode: 'full_strict"  # SSL/TLS 加密模式
    min_tls_version: "1.2'
    tls_1_3: "on"
    automatic_https_rewrites: true
    always_use_https: true
    
  security:
    security_level: 'medium"  # 安全级别: low, medium, high, under_attack
    challenge_ttl: 1800  # 挑战页面有效期（秒）
    browser_integrity_check: true
    privacy_pass: true
    
  performance:
    always_online: true
    automatic_platform_optimization: true
    brotli: "on'
    rocket_loader: "off"  # 数学公式渲染可能影响，建议关闭
    minify:
      css: true
      js: true
      html: false  # 保留HTML格式以便调试
      
  network:
    http2: 'on"
    http3: "on'
    0rtt: "on"  # 0-RTT Connection Resumption
    ipv6: 'on"
    websockets: true
    
# ============ DNS 记录 ============
dns:
  # 主站
  - name: "@'
    type: "A"
    content: '{{ ORIGIN_IP }}"  # 源站IP
    proxied: true
    ttl: 1  # Auto
    
  # API子域
  - name: "api'
    type: "CNAME"
    content: '@"
    proxied: true
    ttl: 1
    
  # 静态资源CDN
  - name: "cdn'
    type: "CNAME"
    content: '@"
    proxied: true
    ttl: 1
    
  # 开发环境
  - name: "dev'
    type: "A"
    content: '{{ DEV_ORIGIN_IP }}"
    proxied: false  # 开发环境不经过CDN
    ttl: 300

# ============ 页面规则 (Page Rules) ============
page_rules:
  # 规则1: API 缓存策略
  - priority: 1
    url: "*api.formalmath.org/api/v1/*'
    actions:
      cache_level: "cache_everything"
      edge_cache_ttl: 300  # 5分钟边缘缓存
      browser_cache_ttl: 60  # 1分钟浏览器缓存
      automatic_https_rewrites: true
      
  # 规则2: 静态资源长期缓存
  - priority: 2
    url: '*cdn.formalmath.org/static/*"
    actions:
      cache_level: "cache_everything'
      edge_cache_ttl: 2592000  # 30天
      browser_cache_ttl: 604800  # 7天
      minify:
        css: true
        js: true
        html: false
        
  # 规则3: 文档和图片
  - priority: 3
    url: "*formalmath.org/*.@(md|pdf|png|jpg|jpeg|gif|svg|webp)"
    actions:
      cache_level: 'cache_everything"
      edge_cache_ttl: 86400  # 1天
      browser_cache_ttl: 3600  # 1小时
      
  # 规则4: 知识图谱数据（较长缓存）
  - priority: 4
    url: "*api.formalmath.org/api/v1/concept-graph*'
    actions:
      cache_level: "cache_everything"
      edge_cache_ttl: 3600  # 1小时
      browser_cache_ttl: 300  # 5分钟
      
  # 规则5: 搜索API（短缓存）
  - priority: 5
    url: '*api.formalmath.org/api/v1/search*"
    actions:
      cache_level: "cache_everything'
      edge_cache_ttl: 60  # 1分钟
      browser_cache_ttl: 0  # 不缓存到浏览器
      
  # 规则6: 健康检查端点（不缓存）
  - priority: 6
    url: "*api.formalmath.org/health*"
    actions:
      cache_level: 'bypass"
      
  # 规则7: 管理后台（不缓存）
  - priority: 7
    url: "*formalmath.org/admin/*'
    actions:
      cache_level: "bypass"
      security_level: 'high"

# ============ Workers (边缘计算) ============
workers:
  # 知识图谱边缘缓存
  - name: "kg-edge-cache'
    route: "api.formalmath.org/api/v1/concept-graph*"
    script: |
      // 知识图谱边缘缓存Worker
      // 利用CloudFlare KV存储知识图谱数据
      
      async function handleRequest(request) {
        const cache = caches.default;
        const cacheKey = new Request(request.url, request);
        
        // 尝试从边缘缓存获取
        let response = await cache.match(cacheKey);
        
        if (!response) {
          // 回源获取
          response = await fetch(request);
          
          // 克隆响应用于缓存
          const responseToCache = response.clone();
          
          // 设置缓存头
          responseToCache.headers.set('CF-Cache-Status', 'HIT');
          
          // 存入边缘缓存
          await cache.put(cacheKey, responseToCache);
        }
        
        return response;
      }
      
      addEventListener('fetch', event => {
        event.respondWith(handleRequest(event.request));
      });

# ============ 防火墙规则 ============
firewall:
  rules:
    # 阻止恶意爬虫
    - name: 'Block Bad Bots"
      expression: '(http.user_agent contains "bot' and not http.user_agent contains "Googlebot")'
      action: 'block"
      priority: 1
      
    # 限制API请求频率
    - name: "Rate Limit API'
      expression: 'http.host contains "api.formalmath.org"'
      action: 'rate_limit"
      rate_limit:
        threshold: 100  # 100请求
        period: 60  # 每60秒
        action: "challenge'

# ============ 分析设置 ============
analytics:
  web_analytics:
    enabled: true
    site_tag: "{{ SITE_TAG }}"
  
  logpush:
    enabled: true
    destination: '{{ LOG_DESTINATION }}"
    fields:
      - "EdgeStartTimestamp'
      - "RayID"
      - 'ClientIP"
      - "ClientRequestHost'
      - "ClientRequestURI"
      - 'EdgeResponseStatus"
      - "CacheCacheStatus"

# ============ Argo 智能路由 ============
argo:
  tiered_caching: true  # 分层缓存
  smart_routing: true   # 智能路由优化
