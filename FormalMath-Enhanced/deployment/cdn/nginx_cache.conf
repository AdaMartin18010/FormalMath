# Nginx 缓存配置
# 用于 FormalMath 项目的反向代理和缓存层

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============ 日志格式 ============
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'cache=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    # ============ 基础优化 ============
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ============ Gzip 压缩 ============
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ============ Brotli 压缩（需要 ngx_brotli 模块）=========
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ============ 代理缓存配置 ============
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:100m 
                     max_size=10g inactive=60m use_temp_path=off;
    
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=API:50m 
                     max_size=5g inactive=30m use_temp_path=off;

    # ============ 上游服务器 ============
    upstream api_backend {
        least_conn;
        server api1.formalmath.internal:8000 weight=5;
        server api2.formalmath.internal:8000 weight=5;
        server api3.formalmath.internal:8000 backup;
        keepalive 32;
    }

    # ============ 限流配置 ============
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=5r/s;
    
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============ 静态文件服务器 ============
    server {
        listen 80;
        listen [::]:80;
        server_name cdn.formalmath.org static.formalmath.org;
        
        # 重定向到HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name cdn.formalmath.org static.formalmath.org;

        ssl_certificate /etc/nginx/ssl/formalmath.crt;
        ssl_certificate_key /etc/nginx/ssl/formalmath.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;

        root /var/www/static;
        
        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 版本化资源（1年缓存）
        location ~* \.[a-f0-9]{8,}\.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Vary "Accept-Encoding" always;
            access_log off;
        }

        # JavaScript/CSS（7天缓存）
        location ~* \.(js|css)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, must-revalidate" always;
            add_header Vary "Accept-Encoding" always;
        }

        # 字体文件（1年缓存）
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Vary "Accept-Encoding" always;
        }

        # 图片（30天缓存）
        location ~* \.(png|jpg|jpeg|gif|svg|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
            add_header Vary "Accept-Encoding" always;
        }

        # JSON数据（1小时缓存）
        location ~* \.json$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Vary "Accept-Encoding" always;
        }

        # 默认静态文件
        location / {
            try_files $uri $uri/ =404;
            expires 1d;
            add_header Cache-Control "public, max-age=86400" always;
        }
    }

    # ============ API 代理服务器 ============
    server {
        listen 80;
        listen [::]:80;
        server_name api.formalmath.org;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.formalmath.org;

        ssl_certificate /etc/nginx/ssl/formalmath.crt;
        ssl_certificate_key /etc/nginx/ssl/formalmath.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # 安全头
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # 健康检查（不缓存）
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires off;
        }

        # 知识图谱（1小时缓存）
        location /api/v1/concept-graph {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # 缓存配置
            proxy_cache API;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_key "$scheme$request_method$host$request_uri$args";
            
            # 添加缓存状态头
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=3600" always;
            
            # 限流
            limit_req zone=api_limit burst=20 nodelay;
        }

        # 概念列表（30分钟缓存）
        location /api/v1/concepts {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            
            proxy_cache API;
            proxy_cache_valid 200 30m;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_use_stale updating;
            
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=1800" always;
            
            limit_req zone=api_limit burst=30 nodelay;
        }

        # 搜索API（1分钟缓存，限流）
        location /api/v1/search {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            
            proxy_cache API;
            proxy_cache_valid 200 1m;
            proxy_cache_valid 404 10s;
            proxy_cache_key "$scheme$request_method$host$request_uri$args";
            
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=60" always;
            
            # 更严格的限流
            limit_req zone=search_limit burst=10 nodelay;
        }

        # 用户数据（不缓存）
        location ~ ^/api/v1/(progress|learning-paths|recommendations) {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            
            add_header Cache-Control "private, max-age=300" always;
            add_header Vary "Authorization" always;
        }

        # 认证端点（不缓存）
        location ~ ^/api/v1/auth {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires off;
        }

        # 其他API（默认配置）
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_cache API;
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout;
            
            add_header X-Cache-Status $upstream_cache_status always;
            
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;
        }
    }

    # ============ 主站服务器 ============
    server {
        listen 80;
        listen [::]:80;
        server_name formalmath.org www.formalmath.org;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name formalmath.org www.formalmath.org;

        ssl_certificate /etc/nginx/ssl/formalmath.crt;
        ssl_certificate_key /etc/nginx/ssl/formalmath.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /var/www/formalmath;
        index index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' api.formalmath.org;" always;

        # Service Worker（不缓存）
        location = /service-worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            try_files $uri =404;
        }

        # 静态资源代理到CDN
        location /static/ {
            proxy_pass https://cdn.formalmath.org/;
            proxy_ssl_server_name on;
            proxy_set_header Host cdn.formalmath.org;
            
            proxy_cache STATIC;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout;
            
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # API代理
        location /api/ {
            proxy_pass https://api.formalmath.org/;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host api.formalmath.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 单页应用路由
        location / {
            try_files $uri $uri/ /index.html;
            
            # HTML不缓存
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                expires off;
            }
        }

        # 错误页面
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/formalmath;
            internal;
        }
    }
}
