# API 响应缓存配置
# 针对不同API端点设置差异化的缓存策略

# ============ 全局API缓存配置 ============
default:
  enabled: true
  cache_control: "no-cache"  # 默认不缓存API响应
  etag: true
  vary: "Accept-Encoding, Authorization"

# ============ 端点特定配置 ============
endpoints:
  # 知识图谱查询 - 可缓存较长时间
  knowledge_graph:
    path: "/api/v1/concept-graph"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 3600  # 1小时
      stale_while_revalidate: 300  # 5分钟后台刷新
    cdn:
      edge_ttl: 3600
      cache_key_query_params:
        include: ["branch", "depth", "format"]
        exclude: ["callback"]
    redis:
      ttl: 7200  # 2小时
      prefix: "api:kg"
    invalidate_on:
      - "concept_updated"
      - "new_theorem"
      
  # 概念列表 - 中等缓存
  concepts_list:
    path: "/api/v1/concepts"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 1800  # 30分钟
      stale_while_revalidate: 300
    cdn:
      edge_ttl: 1800
      cache_key_query_params:
        include: ["page", "per_page", "category", "sort"]
    redis:
      ttl: 3600  # 1小时
      prefix: "api:concepts"
      
  # 单个概念详情
  concept_detail:
    path: "/api/v1/concepts/{id}"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 3600  # 1小时
    cdn:
      edge_ttl: 3600
    redis:
      ttl: 7200  # 2小时
      prefix: "api:concept"
    invalidate_on:
      - "concept:{id}_updated"
      
  # 搜索API - 短缓存
  search:
    path: "/api/v1/search"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 60  # 1分钟
      stale_while_revalidate: 10
    cdn:
      edge_ttl: 60
      cache_key_query_params:
        include: ["q", "type", "category"]
    redis:
      ttl: 300  # 5分钟
      prefix: "api:search"
    rate_limit:
      requests: 30
      window: 60  # 60秒内30次请求
      
  # 语义搜索 - 中等缓存（计算成本高）
  semantic_search:
    path: "/api/v1/search/semantic"
    methods: ["POST"]
    cache_control:
      public: true
      max_age: 300  # 5分钟
    cdn:
      enabled: false  # POST请求不经过CDN缓存
    redis:
      ttl: 1800  # 30分钟
      prefix: "api:semantic"
      hash_body: true  # 对请求体哈希作为缓存键
      
  # 公式搜索
  formula_search:
    path: "/api/v1/search/formula"
    methods: ["GET", "POST"]
    cache_control:
      public: true
      max_age: 600  # 10分钟
    cdn:
      enabled: false
    redis:
      ttl: 1800  # 30分钟
      prefix: "api:formula"
      
  # 学习路径
  learning_paths:
    path: "/api/v1/learning-paths"
    methods: ["GET"]
    cache_control:
      private: true  # 用户特定
      max_age: 300  # 5分钟
    cdn:
      enabled: false  # 用户特定数据不缓存
    redis:
      ttl: 600  # 10分钟
      prefix: "api:paths"
      user_specific: true
      
  # 学习进度
  user_progress:
    path: "/api/v1/progress"
    methods: ["GET"]
    cache_control:
      private: true
      max_age: 60  # 1分钟
      no_store: false
    cdn:
      enabled: false
    redis:
      ttl: 300  # 5分钟
      prefix: "api:progress"
      user_specific: true
      invalidate_on_write: true
      
  # 推荐系统
  recommendations:
    path: "/api/v1/recommendations"
    methods: ["GET"]
    cache_control:
      private: true
      max_age: 300  # 5分钟
    cdn:
      enabled: false
    redis:
      ttl: 600  # 10分钟
      prefix: "api:rec"
      user_specific: true
      
  # 题目数据
  problems:
    path: "/api/v1/problems"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 3600  # 1小时
    cdn:
      edge_ttl: 3600
    redis:
      ttl: 7200  # 2小时
      prefix: "api:problems"
      
  # IMO题目详情
  imo_problem:
    path: "/api/v1/problems/imo/{year}/{number}"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 86400  # 1天（IMO题目不会变）
    cdn:
      edge_ttl: 86400
    redis:
      ttl: 604800  # 7天
      prefix: "api:imo"
      
  # 定理详情
  theorem_detail:
    path: "/api/v1/theorems/{id}"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 3600  # 1小时
    cdn:
      edge_ttl: 3600
    redis:
      ttl: 7200  # 2小时
      prefix: "api:theorem"
      
  # Mathlib4引用
  mathlib_refs:
    path: "/api/v1/references/mathlib4"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 7200  # 2小时
    cdn:
      edge_ttl: 7200
    redis:
      ttl: 14400  # 4小时
      prefix: "api:mathlib"
      
  # 健康检查 - 不缓存
  health:
    path: "/health"
    methods: ["GET"]
    cache_control:
      no_cache: true
      no_store: true
      must_revalidate: true
    cdn:
      enabled: false
    redis:
      enabled: false
      
  # 统计信息
  stats:
    path: "/api/v1/stats"
    methods: ["GET"]
    cache_control:
      public: true
      max_age: 300  # 5分钟
    cdn:
      edge_ttl: 300
    redis:
      ttl: 600  # 10分钟
      prefix: "api:stats"
      
  # 用户认证 - 不缓存
  auth:
    path: "/api/v1/auth/*"
    methods: ["POST", "PUT", "DELETE"]
    cache_control:
      no_store: true
      no_cache: true
    cdn:
      enabled: false
    redis:
      enabled: false
      
  # WebSocket 握手
  websocket:
    path: "/api/v1/ws/*"
    methods: ["GET"]
    cache_control:
      no_store: true
    cdn:
      enabled: false
    redis:
      enabled: false

# ============ 缓存键生成策略 ============
cache_key:
  # 默认包含所有查询参数
  default:
    include_params: "*"
    exclude_params: ["callback", "_", "timestamp"]
    
  # 特定端点的缓存键配置
  custom:
    - path: "/api/v1/search"
      normalize: true  # 规范化查询词
      max_query_length: 100
      
    - path: "/api/v1/search/semantic"
      hash_body: true
      body_fields: ["query", "embedding_model", "top_k"]

# ============ 缓存失效策略 ============
invalidation:
  # 事件驱动失效
  events:
    - name: "concept_updated"
      patterns: ["api:concept:*", "api:kg:*"]
      
    - name: "new_theorem"
      patterns: ["api:theorem:*", "api:kg:*", "api:mathlib:*"]
      
    - name: "user_progress_updated"
      patterns: ["api:progress:{user_id}*", "api:paths:{user_id}*"]
      
    - name: "daily_stats"
      patterns: ["api:stats:*"]
      schedule: "0 0 * * *"  # 每天午夜
      
  # API触发失效
  api_invalidation:
    endpoint: "/api/v1/admin/cache/invalidate"
    auth_required: true
    rate_limit:
      requests: 10
      window: 60

# ============ 预热配置 ============
warmup:
  enabled: true
  # 高优先级端点
  high_priority:
    - endpoint: "/api/v1/concepts"
      params: { "page": 1, "per_page": 20 }
      
    - endpoint: "/api/v1/concept-graph"
      params: { "branch": "main", "depth": 2 }
      
    - endpoint: "/api/v1/problems"
      params: { "category": "algebra", "page": 1 }
      
  # 预热调度
  schedule:
    - time: "0 3 * * *"  # 每天凌晨3点
      endpoints: ["high_priority"]
      
    - time: "0 */6 * * *"  # 每6小时
      endpoints: ["/api/v1/stats"]
