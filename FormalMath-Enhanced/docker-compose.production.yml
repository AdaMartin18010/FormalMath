# ============================================
# FormalMath - 生产环境Docker Compose配置
# 优化内容：安全加固、资源限制、健康检查、日志管理
# ============================================

version: '3.8'

services:
  # Nginx反向代理 - 优化配置
  nginx:
    image: nginx:alpine-slim
    container_name: formalmath-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=100m
      - /var/run:noexec,nosuid,size=100m
    ports:
      - "80:80'
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-run:/var/run
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - formalmath-network
    healthcheck:
      test: ['CMD", "curl', "-f", 'http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file'
      options:
        max-size: "10m"
        max-file: '5"
        labels: "service_name,environment'
        env: "OS_VERSION"

  # FastAPI后端服务 - 优化配置
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
      target: production
    container_name: formalmath-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    env_file:
      - .env.production
    environment:
      - DEBUG=false
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - formalmath-network
    healthcheck:
      test: ['CMD", "python', "-c", 'import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
    logging:
      driver: "json-file'
      options:
        max-size: "10m"
        max-file: '5"
        labels: "service_name,environment'

  # 前端静态文件服务 - 优化配置
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.optimized
      target: production
    container_name: formalmath-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=50m
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api/v1
    networks:
      - formalmath-network
    healthcheck:
      test: ["CMD", 'curl", "-f', "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "3"

  # Redis缓存和消息队列 - 优化配置
  redis:
    image: redis:7-alpine
    container_name: formalmath-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.core.somaxconn=65535
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
      --tcp-keepalive 60
      --timeout 0
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - formalmath-network
    healthcheck:
      test: ['CMD", "redis-cli', "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "3"

  # Celery工作节点 - 优化配置
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
      target: production
    container_name: formalmath-celery-worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    command: celery -A celery_worker worker --loglevel=INFO --concurrency=4 --prefetch-multiplier=1
    env_file:
      - .env.production
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - formalmath-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      replicas: 2
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "5"

  # Celery定时任务调度器 - 优化配置
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend.optimized
      target: production
    container_name: formalmath-celery-beat
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    command: celery -A celery_beat beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.production
    volumes:
      - backend-data:/app/data
      - celery-beat-data:/app/celerybeat
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - formalmath-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "3"

  # 日志收集器 - Fluent Bit
  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: formalmath-fluent-bit
    restart: unless-stopped
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logs:/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    depends_on:
      - backend
      - frontend
    networks:
      - formalmath-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "3"
    profiles:
      - logging

  # 监控 - Prometheus（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: formalmath-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - formalmath-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "3"
    profiles:
      - monitoring

  # 监控 - Grafana（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: formalmath-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://formalmath.example.com/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - formalmath-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: 'json-file"
      options:
        max-size: "10m'
        max-file: "3"
    profiles:
      - monitoring

# 密钥管理
secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

# 网络配置
networks:
  formalmath-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: formalmath-br0

# 数据卷配置
volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
  redis-data:
    driver: local
  celery-beat-data:
    driver: local
  nginx-cache:
    driver: local
  nginx-run:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
