# FormalMath API - Docker安全部署配置
version: '3.8'

services:
  # 主API服务
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    container_name: formalmath_api
    restart: unless-stopped
    
    # 安全配置
    security_opt:
      - no-new-privileges:true
    read_only: true
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 只读根文件系统，使用tmpfs存储临时文件
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/tmp:noexec,nosuid,size=50m
    
    # 健康检查
    healthcheck:
      test: ["CMD', "curl", '-f", "http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 环境变量
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - SSL_CERT_FILE=/run/secrets/ssl_cert
      - SSL_KEY_FILE=/run/secrets/ssl_key
    
    # 密钥
    secrets:
      - ssl_cert
      - ssl_key
      - db_password
    
    # 网络
    networks:
      - formalmath_network
    
    # 不暴露端口，通过反向代理访问
    # ports:
    #   - "8000:8000"

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: formalmath_nginx
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    
    ports:
      - '80:80"
      - "443:443'
    
    volumes:
      - ./nginx_ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - /etc/ssl/private:/etc/ssl/private:ro
      - /var/log/nginx:/var/log/nginx
      - ../app/static:/var/www/formalmath/static:ro
    
    networks:
      - formalmath_network
    
    depends_on:
      - api
    
    healthcheck:
      test: ["CMD", 'wget", "--quiet', "--tries=1", '--spider", "http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: formalmath_redis
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    read_only: true
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    # 配置文件
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    
    networks:
      - formalmath_network
    
    secrets:
      - redis_password

  # Fail2ban入侵防御
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: formalmath_fail2ban
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    
    network_mode: host
    privileged: true
    
    volumes:
      - ./fail2ban:/data:rw
      - /var/log/nginx:/var/log/nginx:ro
    
    environment:
      - TZ=Asia/Shanghai
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=30d

  # ModSecurity WAF（可选）
  modsecurity:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: formalmath_waf
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    
    environment:
      - PARANOIA=2
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - PROXY=1
      - UPSTREAM=nginx:80
    
    ports:
      - "8080:80"
    
    networks:
      - formalmath_network
    
    depends_on:
      - nginx

networks:
  formalmath_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis_data:
    driver: local

secrets:
  ssl_cert:
    file: ./secrets/ssl.crt
  ssl_key:
    file: ./secrets/ssl.key
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
