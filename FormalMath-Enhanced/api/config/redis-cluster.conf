# ================================
# FormalMath API - Redis 集群配置
# 版本: 7.x
# 最后更新: 2026-04-04
# ================================

# ------------------------------------------------------------------------------
# 基础配置
# ------------------------------------------------------------------------------
bind 0.0.0.0                           # 监听地址
protected-mode yes                     # 保护模式
port 6379                              # 服务端口
tcp-backlog 511                        # TCP监听队列长度
timeout 300                            # 客户端空闲超时（秒）
tcp-keepalive 300                      # TCP保活检测间隔

# ------------------------------------------------------------------------------
# TLS/SSL配置（生产环境必需）
# ------------------------------------------------------------------------------
tls-port 6380                          # TLS端口
tls-cert-file /etc/redis/redis.crt     # 证书文件
tls-key-file /etc/redis/redis.key      # 私钥文件
tls-ca-cert-file /etc/redis/ca.crt     # CA证书

tls-protocols "TLSv1.2 TLSv1.3"        # 允许的TLS版本
tls-ciphers DEFAULT:!MEDIUM            # 加密套件
tls-prefer-server-ciphers yes          # 优先使用服务器加密套件

tls-cluster yes                        # 集群TLS
tls-replication yes                    # 复制TLS
tls-protocols "TLSv1.2"

# ------------------------------------------------------------------------------
# 通用配置
# ------------------------------------------------------------------------------
daemonize no                           # 不以后台模式运行（容器环境）
supervised systemd                     # 监督方式
pidfile /var/run/redis/redis-server.pid
loglevel notice                        # 日志级别
databases 16                           # 数据库数量

# 快照配置（RDB）
save 900 1                             # 900秒内1次修改
save 300 10                            # 300秒内10次修改
save 60 10000                          # 60秒内10000次修改

stop-writes-on-bgsave-error yes        # 快照失败时停止写入
rdbcompression yes                     # RDB压缩
rdbchecksum yes                        # RDB校验
dbfilename dump.rdb                    # RDB文件名
dir /var/lib/redis                     # 数据目录

# AOF配置
appendonly yes                         # 启用AOF
appendfilename "appendonly.aof"        # AOF文件名
appendfsync everysec                   # 每秒同步
no-appendfsync-on-rewrite no           # 重写时不暂停同步
auto-aof-rewrite-percentage 100        # AOF重写触发百分比
auto-aof-rewrite-min-size 64mb         # AOF重写最小大小
aof-load-truncated yes                 # 加载截断的AOF
aof-use-rdb-preamble yes               # RDB-AOF混合持久化

# ------------------------------------------------------------------------------
# 内存管理
# ------------------------------------------------------------------------------
maxmemory 4gb                          # 最大内存限制
maxmemory-policy allkeys-lru           # 淘汰策略
maxmemory-samples 10                   # 采样数量

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ------------------------------------------------------------------------------
# 集群配置
# ------------------------------------------------------------------------------
cluster-enabled yes                    # 启用集群模式
cluster-config-file nodes.conf         # 集群配置文件
cluster-node-timeout 5000              # 节点超时（毫秒）
cluster-require-full-coverage no       # 不需要全集群覆盖
cluster-replica-validity-factor 10     # 副本有效性因子
cluster-migration-barrier 1            # 迁移屏障
cluster-allow-reads-when-down no       # 集群宕机时允许读取

# 副本配置
replica-serve-stale-data yes           # 副本提供过期数据
replica-read-only yes                  # 副本只读
repl-diskless-sync yes                 # 无盘复制
repl-diskless-sync-delay 5             # 无盘复制延迟
repl-ping-replica-period 10            # 复制心跳周期
repl-timeout 60                        # 复制超时
repl-disable-tcp-nodelay no            # 不禁用TCP_NODELAY
replica-priority 100                   # 副本优先级

# ------------------------------------------------------------------------------
# 慢查询日志
# ------------------------------------------------------------------------------
slowlog-log-slower-than 10000          # 慢查询阈值（微秒）
slowlog-max-len 128                    # 慢查询日志长度

# ------------------------------------------------------------------------------
# 延迟监控
# ------------------------------------------------------------------------------
latency-monitor-threshold 100          # 延迟监控阈值

# ------------------------------------------------------------------------------
# 事件通知
# ------------------------------------------------------------------------------
notify-keyspace-events "Ex"            # 键过期事件通知

# ------------------------------------------------------------------------------
# 线程配置
# ------------------------------------------------------------------------------
io-threads 4                           # IO线程数
io-threads-do-reads yes                # IO线程处理读取

# ------------------------------------------------------------------------------
# 安全
# ------------------------------------------------------------------------------
requirepass your_strong_password_here  # 访问密码
masterauth your_strong_password_here   # 主节点密码

# 命令重命名（禁用危险命令）
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_2f3a9b1c"
rename-command DEBUG ""
rename-command SHUTDOWN "SHUTDOWN_9c8b7a6f"

# ACL配置（Redis 6+）
# user default on >your_password ~* &* +@all
# user readonly on >readonly_password ~* &* +@read

# ------------------------------------------------------------------------------
# 性能优化
# ------------------------------------------------------------------------------
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes                    # 主动重哈希
activedefrag yes                       # 主动碎片整理
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

# ------------------------------------------------------------------------------
# 高级配置
# ------------------------------------------------------------------------------
# 渐进式rehash
dynamic-hz yes                         # 动态HZ
hz 10                                  # 定时任务频率

# 后台保存
rdb-save-incremental-fsync yes         # 增量fsync
aof-rewrite-incremental-fsync yes
