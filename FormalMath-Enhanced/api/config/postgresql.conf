# ================================
# FormalMath API - PostgreSQL 生产配置文件
# 版本: 15.x / 16.x
# 最后更新: 2026-04-04
# ================================

# ------------------------------------------------------------------------------
# 连接与认证
# ------------------------------------------------------------------------------
listen_addresses = '*'                  # 监听所有接口
port = 5432                             # 默认端口
max_connections = 500                   # 最大连接数（根据内存调整）
superuser_reserved_connections = 10     # 为超级用户保留的连接

# SSL配置
ssl = on
ssl_cert_file = '/etc/ssl/certs/postgresql.crt'
ssl_key_file = '/etc/ssl/private/postgresql.key'
ssl_ca_file = '/etc/ssl/certs/ca.crt'

# 认证
gss_accept_delegation = off
password_encryption = scram-sha-256

# ------------------------------------------------------------------------------
# 内存配置（根据服务器内存调整）
# 假设服务器内存: 32GB
# ------------------------------------------------------------------------------
shared_buffers = 8GB                    # 25% of RAM
work_mem = 32MB                         # 每个查询操作内存
maintenance_work_mem = 2GB              # 维护操作内存
effective_cache_size = 24GB             # 75% of RAM
huge_pages = try                        # 尝试使用大页

temp_buffers = 8MB                      # 临时表内存
max_prepared_transactions = 100         # 预准备事务

# ------------------------------------------------------------------------------
# WAL (Write-Ahead Logging) 配置
# ------------------------------------------------------------------------------
wal_level = replica                     # WAL级别 (minimal, replica, logical)
wal_buffers = 64MB                      # WAL缓冲区
max_wal_size = 4GB                      # 最大WAL大小
min_wal_size = 1GB                      # 最小WAL大小
checkpoint_completion_target = 0.9      # 检查点完成目标
checkpoint_timeout = 10min              # 检查点超时

# WAL归档（用于备份和复制）
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/archive/%f'
archive_timeout = 600                   # 强制归档超时

# WAL压缩
wal_compression = on

# ------------------------------------------------------------------------------
# 复制与高可用
# ------------------------------------------------------------------------------
max_wal_senders = 10                    # 最大WAL发送进程
max_replication_slots = 10              # 最大复制槽
wal_keep_size = 2GB                     # 保留的WAL大小

# 热备配置
hot_standby = on
hot_standby_feedback = on

# ------------------------------------------------------------------------------
# 查询优化器
# ------------------------------------------------------------------------------
default_statistics_target = 500         # 默认统计目标
effective_io_concurrency = 200          # 有效IO并发数
random_page_cost = 1.1                  # 随机页成本（SSD）
seq_page_cost = 1.0                     # 顺序页成本

# 并行查询
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
max_worker_processes = 8

# 启用JIT
jit = on
jit_above_cost = 100000

# ------------------------------------------------------------------------------
# 日志配置
# ------------------------------------------------------------------------------
logging_collector = on
log_destination = 'stderr,csvlog'       # 日志输出方式
log_directory = '/var/log/postgresql'   # 日志目录
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d                   # 日志轮转周期
log_rotation_size = 100MB               # 日志轮转大小
log_truncate_on_rotation = off

# 日志级别
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000       # 记录超过1秒的查询

# 日志内容
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 10MB                   # 记录超过10MB的临时文件
log_autovacuum_min_duration = 0

# 慢查询日志
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'ddl'                   # 记录DDL语句

# ------------------------------------------------------------------------------
# 自动清理
# ------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 6
autovacuum_naptime = 10s                # 清理间隔
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05   # 5%的表大小
autovacuum_analyze_scale_factor = 0.025 # 2.5%的表大小

# 清理成本限制
autovacuum_vacuum_cost_limit = 3000
autovacuum_vacuum_cost_delay = 2ms

# ------------------------------------------------------------------------------
# 锁与事务
# ------------------------------------------------------------------------------
deadlock_timeout = 1s                   # 死锁检测超时
lock_timeout = 30s                      # 锁等待超时
statement_timeout = 60s                 # 语句执行超时
idle_in_transaction_session_timeout = 10min  # 空闲事务超时

# ------------------------------------------------------------------------------
# 性能监控
# ------------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements,pg_prewarm,auto_explain'

# pg_stat_statements配置
track_activity_query_size = 4096
track_io_timing = on
track_functions = pl

# auto_explain配置
auto_explain.log_min_duration = 2000    # 记录超过2秒的查询计划
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_format = text

# ------------------------------------------------------------------------------
# 时区与区域设置
# ------------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Asia/Shanghai'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# ------------------------------------------------------------------------------
# 安全设置
# ------------------------------------------------------------------------------
log_replication_commands = on
row_security = on

# 限制超级用户
allow_system_table_mods = off

# 文件访问限制
allow_in_place_tablespaces = off

# ------------------------------------------------------------------------------
# 扩展配置
# ------------------------------------------------------------------------------
extension_deployment = on

# UUID生成
uuid_v7_server_id = 0
