# ================================
# FormalMath API - Redis Sentinel 配置
# 版本: 7.x
# 用于监控Redis主从架构
# ================================

# Sentinel端口
port 26379

# 绑定地址
bind 0.0.0.0

# 保护模式
protected-mode no

# 工作目录
dir /var/lib/redis

# 监控主节点
# sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor formalmath-master 127.0.0.1 6379 2

# 认证密码
sentinel auth-pass formalmath-master your_strong_password_here

# 主节点宕机判断时间（毫秒）
sentinel down-after-milliseconds formalmath-master 5000

# 并行同步副本数
sentinel parallel-syncs formalmath-master 1

# 故障转移超时（毫秒）
sentinel failover-timeout formalmath-master 60000

# 通知脚本（可选）
# sentinel notification-script formalmath-master /path/to/notify.sh

# 客户端重新配置脚本（可选）
# sentinel client-reconfig-script formalmath-master /path/to/reconfig.sh

# 日志配置
loglevel notice
logfile /var/log/redis/sentinel.log

# 禁止危险命令
rename-command SENTINEL ""
