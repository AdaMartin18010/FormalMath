# FormalMath API - Alembic 迁移配置
# 数据库迁移工具配置
# 文档: https://alembic.sqlalchemy.org/

[alembic]
# 迁移脚本存放路径
script_location = migrations

# 模板文件
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时间戳格式
prepend_sys_path = .

# 版本路径
version_path_separator = os

# 数据库连接URL（从环境变量读取）
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# 代码格式化钩子
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
