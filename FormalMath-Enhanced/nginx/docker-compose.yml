version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: formalmath-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # 状态监控端口
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./cache:/var/cache/nginx
      - ./logs:/var/log/nginx
      - ./www:/var/www:ro
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    networks:
      - formalmath-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    sysctls:
      - net.core.somaxconn=65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # Certbot 用于自动证书续期
  certbot:
    image: certbot/certbot
    container_name: formalmath-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - formalmath-network

networks:
  formalmath-network:
    external: true
