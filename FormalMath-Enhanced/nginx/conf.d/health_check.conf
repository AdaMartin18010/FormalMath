# ============================================
# Nginx Plus 健康检查配置 (开源版注释说明)
# ============================================
# 
# 注意：主动健康检查需要 Nginx Plus 商业版
# 开源版 Nginx 使用被动健康检查 (max_fails, fail_timeout)
#
# 如需主动健康检查，可安装 nginx_upstream_check_module 模块
# 或使用第三方工具如 Consul + consul-template

# ============================================
# 被动健康检查说明 (开源版默认)
# ============================================
# 已在 upstream.conf 中配置：
# - max_fails=3    : 连续失败3次认为服务器不可用
# - fail_timeout=30s : 30秒内失败3次则标记为down
# - backup         : 备用服务器，仅在主服务器不可用时使用

