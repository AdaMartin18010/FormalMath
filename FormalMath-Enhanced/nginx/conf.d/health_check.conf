# ============================================
# 第三方健康检查方案
# ============================================

# 1. Consul + consul-template
#    - Consul 定期执行健康检查
#    - consul-template 根据健康状态更新 Nginx 配置
#    - Nginx 重载配置

# 2. HAProxy 作为 Nginx 前端
#    - HAProxy 提供主动健康检查
#    - Nginx 处理 SSL 终止和业务逻辑

# 3. Keepalived + 多 Nginx 实例
#    - 实现 Nginx 自身的高可用
#    - VRRP 协议进行故障切换

# ============================================
# 应用层健康检查端点建议
# ============================================
# 
# 应用应实现以下健康检查端点：
#
# GET /health
# 返回：
# {
#   "status": "healthy",
#   "timestamp": "2026-04-04T15:30:00Z",
#   "checks": {
#     "database": "ok",
#     "cache": "ok",
#     "disk": "ok"
#   }
# }
#
# GET /ready
# 返回服务是否准备好接收流量（启动后检查）
#
# GET /live
# 返回服务是否存活（Kubernetes liveness probe 风格）
