# ============================================
# 缓存预热脚本
# ============================================

#!/bin/bash
# cache-warmup.sh
# 常用 URL 列表预热缓存

URLS=(
    "https://formalmath.example.com/"
    "https://formalmath.example.com/api/v1/concepts"
    "https://formalmath.example.com/api/v1/theorems"
)

for url in "${URLS[@]}"; do
    curl -s -o /dev/null -w "%{http_code} %{time_total}s $url\n" "$url"
done
