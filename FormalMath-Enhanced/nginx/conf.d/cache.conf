# ============================================
# 缓存策略详细配置
# ============================================

# ============================================
# 缓存路径定义
# ============================================

# 动态内容缓存（API响应）
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:100m 
                 max_size=5g inactive=10m use_temp_path=off;

# 页面缓存
proxy_cache_path /var/cache/nginx/pages levels=1:2 keys_zone=page_cache:200m 
                 max_size=10g inactive=60m use_temp_path=off;

# 静态资源缓存（长期）
proxy_cache_path /var/cache/nginx/assets levels=1:2 keys_zone=asset_cache:500m 
                 max_size=20g inactive=30d use_temp_path=off;

# 微缓存（短时间缓存动态内容）
proxy_cache_path /var/cache/nginx/micro levels=1:2 keys_zone=micro_cache:10m 
                 max_size=100m inactive=1s use_temp_path=off;

# ============================================
# 缓存键定义
# ============================================

# 标准缓存键
map $request_method $cache_key {
    default $scheme$request_method$host$request_uri;
    POST $scheme$request_method$host$request_uri$request_body;
}

# 带用户区分的缓存键（用于登录用户）
map $http_cookie $user_cache_key {
    default $scheme$request_method$host$request_uri;
    ~*session_id=([^;]+) $scheme$request_method$host$request_uri$1;
}

# ============================================
# 缓存绕过规则
# ============================================

# 不缓存的条件
map $http_cookie $no_cache {
    default 0;
    ~*"(logged_in|admin)" 1;
}

map $request_method $bypass_cache {
    default 0;
    POST 1;
    PUT 1;
    DELETE 1;
    PATCH 1;
}

# ============================================
# 缓存配置示例
# ============================================

# API 缓存配置
location /api/v1/ {
    proxy_pass http://formalmath_api;
    
    proxy_cache api_cache;
    proxy_cache_key $cache_key;
    proxy_cache_valid 200 302 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    
    # 缓存控制
    proxy_cache_bypass $bypass_cache $http_cache_control;
    proxy_no_cache $no_cache;
    
    # 后台更新
    proxy_cache_background_update on;
    proxy_cache_lock on;
    
    # 缓存头信息
    add_header X-Cache-Status $upstream_cache_status;
    add_header X-Cache-Key $cache_key;
}

# 微缓存配置（1秒缓存，适合高并发动态页面）
location /search/ {
    proxy_pass http://formalmath_app;
    
    proxy_cache micro_cache;
    proxy_cache_valid 200 1s;
    proxy_cache_use_stale updating;
    
    add_header X-Cache-Status $upstream_cache_status;
}

# 静态资源缓存
location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://formalmath_static;
    
    proxy_cache asset_cache;
    proxy_cache_key $scheme$request_method$host$request_uri;
    proxy_cache_valid 200 302 30d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    
    # 客户端缓存
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Cache-Status $upstream_cache_status;
    
    access_log off;
}

