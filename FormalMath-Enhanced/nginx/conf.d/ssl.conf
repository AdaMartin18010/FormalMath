# ============================================
# SSL/TLS 配置指南
# ============================================

# 生产环境请使用有效证书
# 以下命令用于生成自签名证书（仅测试使用）

# 生成自签名证书命令：
# openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#   -keyout /etc/nginx/ssl/formalmath.key \
#   -out /etc/nginx/ssl/formalmath.crt \
#   -subj "/C=CN/ST=Beijing/L=Beijing/O=FormalMath/CN=formalmath.example.com"

# 生成 DH 参数（提高安全性）：
# openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048

# ============================================
# Let's Encrypt 证书申请脚本
# ============================================

#!/bin/bash
# certbot-renew.sh
# 保存到 /etc/nginx/ssl/certbot-renew.sh

certbot certonly --webroot \
  -w /var/www/certbot \
  -d formalmath.example.com \
  --agree-tos \
  --non-interactive \
  --email admin@example.com

# 证书更新后重载 Nginx
nginx -s reload

# ============================================
# 自动续期 cron 任务
# ============================================
# 添加到 crontab: crontab -e
# 0 2 * * * /etc/nginx/ssl/certbot-renew.sh >> /var/log/certbot-renew.log 2>&1

# ============================================
# 完整 SSL 配置示例
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name formalmath.example.com;
    
    # 证书路径
    ssl_certificate /etc/letsencrypt/live/formalmath.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/formalmath.example.com/privkey.pem;
    
    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # DH 参数
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    
    # 会话缓存
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/formalmath.example.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # HSTS (启用前确保 HTTPS 正常工作)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # 其他安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
