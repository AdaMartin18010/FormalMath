# FormalMath 负载均衡配置
# 包含健康检查、会话保持、SSL终止、缓存策略

# ============================================
# 上游服务器组定义
# ============================================

# 主应用服务器组 - 权重轮询
upstream formalmath_app {
    least_conn;
    
    server 10.0.1.10:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.11:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.12:8080 weight=3 max_fails=3 fail_timeout=30s backup;
    
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# API服务器组 - 基于IP哈希的会话保持
upstream formalmath_api {
    ip_hash;
    
    server 10.0.1.20:3000 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.21:3000 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.22:3000 weight=3 max_fails=3 fail_timeout=30s backup;
    
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# WebSocket服务器组 - 粘性会话
upstream formalmath_ws {
    ip_hash;
    
    server 10.0.1.30:8081 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.31:8081 weight=5 max_fails=3 fail_timeout=30s;
    
    keepalive 16;
    keepalive_timeout 60s;
}

# 静态资源服务器组
upstream formalmath_static {
    server 10.0.1.40:80 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.41:80 weight=5 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

# ============================================
# 缓存配置
# ============================================

# 代理缓存路径
proxy_cache_path /var/cache/nginx/formalmath levels=1:2 keys_zone=formalmath_cache:100m 
                 max_size=10g inactive=60m use_temp_path=off;

# 静态资源缓存
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m 
                 max_size=5g inactive=7d use_temp_path=off;

# ============================================
# 限流配置
# ============================================

# IP限流 - 每秒10请求，突发20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 连接数限制
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ============================================
# 主服务器配置 - HTTP (重定向到HTTPS)
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name formalmath.example.com;
    
    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ACME挑战 (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================
# 主服务器配置 - HTTPS
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name formalmath.example.com;
    
    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/formalmath.crt;
    ssl_certificate_key /etc/nginx/ssl/formalmath.key;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.crt;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # 根路径 - 主应用
    location / {
        proxy_pass http://formalmath_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # API路径
    location /api/ {
        # 限流
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 10;
        
        proxy_pass http://formalmath_api;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # API缓存
        proxy_cache formalmath_cache;
        proxy_cache_valid 200 302 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # WebSocket路径
    location /ws/ {
        proxy_pass http://formalmath_ws;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # 静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://formalmath_static;
        
        # 静态资源缓存
        proxy_cache static_cache;
        proxy_cache_valid 200 302 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        
        # 客户端缓存
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        
        access_log off;
    }
    
    # 健康检查端点
    location /health {
        access_log off;
        
        # 检查上游服务器健康状态
        proxy_pass http://formalmath_app/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        
        # 如果上游不健康，返回503
        error_page 502 503 = @health_fallback;
    }
    
    location @health_fallback {
        return 503 "Service Unavailable";
        add_header Content-Type text/plain;
    }
}

# ============================================
# 状态监控 (限制访问)
# ============================================

server {
    listen 8080;
    server_name localhost;
    
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }
}
