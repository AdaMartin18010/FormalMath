# 概念关系定义
concept_relations:
  # 包含关系
  contains:
    - [Abstract Algebra, Group Theory]
    - [Abstract Algebra, Ring Theory]
    - [Abstract Algebra, Field Theory]
    - [Abstract Algebra, Linear Algebra]
    - [Abstract Algebra, Representation Theory]
    - [Ring Theory, Commutative Algebra]
    - [Field Theory, Galois Theory]
    - [Homological Algebra, Homology]
    
  # 依赖关系
  depends_on:
    - [Ring, Group]
    - [Field, Ring]
    - [Vector Space, Field]
    - [Module, Ring]
    - [Representation, Group]
    - [Representation, Vector Space]
    - [Homology, Module]
    - [Galois Theory, Field]
    - [Commutative Algebra, Ring]
    - [Homological Algebra, Homology]
    
  # 等价关系
  equivalent:
    - [Vector Space, Module over Field]
    
  # 推广关系
  generalizes:
    - [Module, Vector Space]
    - [Ring, Field]
    - [Group, Abelian Group]

