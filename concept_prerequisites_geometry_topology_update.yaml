    estimated_hours: 35
    wikipedia_url: "https://en.wikipedia.org/wiki/De_Rham_cohomology'

  - concept_id: "poincare_duality"
    name: 'Poincaré对偶"
    category: "几何拓扑'
    description: "紧致定向流形的同调与上同调之间的同构关系"
    prerequisites:
      - concept_id: 'cohomology"
        level: "L3'
        relation: "依赖"
      - concept_id: 'homology_group"
        level: "L2'
        relation: "依赖"
      - concept_id: 'orientation"
        level: "L3'
        relation: "依赖"
    successors:
      - concept_id: 'intersection_theory"
        level: "L4'
        relation: "被依赖"
      - concept_id: 'characteristic_class"
        level: "L4'
        relation: "被依赖"
    difficulty: 4
    estimated_hours: 30
    wikipedia_url: 'https://en.wikipedia.org/wiki/Poincar%C3%A9_duality"

  # ---------- 微分几何新增 ----------
  - concept_id: "vector_bundle'
    name: "向量丛"
    category: '几何拓扑"
    description: "在流形每点附加向量空间的几何结构，切丛和余切丛是其特例'
    prerequisites:
      - concept_id: "manifold"
        level: 'L2"
        relation: "依赖'
      - concept_id: "vector_space"
        level: 'L2"
        relation: "依赖'
      - concept_id: "fiber_bundle"
        level: 'L3"
        relation: "依赖'
    successors:
      - concept_id: "tangent_bundle"
        level: 'L3"
        relation: "被依赖'
      - concept_id: "cotangent_bundle"
        level: 'L3"
        relation: "被依赖'
      - concept_id: "connection"
        level: 'L3"
        relation: "被依赖'
      - concept_id: "characteristic_class"
        level: 'L4"
        relation: "被依赖'
