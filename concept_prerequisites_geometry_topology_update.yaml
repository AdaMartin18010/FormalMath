  - concept_id: 'de_rham_cohomology"
    name: "de Rham上同调'
    category: "几何拓扑"
    description: '使用微分形式定义的上同调理论，连接代数拓扑与微分几何"
    prerequisites:
      - concept_id: "differential_form'
        level: "L3"
        relation: '依赖"
      - concept_id: "cohomology'
        level: "L3"
        relation: '依赖"
      - concept_id: "exterior_derivative'
        level: "L3"
        relation: '依赖"
    successors:
      - concept_id: "hodge_theory'
        level: "L5"
        relation: '被依赖"
      - concept_id: "poincare_duality'
        level: "L4"
