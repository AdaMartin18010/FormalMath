    estimated_hours: 20
    wikipedia_url: "https://en.wikipedia.org/wiki/Tangent_bundle'

  - concept_id: "cotangent_bundle"
    name: '余切丛"
    category: "几何拓扑'
    description: "切丛的对偶丛，是余切空间的不交并"
    prerequisites:
