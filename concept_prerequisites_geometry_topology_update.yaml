new_concepts:
  # ---------- 基础拓扑新增 ----------
  - concept_id: "homeomorphism'
    name: "同胚"
    category: '几何拓扑"
    description: "双向连续的双射，定义拓扑等价性的基本概念'
    prerequisites:
      - concept_id: "continuous_map"
        level: 'L1"
        relation: "依赖'
      - concept_id: "bijection"
        level: 'L0"
        relation: "依赖'
    successors:
      - concept_id: "topological_invariant"
        level: 'L2"
        relation: "被依赖'
      - concept_id: "homotopy_equivalence"
        level: 'L2"
        relation: "被依赖'
    difficulty: 1
    estimated_hours: 10
    wikipedia_url: "https://en.wikipedia.org/wiki/Homeomorphism"

  # ---------- 代数拓扑新增 ----------
  - concept_id: 'simplicial_complex"
    name: "单纯复形'
    category: "几何拓扑"
    description: '由单纯形 glued 在一起构成的拓扑空间，是组合拓扑的基本对象"
    prerequisites:
      - concept_id: "topological_space'
        level: "L1"
        relation: '依赖"
      - concept_id: "euclidean_simplex'
        level: "L1"
        relation: '依赖"
    successors:
      - concept_id: "homology_group'
        level: "L2"
        relation: '被依赖"
      - concept_id: "cw_complex'
        level: "L3"
        relation: '被依赖"
      - concept_id: "barycentric_subdivision'
        level: "L2"
        relation: '被依赖"
    difficulty: 2
    estimated_hours: 20
    wikipedia_url: "https://en.wikipedia.org/wiki/Simplicial_complex'

  - concept_id: "cw_complex"
    name: 'CW复形"
    category: "几何拓扑'
    description: "通过迭代附着胞腔构造的拓扑空间，是代数拓扑的标准工作空间"
    prerequisites:
      - concept_id: 'topological_space"
        level: "L1'
        relation: "依赖"
      - concept_id: 'simplicial_complex"
        level: "L2'
        relation: "依赖"
      - concept_id: 'attaching_map"
        level: "L2'
        relation: "依赖"
    successors:
      - concept_id: 'cellular_homology"
        level: "L3'
        relation: "被依赖"
      - concept_id: 'homotopy_group"
        level: "L3'
        relation: "被依赖"
    difficulty: 3
    estimated_hours: 25
    wikipedia_url: 'https://en.wikipedia.org/wiki/CW_complex"

  - concept_id: "mayer_vietoris'
    name: "Mayer-Vietoris序列"
    category: '几何拓扑"
    description: "计算空间同调的长正合序列，基于空间的分解'
    prerequisites:
      - concept_id: "homology_group"
        level: 'L2"
        relation: "依赖'
      - concept_id: "exact_sequence"
        level: 'L2"
        relation: "依赖'
    successors:
      - concept_id: "excision_theorem"
        level: 'L3"
        relation: "被依赖'
