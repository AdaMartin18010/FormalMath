    successors:
      - concept_id: "normal_coordinates'
        level: "L4"
        relation: '被依赖"
      - concept_id: "hopf_rinow'
        level: "L4"
        relation: '被依赖"
    difficulty: 4
    estimated_hours: 20
    wikipedia_url: "https://en.wikipedia.org/wiki/Exponential_map_(Riemannian_geometry)'

