        level: 'L3"
        relation: "依赖'
    successors:
      - concept_id: "curvature"
        level: 'L4"
        relation: "被依赖'
      - concept_id: "geodesic"
        level: 'L3"
        relation: "被依赖'
    difficulty: 4
    estimated_hours: 25
    wikipedia_url: "https://en.wikipedia.org/wiki/Levi-Civita_connection"

  - concept_id: 'exponential_map"
    name: "指数映射'
    category: "几何拓扑"
    description: '将切空间映射到流形的映射，由测地线定义"
    prerequisites:
