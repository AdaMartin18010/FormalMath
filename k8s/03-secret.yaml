apiVersion: v1
kind: Secret
metadata:
  name: formalmath-secrets
  namespace: formalmath-prod
  labels:
    app.kubernetes.io/name: formalmath
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # 数据库密码（生产环境请使用强密码）
  DB_PASSWORD: "ChangeMeInProduction123!"
  DB_URL: "postgresql://formalmath:ChangeMeInProduction123!@postgres-service:5432/formalmath"
  
  # Redis密码（如果使用）
  REDIS_PASSWORD: ""
  
  # JWT密钥
  JWT_SECRET: "your-jwt-secret-key-change-in-production"
  JWT_REFRESH_SECRET: "your-jwt-refresh-secret-change-in-production"
  
  # 会话密钥
  SESSION_SECRET: "your-session-secret-change-in-production"
  
  # API密钥
  API_KEY: "your-api-key-change-in-production"
  
  # 外部服务密钥（如果需要）
  GITHUB_TOKEN: ""
  SENDGRID_API_KEY: ""
---
