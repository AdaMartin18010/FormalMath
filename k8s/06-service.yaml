apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: formalmath-prod
  labels:
    app.kubernetes.io/name: formalmath
    app.kubernetes.io/component: backend-service
spec:
  type: ClusterIP
  selector:
    app: backend
    tier: api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: formalmath-prod
  labels:
    app.kubernetes.io/name: formalmath
    app.kubernetes.io/component: frontend-service
spec:
  type: ClusterIP
  selector:
    app: frontend
    tier: web
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  sessionAffinity: None
---
