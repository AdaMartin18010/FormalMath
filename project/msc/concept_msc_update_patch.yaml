# 合并指南
# ============================================================================

merge_guide:
  target_file: "project/concept_prerequisites.yaml"
  method: "为对应concept_id的概念条目添加 msc_codes 字段"
  example_before: |
    - concept_id: "prime_numbers"
      name: "素数"
      category: "数论逻辑"
      prerequisites:
        ...
  example_after: |
    - concept_id: "prime_numbers"
      name: "素数"
      category: "数论逻辑"
      msc_codes:
        primary: "11A41"
        secondary: ["11A51", "11N05"]
        description: "素数分布、素性检验"
      prerequisites:
        ...
