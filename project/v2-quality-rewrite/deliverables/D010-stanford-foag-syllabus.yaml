course:
  code: "Stanford FOAG"
  name: "Foundations of Algebraic Geometry"
  author: "Ravi Vakil"
  source_url: "http://math.stanford.edu/~vakil/216blog/"
  version_note: "Based on the August 2022 public draft (and November 2017 draft where noted). Published by Princeton University Press."
  formal_math_alignment:
    grothendieck_philosophy: "数学家理念体系/格洛腾迪克数学理念/"
    algebraic_geometry_docs: "docs/13-代数几何/"

parts:
  - name: "Part I. Preliminaries"
    chapters:
      - number: "1"
        title: "Just enough category theory to be dangerous"
        sections:
          - "1.1 Categories and functors"
          - "1.2 Universal properties determine an object up to unique isomorphism"
          - "1.3 Limits and colimits"
          - "1.4 Adjoints"
          - "1.5 An introduction to abelian categories"
          - "1.6 Spectral sequences"
        definitions:
          - term: "category"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/01-范畴基础理论.md"
          - term: "functor"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/02-函子与自然变换.md"
          - term: "natural transformation"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/02-函子与自然变换.md"
          - term: "representable functor"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/05-Yoneda引理与可表函子.md"
          - term: "limit / colimit"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/03-极限与余极限.md"
          - term: "adjoint functors"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/04-伴随与等价.md"
          - term: "abelian category"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/06-Abel范畴与同调代数.md"
          - term: "spectral sequence"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/03-上同调理论/05-谱序列与Leray谱序列.md"
        theorems:
          - name: "Yoneda's Lemma"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/05-Yoneda引理与可表函子.md"
          - name: "Adjoint functors determine each other up to unique natural isomorphism"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/04-伴随与等价.md"
        exercises:
          - number: "1.2.A"
            topic: "Isomorphisms in a category are both monic and epic"
          - number: "1.2.C"
            topic: "Double dual is naturally isomorphic to the identity on finite-dimensional vector spaces"
          - number: "1.3.A"
            topic: "Initial and final objects are unique up to unique isomorphism"
          - number: "1.3.Y"
            topic: "Yoneda's Lemma (the mapping from natural transformations to elements)"
          - number: "1.3.Z"
            topic: "Natural transformations between representable functors and morphisms"
          - number: "1.4.A"
            topic: "Adjoints are unique up to unique isomorphism"
          - number: "1.5.B"
            topic: "Kernels and cokernels in abelian categories"
          - number: "1.6.D"
            topic: "Spectral sequence of a double complex converges to the total cohomology"
          - number: "1.6.E"
            topic: "Mapping cone gives a long exact sequence in cohomology"
          - number: "1.6.F"
            topic: "Short exact sequence of complexes yields a long exact sequence via spectral sequences"

      - number: "2"
        title: "Sheaves"
        sections:
          - "2.1 Motivating example: The sheaf of smooth functions"
          - "2.2 Definition of sheaf and presheaf"
          - "2.3 Morphisms of presheaves and sheaves"
          - "2.4 Properties determined at the level of stalks, and sheafification"
          - "2.5 Recovering sheaves from a sheaf on a base"
          - "2.6 Sheaves of abelian groups, and O_X-modules, form abelian categories"
          - "2.7 The inverse image sheaf"
        definitions:
          - term: "presheaf"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - term: "sheaf"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - term: "stalk"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - term: "sheafification"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - term: "sheaf on a base"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - term: "inverse image sheaf"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - term: "O_X-module"
            formal_math_path: "docs/13-代数几何/04-层与上同调-深度扩展版.md"
        theorems:
          - name: "Sheafification Theorem"
            formal_math_path: "数学家理念体系/格洛腾迪克数学理念/02-数学内容深度分析/01-范畴论与函子理论/08-预层与层化.md"
          - name: "Exactness can be checked at the level of stalks"
            formal_math_path: "docs/13-代数几何/04-层与上同调-深度扩展版.md"
        exercises:
          - number: "2.2.A"
            topic: "Constant presheaf is not a sheaf; constant sheaf is the sheafification"
          - number: "2.2.C"
            topic: "Pushforward of a sheaf is a sheaf"
          - number: "2.2.J"
            topic: "Stalks of O_X-modules are O_{X,p}-modules"
          - number: "2.3.C"
            topic: "Sheaf Hom and internal hom"
          - number: "2.4.B"
            topic: "Support of a section is closed"
          - number: "2.5.D"
            topic: "Gluing sheaves from a sheaf on a base"
          - number: "2.6.A"
            topic: "Kernels and cokernels of sheaves of abelian groups are sheaves"
          - number: "2.7.A"
            topic: "Inverse image sheaf is left adjoint to pushforward"
          - number: "2.7.B"
            topic: "Inverse image of the structure sheaf under a morphism of ringed spaces"
          - number: "2.7.C"
            topic: "Inverse image commutes with sheafification"
