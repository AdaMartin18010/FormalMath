  - title: "Module 4: Cohomology and the Geometry of Surfaces'
    description: "Applications of sheaf cohomology to the theory of algebraic surfaces, including intersection theory, Riemann-Roch for surfaces, and the classification of complex algebraic surfaces."
    topics:
      - name: 'Intersection Theory on Surfaces"
        definitions:
          - term: "Intersection pairing on a smooth surface'
            formal_math_path: "docs/13-代数几何/05-曲面的相交理论.md"
          - term: 'Self-intersection number C^2"
            formal_math_path: "docs/13-代数几何/05-曲面的相交理论.md'
          - term: "Blow-up of a surface at a point"
            formal_math_path: 'docs/13-代数几何/06-双有理几何基础.md"
          - term: "Exceptional divisor'
            formal_math_path: "docs/13-代数几何/06-双有理几何基础.md"
        theorems:
          - name: 'Bézout's theorem for surfaces (intersection of curves on a surface)"
            formal_math_path: "docs/13-代数几何/05-曲面的相交理论.md'
          - name: "Effect of blow-up on the Picard group: Pic(\tilde{S}) = Pic(S) \oplus Z E"
            formal_math_path: 'docs/13-代数几何/05-曲面的相交理论.md"
          - name: "Castelnuovo's contraction criterion'
            formal_math_path: "docs/13-代数几何/06-双有理几何基础.md"
