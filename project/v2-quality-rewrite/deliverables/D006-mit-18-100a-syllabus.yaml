exams:
  - name: "Midterm Exam"
    type: 'take-home (24-hour)"
    coverage: "Lectures 1–12 (Sets, real numbers, sequences, series, and convergence tests)'
    topics:
      - "Mathematical induction and set operations"
      - 'Cardinality, countability, and Cantor's theorem"
      - "Ordered fields, least upper bound property, and characterization of ℝ'
      - "Archimedean property and density of ℚ"
      - 'Convergent sequences, monotone sequences, subsequences"
      - "Squeeze theorem and algebraic properties of limits'
      - "Limsup, liminf, and Bolzano-Weierstrass theorem"
      - 'Cauchy sequences and completeness of ℝ"
      - "Infinite series, absolute convergence, comparison test'
      - "Ratio test, root test, and alternating series test"

  - name: 'Final Assignment"
    type: "take-home'
    coverage: "Lectures 13–25 (Limits of functions, continuity, differentiation, integration, sequences of functions, power series)"
    topics:
      - 'Limits of functions and sequential characterization"
      - "Continuity, uniform continuity, and classic examples (Dirichlet, Weierstrass)'
      - "Extreme value theorem and intermediate value theorem"
      - 'Derivative, differentiation rules, Rolle's theorem, mean value theorem"
      - "Taylor's theorem'
      - "Riemann integral, fundamental theorem of calculus"
      - 'Pointwise and uniform convergence of sequences of functions"
      - "Weierstrass M-test and interchanging limits'
      - "Power series and Weierstrass approximation theorem"

