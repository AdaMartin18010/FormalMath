## 3. 字段约束与校验规则

```yaml
validation_rules:
  general:
    - id 必须在同一文档内唯一，建议使用 `{领域}_{作者缩写}_{年份}` 格式。
    - 至少提供一个持久化标识符（DOI / ISBN / zbMATH / MR Number / arXiv ID）。
    - year 必须在 1600 至当前年份之间。
    - URL 必须以 http:// 或 https:// 开头。

  textbooks:
    - isbn 必须能通过 ISBN-13 校验（允许 ISBN-10，但建议同时提供 ISBN-13）。
    - 若引用目的是支撑某个定理或定义，chapters 字段必须非空。

  papers:
    - doi 格式必须符合 `10.xxxx/xxxxx` 规范。
    - 若 arxiv_id 存在，必须以 `arXiv:` 开头。
    - 1900 年后的论文若公开可用，强烈建议提供 doi 字段。

  databases:
    - stacks_project 的 identifier 必须是 4 位字母数字组合（见第5节）。
    - zbmath 的 identifier 建议以 `Zbl` 开头。
    - mathscinet 的 identifier 建议以 `MR` 开头。

  online_resources:
    - accessed_date 必须提供，因为在线资源内容易变。
    - 学术性较强的文档（银层及以上）建议同时提供 archive_url。
```

