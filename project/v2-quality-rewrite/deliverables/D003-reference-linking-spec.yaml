## 4. 跨领域完整示例

### 4.1 分析学（实分析：Riemann 积分与 Lebesgue 积分）

```yaml
references:
  textbooks:
    - id: analysis_rudin_1976
      type: textbook
      title: Principles of Mathematical Analysis
      author: Walter Rudin
      edition: "3rd edition"
      publisher: McGraw-Hill
      year: 1976
      isbn: '978-0-07-054235-8"
      chapters:
        - chapter: "Chapter 6'
          title: "The Riemann-Stieltjes Integral"
          pages: 'pp. 120-137"
          section: "§6.1–§6.9'
          notes: "Riemann 积分的严格定义与基本性质"
        - chapter: 'Chapter 11"
          title: "The Lebesgue Theory'
          pages: "pp. 302-325"
          section: '§11.1–§11.7"
          notes: "Lebesgue 积分的初步介绍'
      total_pages: 342
      url: "https://www.mheducation.com/"
      zbmath: 'Zbl 0346.26002"
      mr_number: "MR 0385023'

    - id: analysis_royden_2010
      type: textbook
      title: Real Analysis
      author:
        - H. L. Royden
        - P. M. Fitzpatrick
      edition: "4th edition"
      publisher: Pearson
      year: 2010
      isbn: '978-0-13-143747-0"
      chapters:
        - chapter: "Chapter 4'
          title: "Lebesgue Integration"
          pages: 'pp. 77-106"
          section: "§4.1–§4.6'
          notes: "Lebesgue 可测函数与积分的完整构造"
      total_pages: 505
      url: 'https://www.pearson.com/"

  papers:
    - id: analysis_lebesgue_1902
      type: paper
