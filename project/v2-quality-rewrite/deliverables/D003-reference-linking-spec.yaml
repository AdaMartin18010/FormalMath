# FormalMath 参考文献硬链接 YAML 规范
# Reference Hard-Linking Specification for FormalMath
# Version: 1.0.0
# Date: 2026-04-04
# Status: Draft → Pending Review

---

spec_meta:
  id: D003-reference-linking-spec
  title: 参考文献硬链接 YAML 规范
  subtitle: Reference Hard-Linking Specification for FormalMath
  version: 1.0.0
  date: "2026-04-04'
  status: draft
  authors:
    - FormalMath Quality Team
  scope:
    - 定义 FormalMath 项目中所有概念文档的参考文献数据结构
    - 建立精确到章节/页码的引用标准
    - 集成 DOI、zbMATH、MathSciNet、arXiv 等权威标识符
    - 规范 Stacks Project Tag 引用格式

---

## 1. 设计原则（Design Principles）

1. **精确性（Precision）**：引用必须精确到章节、页码或 Tag，禁止只写书名。
2. **可追溯性（Traceability）**：每条引用必须包含至少一个持久化标识符（DOI / ISBN / zbMATH / MR Number / arXiv ID）。
3. **机器可读性（Machine Readability）**：整体结构为 YAML，便于 CI 校验和自动化工具解析。
4. **分层密度（Layered Density）**：根据文档层次（铜/银/金）控制引用密度，避免过度引用或引用不足。
5. **领域兼容性（Domain Compatibility）**：覆盖分析学、代数学、几何学、数理逻辑、数论等核心数学领域。

---

## 2. YAML Schema 定义

```yaml
references:
  # ------------------------------------------------------------------
  # 2.1 textbooks: 教科书与专著
  # ------------------------------------------------------------------
  textbooks:
    - id: <string, required, snake_case, 文档内唯一标识>
      type: textbook
      title: <string, required>
      author: <string or list of strings, required>
      edition: <string, optional, e.g. "3rd edition">
      publisher: <string, required>
      year: <integer, required>
      isbn: <string, required, ISBN-10 或 ISBN-13>
      # 精确到章节的定位信息
      chapters:
        - chapter: <string, required, 如 'Chapter 3">
          title: <string, optional, 章节标题>
          pages: <string, optional, 如 "pp. 45-78'>
          section: <string, optional, 如 "§3.2">
          notes: <string, optional, 附加说明>
      # 若引用整书或不精确到章节时，使用整书页码
      total_pages: <integer, optional>
      url: <string, optional, 出版社或开放获取链接>
      zbmath: <string, optional, zbMATH ID, e.g. 'Zbl 0346.26002">
      mr_number: <string, optional, MathSciNet MR Number, e.g. "MR 0385023'>

  # ------------------------------------------------------------------
  # 2.2 papers: 期刊论文与经典文献
  # ------------------------------------------------------------------
  papers:
    - id: <string, required, snake_case>
      type: paper
      title: <string, required>
      author: <string or list of strings, required>
      journal: <string, required>
      year: <integer, required>
      volume: <string, optional>
      issue: <string, optional>
      pages: <string, required, 如 "pp. 199-220">
      doi: <string, required-if-available, 必须优先填写>
      zbmath: <string, optional>
      mr_number: <string, optional>
      arxiv_id: <string, optional, 如 'arXiv:math/0102056" 或 "arXiv:2401.07214'>
      url: <string, optional, 优先使用 DOI 链接或期刊永久链接>
      language: <string, optional, 默认 "en", 如 'fr", "de', "la">
      original_title: <string, optional, 若 title 为英译则填写原文标题>

  # ------------------------------------------------------------------
  # 2.3 databases: 数学数据库与百科全书链接
  # ------------------------------------------------------------------
  databases:
    - id: <string, required, snake_case>
      type: database_link
      db_type: <enum, required>
        # 允许值:
        #   - zbmath
        #   - mathscinet
        #   - arxiv
        #   - stacks_project
        #   - nlab
        #   - mathworld
        #   - wikipedia
        #   - mse (Math StackExchange)
        #   - encyclopedia_of_math
        #   - proofwiki
      identifier: <string, required>
        # db_type 对应的标识符格式:
        #   zbmath        -> 'Zbl 0346.26002"
        #   mathscinet    -> "MR 0385023'
        #   arxiv         -> "arXiv:math/0102056" 或 'arXiv:2401.07214"
        #   stacks_project -> "01HR' (见第5节)
        #   nlab          -> 页面slug, 如 "limit"
        #   mathworld     -> 条目名, 如 'PrimeNumberTheorem"
        #   wikipedia     -> 页面标题, 如 "Prime_number_theorem'
        #   mse           -> 问题ID, 如 "97049"
        #   encyclopedia_of_math -> 'Prime_number"
        #   proofwiki     -> 页面slug
      url: <string, required, 可直接访问的永久链接>
      accessed_date: <string, optional, ISO-8601 格式, 如 "2026-04-04'>
      notes: <string, optional>

  # ------------------------------------------------------------------
  # 2.4 online_resources: 在线讲义、课程资料、博客等补充资源
  # ------------------------------------------------------------------
  online_resources:
    - id: <string, required, snake_case>
      type: online_resource
      title: <string, required>
      author: <string, optional>
      url: <string, required>
      accessed_date: <string, required, ISO-8601 格式>
      resource_type: <enum, optional>
        # 允许值: lecture_notes, course_page, blog_post, video, software, dataset
      archive_url: <string, optional, Wayback Machine 或 Perma.cc 存档链接>
      notes: <string, optional>
```

