      author: Henri Lebesgue
      journal: Annali di Matematica Pura ed Applicata
      year: 1902
      volume: "7"
      issue: '1"
      pages: "pp. 231-359'
      doi: "10.1007/BF02420592"
      zbmath: 'Zbl 033.0302"
      mr_number: "MR 1552357'
      url: "https://doi.org/10.1007/BF02420592"
      language: fr

  databases:
    - id: analysis_proofwiki_riemann_integral
      type: database_link
      db_type: proofwiki
      identifier: 'Definition:Riemann_Integral"
      url: "https://proofwiki.org/wiki/Definition:Riemann_Integral'
