## 6. 引用密度建议（按文档层次）

FormalMath 文档按深度分为三层：铜层（Bronze）、银层（Silver）、金层（Gold）。不同层次对参考文献的密度和精度要求不同。

### 6.1 铜层文档（基础入门 / 概念科普）

- **密度**：每 1000 汉字（或等效英文约 600 词）不少于 **2 条** 引用。
- **精度**：至少精确到教科书章节（如 "Chapter 3"）。
- **来源偏好**：优先引用教科书和高质量的百科全书条目（Wikipedia、ProofWiki、MathWorld）。
- **标识符要求**：至少提供 ISBN 或 URL。

### 6.2 银层文档（本科核心 / 定理证明）

- **密度**：每 1000 汉字不少于 **4 条** 引用；关键定理/定义必须直接引用原始出处或标准教科书。
- **精度**：精确到章节内的具体节（如 '§3.2, pp. 45-50"）。
- **来源偏好**：教科书 + 经典论文 + zbMATH/MathSciNet 数据库链接。
- **标识符要求**：论文必须提供 DOI（若有）；教科书必须提供 ISBN；鼓励提供 zbMATH ID。

### 6.3 金层文档（研究生前沿 / 研究综述）

- **密度**：每 1000 汉字不少于 **6 条** 引用；每个非平凡的命题、构造、反例都应有出处。
- **精度**：精确到论文的页码、教科书的节和页码、Stacks Project 的 Tag。
- **来源偏好**：前沿期刊论文、预印本（arXiv）、专著章节、Stacks Project / nLab。
- **标识符要求**：
  - 论文必须提供 DOI 或 arXiv ID；
  - 专著必须提供 ISBN 和 zbMATH ID；
  - Stacks Project 必须提供 Tag；
  - 强烈建议提供 MathSciNet MR Number。

### 6.4 引用密度快速参考表

| 层次 | 密度（每 1000 字） | 精度要求 | 标识符要求 |
|------|---------------------|----------|------------|
| 铜层 | ≥ 2 条 | 章节级 | ISBN / URL |
| 银层 | ≥ 4 条 | 节/页码级 | DOI / ISBN / zbMATH |
| 金层 | ≥ 6 条 | 页码/Tag级 | DOI / arXiv / ISBN / zbMATH / MR |

