## 5. Stacks Project Tag 引用规范

Stacks Project 是代数几何领域最重要的在线参考资源之一，其内容以 **Tag** 为单位进行唯一标识。本规范对 Stacks Project 的引用做出如下专门约定。

### 5.1 Tag 格式

- Tag 是由 **4 位字母数字字符** 组成的唯一标识符（例如 `01HR`、`02XU`、`0BDV`）。
- Tag 区分大小写，必须原样引用。
- 每个 Tag 对应 Stacks Project 中的一个 **Definition / Lemma / Theorem / Proposition / Remark / Example / Equation / Section** 等条目。

### 5.2 YAML 中的引用方式

在 `databases` 中使用 `db_type: stacks_project`，并将 Tag 填入 `identifier` 字段：

```yaml
  databases:
    - id: stacks_groupoid_def
      type: database_link
      db_type: stacks_project
      identifier: "003Z"      # 4位字母数字 Tag
      url: 'https://stacks.math.columbia.edu/tag/003Z"
      accessed_date: "2026-04-04'
      notes: "Definition of a groupoid"
```

### 5.3 精确引用层级

根据内容的需要，可以在 `notes` 中说明引用的层级：

| 层级 | 说明 | 示例 |
|------|------|------|
| **Tag 级** | 精确到单个定义/引理/定理 | `Tag 01HR` 对应某条 Lemma |
| **Section 级** | 引用某个 Section 的标题页 | `Section 4.24` 对应 Tags `002V`–`0031` |
| **Chapter 级** | 引用整个 Chapter 的概览页 | `Chapter 33: Morphisms of Schemes` |

**建议**：FormalMath 的金层与银层文档应尽量精确到 **Tag 级**；铜层文档可放宽到 **Section 级**。

### 5.4 URL 构造规则

- 基础 URL：`https://stacks.math.columbia.edu/tag/{identifier}`
- 若引用 Section 概览页，可使用：`https://stacks.math.columbia.edu/tag/{identifier}`（Section 的首个 Tag 通常自动重定向到 Section 页）。
- 禁止直接使用页面标题作为 URL slug，因为 Stacks Project 的标题可能变更，而 Tag 永久不变。

### 5.5 引用示例（代数几何：概形的定义）

```yaml
  databases:
    - id: stacks_scheme_def
      type: database_link
      db_type: stacks_project
      identifier: '01II"
      url: "https://stacks.math.columbia.edu/tag/01II'
      accessed_date: "2026-04-04"
      notes: 'Definition of a scheme"

    - id: stacks_morphisms_chap
      type: database_link
      db_type: stacks_project
      identifier: "002V'
      url: "https://stacks.math.columbia.edu/tag/002V"
      accessed_date: '2026-04-04"
      notes: "Section 4.24: Groupoids — introductory section'
```

