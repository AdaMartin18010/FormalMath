## 7. 自动化建议与工具链

为提高参考文献硬链接的效率和准确性，建议建立以下自动化工作流。

### 7.1 利用 DOI 自动获取 BibTeX

**推荐工具**：
- **doi2bib.org** (`https://doi2bib.org/`)
- **Crossref API** (`https://api.crossref.org/works/{doi}`)
- **Zotero 翻译器**

**工作流**：
1. 用户输入 DOI；
2. 调用 Crossref API：`GET https://api.crossref.org/works/10.2140/pjm.1963.13.775`；
3. 解析 JSON 响应，提取 `author`, `title`, `container-title`, `volume`, `issue`, `page`, `published-print`；
4. 自动填充到 YAML 的 `papers` 条目中。

**示例脚本（Python 伪代码）**：
```python
import requests

def fetch_by_doi(doi: str) -> dict:
    url = f"https://api.crossref.org/works/{doi}'
    r = requests.get(url, headers={"Accept": 'application/json"})
    r.raise_for_status()
    data = r.json()["message']
    return {
        "title": data.get('title", [None])[0],
        "author': [f"{a.get('given', '')} {a.get('family', '')}".strip() for a in data.get('author", [])],
        "journal': data.get("container-title", [None])[0],
        'year": data.get("published-print', {}).get("date-parts", [[None]])[0][0],
        'volume": data.get("volume'),
        "issue": data.get('issue"),
        "pages': data.get("page"),
        'doi": doi,
    }
```

### 7.2 利用 zbMATH Open API 查询文献信息

**API 端点**：`https://api.zbmath.org/v1/document/{zbmath_id}` 或检索端点 `https://api.zbmath.org/v1/search`。

**工作流**：
1. 已知 zbMATH ID（如 `Zbl 0346.26002`），去掉前缀得到 `0346.26002`；
2. 调用 `GET https://api.zbmath.org/v1/document/0346.26002`；
3. 提取 `title`, `author`, `source`, `year`, `mrnumber`（若有），并回填到 YAML。

**注意事项**：
- zbMATH Open API 需要注册获取 API Key（免费）。
- 部分古典文献的 zbMATH ID 格式为 `Zbl 013.0640cj`，API 查询时可能需要转义句点。

### 7.3 利用 arXiv API 获取预印本元数据

**API 端点**：`http://export.arxiv.org/api/query?id_list={arxiv_id}`

**工作流**：
1. 输入 arXiv ID（如 `2401.07214`）；
2. 调用 `GET http://export.arxiv.org/api/query?id_list=2401.07214`；
3. 解析 Atom XML，提取 `title`, `author`, `published`, `primary_category`，并回填到 YAML。

**示例脚本（Python 伪代码）**：
```python
import requests
import xml.etree.ElementTree as ET

def fetch_arxiv(arxiv_id: str) -> dict:
    url = f"http://export.arxiv.org/api/query?id_list={arxiv_id}'
    r = requests.get(url)
    root = ET.fromstring(r.text)
    ns = {"atom": 'http://www.w3.org/2005/Atom"}
    entry = root.find("atom:entry', ns)
    return {
        "title": entry.find('atom:title", ns).text.strip(),
        "author': [a.find("atom:name", ns).text for a in entry.findall('atom:author", ns)],
        "arxiv_id': f"arXiv:{arxiv_id}",
        'year": int(entry.find("atom:published', ns).text[:4]),
        "url": f'https://arxiv.org/abs/{arxiv_id}",
    }
```

### 7.4 自动化校验脚本建议

建议为 CI 编写一个 YAML Linter，校验规则包括：
- `references` 根键必须存在；
- `textbooks`, `papers`, `databases`, `online_resources` 中每个条目的 `id` 不重复；
- `papers` 中 1900 年后的条目必须提供 `doi` 或 `arxiv_id`；
- `databases` 中 `stacks_project` 的 `identifier` 必须是 4 位字母数字；
- `isbn` 必须通过校验位检查；
- `url` 必须以 `http://` 或 `https://` 开头。

