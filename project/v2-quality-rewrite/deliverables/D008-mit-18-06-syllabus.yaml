            formal_math_path: "Mathlib.Analysis.InnerProductSpace.Basic'
          - name: "Row space is orthogonal complement of nullspace"
            formal_math_path: 'Mathlib.LinearAlgebra.Orthogonal"
        examples:
          - "Orthogonal lines in R^2'
          - "N(A) ⟂ C(A^T)"
        problem_sets:
