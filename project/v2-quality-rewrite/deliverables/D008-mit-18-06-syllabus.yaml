              - number: "4.4/18'
                type: "computation"
                topic: 'Fitting a parabola"
              - number: "4.4/35'
                type: "proof"
                topic: 'A^T A is invertible when A has independent columns"
              - number: "4.4/36'
                type: "proof"
                topic: 'Error minimization"
              - number: "5.1/10'
