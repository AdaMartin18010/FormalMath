course:
  code: "MIT 18.06 / 18.700'
  name: "Linear Algebra"
  sources:
    - 'Gilbert Strang, MIT 18.06 (Spring 2010)"
    - "Sheldon Axler, Linear Algebra Done Right (4th ed.)'
  description: |
    A unified syllabus combining the matrix-centric computational approach of MIT 18.06
    (Strang) with the abstract operator-theoretic perspective of MIT 18.700 (Axler).
    Covers systems of linear equations, vector spaces, orthogonality, determinants,
    eigenvalues, positive definite matrices, linear transformations, and the SVD.

units:
  - title: "Unit I: The Geometry of Linear Equations and Gaussian Elimination"
    topics:
      - name: 'The Geometry of Linear Equations"
        definitions:
          - term: "Vector'
            formal_math_path: "docs/00-核心概念理解三问/12-知识图谱系统/01-概念节点/线性代数/vector-space.yaml"
          - term: 'Linear Combination"
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md'
          - term: "Matrix-Vector Product"
            formal_math_path: 'Mathlib.Data.Matrix.Basic"
        theorems:
          - name: "Row Picture vs. Column Picture Equivalence'
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
        examples:
          - 'Intersection of two lines in R^2"
          - "Intersection of three planes in R^3'
          - "The column picture: b as a combination of columns of A"
        problem_sets:
          - source: 'PS1"
            problems:
              - number: "1.2/23'
                type: "conceptual"
                topic: 'Column picture and linear combinations"
              - number: "1.2/28'
                type: "conceptual"
                topic: 'Geometric interpretation of Ax = b"
              - number: "1.3/4'
                type: "computation"
                topic: 'Matrix-vector multiplication"
              - number: "1.3/13'
                type: "computation"
                topic: 'Matrix multiplication patterns"

      - name: "Elimination with Matrices'
        definitions:
          - term: "Elementary Matrix"
            formal_math_path: 'Mathlib.LinearAlgebra.Matrix.Basic"
          - term: "Pivot'
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
          - term: 'Upper Triangular Matrix"
            formal_math_path: "Mathlib.Data.Matrix.Block'
        theorems:
          - name: "Every invertible matrix A has an LU factorization (with row permutations)"
            formal_math_path: 'Mathlib.LinearAlgebra.Matrix.LU"
        examples:
          - "Elimination on a 3×3 system'
          - "Failure of elimination: zero pivot and need for row exchange"
        problem_sets:
          - source: 'PS1"
            problems:
              - number: "2.1/29'
                type: "computation"
                topic: 'Forward elimination"
              - number: "2.1/30'
                type: "computation"
                topic: 'Elimination matrices"
              - number: "2.2/20'
                type: "computation"
                topic: 'LU factorization"
              - number: "2.2/32'
                type: "proof"
                topic: 'Uniqueness of LU"

      - name: "Multiplication and Inverse Matrices'
        definitions:
          - term: "Inverse Matrix"
            formal_math_path: 'Mathlib.LinearAlgebra.Matrix.NonsingularInverse"
          - term: "Singular Matrix'
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
          - term: 'Gauss-Jordan Elimination"
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md'
        theorems:
          - name: "A is invertible iff it has n pivots"
            formal_math_path: 'Mathlib.LinearAlgebra.Matrix.NonsingularInverse"
          - name: "(AB)^-1 = B^-1 A^-1'
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.NonsingularInverse"
        examples:
          - 'Finding A^-1 by Gauss-Jordan on [A | I]"
          - "AB = I implies BA = I for square matrices'
        problem_sets:
          - source: "PS1"
            problems:
              - number: '2.3/22"
                type: "computation'
                topic: "Inverse of a product"
              - number: '2.3/29"
                type: "computation'
                topic: "Finding inverses"
              - number: '2.4/32"
                type: "proof'
                topic: "Properties of inverses"
              - number: '2.4/36"
                type: "proof'
                topic: "Triangular inverses"
              - number: '2.5/7"
                type: "computation'
                topic: "Transposes and permutations"

      - name: 'Factorization into A = LU and Transposes"
        definitions:
          - term: "LU Factorization'
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.LU"
          - term: 'Permutation Matrix"
            formal_math_path: "Mathlib.GroupTheory.Permutation.Basic'
          - term: "Transpose"
            formal_math_path: 'Mathlib.Data.Matrix.Basic"
          - term: "Symmetric Matrix'
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.Symmetric"
        theorems:
          - name: 'A = PLU Factorization Theorem"
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.LU'
        examples:
          - "A = LU for a tridiagonal matrix"
          - 'Symmetric matrices: A = A^T"
        problem_sets:
          - source: "PS2'
            problems:
              - number: "2.5/24"
                type: 'computation"
                topic: "LU factorization'
              - number: "2.5/40"
                type: 'proof"
                topic: "Transposes and symmetric matrices'
              - number: "2.6/13"
                type: 'computation"
                topic: "Permutation matrices'
              - number: "2.6/18"
                type: 'computation"
                topic: "Counting permutations'
              - number: "2.6/25"
                type: 'proof"
                topic: "Properties of transposes'
              - number: "2.6/26"
                type: 'proof"
                topic: "Skew-symmetric matrices'

  - title: "Unit II: Vector Spaces and the Four Fundamental Subspaces"
    topics:
      - name: 'Vector Spaces and Subspaces"
        definitions:
          - term: "Vector Space'
            formal_math_path: "docs/00-核心概念理解三问/12-知识图谱系统/01-概念节点/线性代数/vector-space.yaml"
          - term: 'Subspace"
            formal_math_path: "Mathlib.LinearAlgebra.Subspace'
          - term: "Column Space C(A)"
            formal_math_path: 'Mathlib.LinearAlgebra.Matrix.ColumnSpace"
          - term: "Nullspace N(A)'
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.NullSpace"
        theorems:
          - name: 'The column space and nullspace are subspaces of R^m and R^n respectively"
            formal_math_path: "Mathlib.LinearAlgebra.Subspace'
        examples:
          - "R^2 subspaces: lines through origin, R^2 itself, {0}"
          - 'Column space of a rank-1 matrix"
        problem_sets:
          - source: "PS2'
            problems:
              - number: "2.7/13"
                type: 'conceptual"
                topic: "Subspaces in R^3'
              - number: "2.7/36"
                type: 'conceptual"
                topic: "Union and intersection of subspaces'
              - number: "2.7/40"
                type: 'proof"
                topic: "Column space properties'
              - number: "3.1/18"
                type: 'computation"
                topic: "Column space and nullspace'
              - number: "3.1/23"
                type: 'computation"
                topic: "Special solutions'
              - number: "3.1/30"
                type: 'computation"
                topic: "Complete solution to Ax = b'
              - number: "3.1/32"
                type: 'proof"
                topic: "Structure of solution set'

      - name: "Solving Ax = 0 and Ax = b"
        definitions:
          - term: 'Pivot Variable"
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md'
          - term: "Free Variable"
            formal_math_path: 'docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
          - term: "Row Reduced Echelon Form (RREF)'
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.RowReducedEchelonForm"
          - term: 'Particular Solution"
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md'
        theorems:
          - name: "Rank-Nullity Theorem"
            formal_math_path: 'docs/00-核心概念理解三问/12-知识图谱系统/01-概念节点/线性代数/linear-map.yaml"
          - name: "Complete Solution Theorem: x = x_p + x_n'
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
        examples:
          - 'Solving a 3×4 system with one free variable"
          - "Solving a 4×4 system with rank 2'
        problem_sets:
          - source: "PS3"
            problems:
              - number: '3.2/18"
                type: "computation'
                topic: "RREF and special solutions"
              - number: '3.2/24"
                type: "computation'
                topic: "Nullspace from RREF"
              - number: '3.2/36"
                type: "proof'
                topic: "Rank and nullity relations"
              - number: '3.2/37"
                type: "proof'
                topic: "Shape of RREF blocks"
              - number: '3.3/19"
                type: "computation'
                topic: "Complete solution to Ax = b"
              - number: '3.3/25"
                type: "computation'
                topic: "Rank and solvability"
              - number: '3.3/27"
                type: "proof'
                topic: "Existence of solutions"
              - number: '3.3/28"
                type: "proof'
                topic: "Uniqueness conditions"
              - number: '3.4/13"
                type: "computation'
                topic: "MATLAB: rank and nullspace"
              - number: '3.4/25"
                type: "computation'
                topic: "Left and right inverses from RREF"
              - number: '3.4/28"
                type: "proof'
                topic: "Conditions for left/right inverses"

      - name: 'Independence, Basis, and Dimension"
        definitions:
          - term: "Linear Independence'
            formal_math_path: "Mathlib.LinearAlgebra.LinearIndependent"
          - term: 'Span"
            formal_math_path: "Mathlib.LinearAlgebra.Span'
          - term: "Basis"
            formal_math_path: 'Mathlib.LinearAlgebra.Basis"
          - term: "Dimension'
            formal_math_path: "Mathlib.LinearAlgebra.Dimension"
        theorems:
          - name: 'All bases for a vector space have the same number of vectors"
            formal_math_path: "Mathlib.LinearAlgebra.Dimension'
          - name: "Exchange Lemma (Steinitz)"
            formal_math_path: 'Mathlib.LinearAlgebra.LinearIndependent"
        examples:
          - "Standard basis for R^n'
          - "Basis for the space of 2×2 matrices"
          - 'Polynomial basis {1, t, t^2, ..., t^n}"
        problem_sets:
          - source: "PS4'
            problems:
              - number: "3.5/2"
                type: 'conceptual"
                topic: "Linear independence in R^3'
              - number: "3.5/20"
                type: 'computation"
                topic: "Basis for column space'
              - number: "3.5/37"
                type: 'proof"
                topic: "Dimension of subspace sum'
              - number: "3.5/41"
                type: 'proof"
                topic: "Extending independent sets to bases'
              - number: "3.5/44"
                type: 'proof"
                topic: "Dimension inequalities'
              - number: "3.6/11"
                type: 'computation"
                topic: "Dimension of matrix spaces'
              - number: "3.6/24"
                type: 'computation"
                topic: "Basis for symmetric and skew-symmetric matrices'
              - number: "3.6/28"
                type: 'proof"
                topic: "Dimension of intersection'
              - number: "3.6/30"
                type: 'proof"
                topic: "Direct sum dimensions'
              - number: "3.6/31"
                type: 'proof"
                topic: "Complementary subspaces'

      - name: "The Four Fundamental Subspaces"
        definitions:
          - term: 'Row Space C(A^T)"
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.RowSpace'
          - term: "Left Nullspace N(A^T)"
            formal_math_path: 'Mathlib.LinearAlgebra.Matrix.NullSpace"
          - term: "Rank'
            formal_math_path: "Mathlib.LinearAlgebra.Matrix.Rank"
        theorems:
          - name: 'Fundamental Theorem of Linear Algebra Part 1"
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md'
          - name: "Fundamental Theorem of Linear Algebra Part 2 (Orthogonal Complements)"
            formal_math_path: 'docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
        examples:
          - "The four subspaces for a rank-1 matrix'
          - "Incidence matrix of a graph and its four subspaces"
        problem_sets:
          - source: 'PS4"
            problems:
              - number: "3.6/24'
                type: "computation"
                topic: 'Row space and left nullspace"

      - name: "Graphs, Networks, and Incidence Matrices'
        definitions:
          - term: "Incidence Matrix"
            formal_math_path: 'docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
          - term: "Kirchhoff's Laws'
            formal_math_path: "docs/02-代数结构/03-应用分析/线性代数应用/05-线性代数应用-机器学习版.md"
        theorems:
          - name: 'Dim N(A^T) = m - n + 1 for a connected graph (loop law)"
