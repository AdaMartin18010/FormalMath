              - number: '3"
                type: "proof'
                topic: "Chapter 2, Exercise 4.1 — homomorphisms"
              - number: '4"
                type: "proof'
                topic: "Chapter 2, Exercise 4.3 — kernels and images"
              - number: '5"
                type: "proof'
                topic: "Chapter 2, Exercise 4.4 — isomorphisms"
              - number: '6"
                type: "proof'
                topic: "Chapter 2, Exercise 4.7 — automorphism group of Z/nZ"
              - number: '7"
