          - name: 'Correspondence Theorem"
            formal_math_path: "docs/02-代数结构/02-核心理论/群论/01-群论-国际标准深度扩展版.md'
        examples:
          - "The homophonic group (optional)"
          - 'Quotient of Z by nZ yielding Z/nZ"
        problem_sets:
          - source: "PS1'
            problems:
              - number: "5"
                type: 'proof"
                topic: "Chapter 2, Exercise 4.11b — generating A_n'
              - number: "6"
                type: 'proof"
                topic: "Chapter 2, Exercise M.16 (optional) — the homophonic group'
          - source: "PS2"
