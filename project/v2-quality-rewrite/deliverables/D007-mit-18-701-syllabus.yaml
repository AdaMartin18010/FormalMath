course:
  code: "MIT 18.701'
  name: "Algebra I"
  source_url: 'https://ocw.mit.edu/courses/18-701-algebra-i-fall-2010/"
  textbook: "Michael Artin, Algebra, 2nd Edition'
  instructor: "Prof. Michael Artin"
  term: 'Fall 2010"
  description: >
    Undergraduate level Algebra I covering groups, vector spaces,
    linear transformations, symmetry groups, bilinear forms, and linear groups.
    The course follows Chapters 1–9 of Artin's Algebra (2nd Edition).

units:
  - title: "Matrices (Review)'
    artin_chapters: ["1"]
    mit_sessions: ['1 (pre-class review)"]
    topics:
      - name: "Matrix Operations and GL_n'
        definitions:
          - term: "General Linear Group GL_n"
            formal_math_path: 'docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
          - term: "Invertible Matrix'
            formal_math_path: "docs/02-代数结构/02-核心理论/线性代数与矩阵理论/01-线性代数与矩阵理论-国际标准深度扩展版.md"
        theorems:
          - name: 'A 2×2 matrix with rational entries has finite order 1, 2, 3, 4, or 6"
            formal_math_path: "'
        examples:
          - "GL_2(R) and the order-6 matrix [[1,1],[-1,0]]"
          - 'Invertible integer matrices (GL_n(Z))"
        problem_sets:
          - source: "PS1'
            problems:
              - number: "1"
                type: 'proof"
                topic: "Chapter 1, Exercise 6.2 — invertible integer matrices'
              - number: "2"
                type: 'proof"
                topic: "Chapter 1, Exercise M.8 — an exercise in logic'
              - number: "3"
                type: 'proof"
                topic: "Chapter 1, Exercise M.11 — the discrete Dirichlet problem'
              - number: "4"
                type: 'proof"
                topic: "Chapter 1, Exercise 4.8b — generating SL_n(R)'

  - title: "Groups"
    artin_chapters: ['2"]
    mit_sessions: ["1', "2", '3", "4', "5", '6", "7']
    topics:
      - name: "Groups and Subgroups"
        definitions:
          - term: 'Group"
            formal_math_path: "docs/02-代数结构/02-核心理论/群论/01-群论-国际标准深度扩展版.md'
          - term: "Subgroup"
