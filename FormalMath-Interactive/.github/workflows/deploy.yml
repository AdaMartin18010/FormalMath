# ============================================
# FormalMath Interactive - GitHub Actions CI/CD
# ============================================

name: Deploy to GitHub Pages

# 触发条件
on:
  # 推送到 main 分支时触发
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy.yml'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      
  # 定期构建（每周一凌晨2点）
  schedule:
    - cron: '0 2 * * 1'

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # -------------------- 构建任务 --------------------
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 安装依赖
      - name: Install dependencies
        run: npm ci
      
      # 类型检查
      - name: Type check
        run: npm run type-check
        continue-on-error: false
      
      # 代码检查
      - name: Lint
        run: npm run lint
        continue-on-error: true
      
      # 运行测试
      - name: Run tests
        run: npm run test:ci
        continue-on-error: true
      
      # 获取版本信息
      - name: Get version info
        id: version
        run: |
          echo "VERSION=$(git describe --tags --always || echo '1.0.0')" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      
      # 构建应用
      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.VERSION }}
          VITE_APP_BUILD_TIME: ${{ steps.version.outputs.BUILD_TIME }}
          VITE_APP_COMMIT_SHA: ${{ steps.version.outputs.COMMIT_SHA }}
          NODE_ENV: production
      
      # 生成构建报告
      - name: Generate build report
        run: |
          echo "## Build Report" > build-report.md
          echo "- **Version**: ${{ steps.version.outputs.VERSION }}" >> build-report.md
          echo "- **Build Time**: ${{ steps.version.outputs.BUILD_TIME }}" >> build-report.md
          echo "- **Commit**: ${{ steps.version.outputs.COMMIT_SHA }}" >> build-report.md
          echo "- **Size**: $(du -sh dist | cut -f1)" >> build-report.md
          echo "" >> build-report.md
          echo "### Bundle Analysis" >> build-report.md
          ls -lh dist/assets/js/ >> build-report.md
      
      # 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/
          retention-days: 7
      
      # 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      # 上传 Pages 产物
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # -------------------- 部署任务 --------------------
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # -------------------- Docker 构建任务 --------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # 下载构建产物
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/
      
      # 设置 QEMU（用于多架构构建）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 获取版本标签
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: formalmath/interactive
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            latest
      
      # 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_VERSION=${{ needs.build.outputs.VERSION }}

  # -------------------- 发布 Release --------------------
  release:
    runs-on: ubuntu-latest
    needs: [build, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # 下载构建产物
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/
      
      # 打包发布文件
      - name: Create release archive
        run: |
          cd dist
          zip -r ../formalmath-interactive-${{ github.ref_name }}.zip .
          cd ..
          tar -czf formalmath-interactive-${{ github.ref_name }}.tar.gz -C dist .
      
      # 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            formalmath-interactive-*.zip
            formalmath-interactive-*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------- 通知任务 --------------------
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, docker-build]
    if: always()
    
    steps:
      # 发送 Slack 通知
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always() && secrets.SLACK_WEBHOOK != ''
