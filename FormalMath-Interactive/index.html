<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="description" content="FormalMath交互式可视化界面框架 - 数学知识图谱与推理可视化" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FormalMath" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FormalMath" />
    <meta name="msapplication-TileImage" content="/FormalMath/icons/icon-144x144.png" />
    
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-icon" href="/FormalMath/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/FormalMath/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/FormalMath/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/FormalMath/icons/icon-192x192.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="mask-icon" href="/vite.svg" color="#2563eb" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Fonts with display=swap for performance -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/src/main.tsx" as="script" type="module" />
    
    <title>FormalMath Interactive - 交互式数学可视化平台</title>
    
    <!-- Critical CSS for faster first paint -->
    <style>
      /* Critical loading styles */
      html {
        background-color: #f9fafb;
      }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading skeleton */
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      /* Prevent FOUC */
      .no-fouc {
        visibility: hidden;
      }
    </style>
    
    <!-- Dark mode support -->
    <script>
      // Check for saved theme preference or prefer-color-scheme
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0f172a';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Initial loading state -->
      <div id="initial-loader" style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        z-index: 9999;
      ">
        <div style="text-align: center; color: white;">
          <div style="
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #2563eb;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
          ">F</div>
          <h1 style="margin: 0 0 8px; font-size: 24px; font-weight: 600;">FormalMath</h1>
          <p style="margin: 0; opacity: 0.8; font-size: 14px;">正在加载...</p>
        </div>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(0.95); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
