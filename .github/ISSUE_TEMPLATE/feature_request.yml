name: 功能请求
description: 提议新功能或改进
title: '[功能] '
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请详细描述您的想法。

  - type: dropdown
    id: feature_type
    attributes:
      label: 功能类型
      description: 这是什么类型的功能？
      options:
        - 自动化工具
        - 文档模板
        - 质量检查
        - 可视化功能
        - 学习系统功能
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 这个功能要解决什么问题？
      placeholder: |
        例如：
        - 当前检查 MSC 编码需要手动进行，效率低
        - 缺少自动化的定理依赖分析
        - 需要更好的数学公式渲染支持
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望解决方案
      description: 您希望如何实现这个功能？
      placeholder: |
        请描述您期望的功能实现方式。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您是否考虑过其他解决方案？

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他相关信息，如参考实现、设计草图等
