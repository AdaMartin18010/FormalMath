name: 错误报告
description: 报告数学错误或文档问题
title: '[错误] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告错误！请提供详细信息帮助我们快速定位和修复。

  - type: dropdown
    id: error_type
    attributes:
      label: 错误类型
      description: 这是什么类型的错误？
      options:
        - 数学概念/定理错误
        - 证明错误
        - 公式/符号错误
        - 拼写/语法错误
        - 链接失效
        - 格式问题
        - 其他
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: 错误位置
      description: 请提供出错的文件路径或 URL
      placeholder: docs/02-代数结构/群论/01-群论-深度扩展版.md
    validations:
      required: true

  - type: textarea
    id: current_content
    attributes:
      label: 当前内容
      description: 请复制粘贴错误的内容
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected_content
    attributes:
      label: 正确内容
      description: 您认为应该是什么？
      render: markdown
    validations:
      required: true

  - type: textarea
    id: explanation
    attributes:
      label: 错误说明
      description: 请解释为什么当前内容是错误的
      placeholder: |
        例如：
        - 定理陈述缺少一个条件
        - 证明第二步的逻辑有误
        - 符号使用不一致

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 这个错误的严重程度？
      options:
        - 🔴 严重 - 数学概念根本性错误
        - 🟠 重要 - 影响理解的关键错误
        - 🟡 一般 - 影响阅读体验
        - 🟢 轻微 - 拼写或格式问题
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 验证来源
      description: 请提供验证正确性的来源
      placeholder: |
        例如：
        - 教材：Hartshorne, Algebraic Geometry, p.123
        - Wikipedia: https://en.wikipedia.org/wiki/...
        - 原始论文：...

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      description: 提交前请确认
      options:
        - label: 我已经搜索过现有 issues，确认这不是重复报告
          required: true
        - label: 我已经核实了错误的准确性
          required: true
