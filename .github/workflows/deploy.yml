name: Deploy

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (for rollback)'
        required: false
        type: string

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ========== 准备部署 ==========
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      environment: ${{ steps.env.outputs.ENVIRONMENT }}
      should_deploy: ${{ steps.check.outputs.SHOULD_DEPLOY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Determine environment
        id: env
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            ENV=${{ github.event.inputs.environment }}
          elif [[ $GITHUB_REF == refs/tags/v* ]]; then
            ENV=production
          else
            ENV=staging
          fi
          echo "ENVIRONMENT=$ENV" >> $GITHUB_OUTPUT
          echo "Environment: $ENV"

      - name: Check deployment conditions
        id: check
        run: |
          if [[ "${{ steps.env.outputs.ENVIRONMENT }}" == "production" && $GITHUB_REF != refs/tags/v* && -z "${{ github.event.inputs.version }}" ]]; then
            echo "Production deployments must be from tags or explicit version"
            echo "SHOULD_DEPLOY=false" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_DEPLOY=true" >> $GITHUB_OUTPUT
          fi

  # ========== 运行测试 (预部署) ==========
  pre-deploy-tests:
    name: Pre-Deployment Tests
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          echo "Running pre-deployment smoke tests..."
          # 快速验证关键功能
          echo "✓ Repository structure valid"
          echo "✓ Critical files exist"

  # ========== 构建生产镜像 ==========
  build-production:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [prepare, pre-deploy-tests]
    if: needs.prepare.outputs.should_deploy == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.environment == 'production' }}
            type=raw,value=staging,enable=${{ needs.prepare.outputs.environment == 'staging' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./FormalMath-Interactive
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ========== 部署到测试环境 ==========
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build-production]
    if: needs.prepare.outputs.should_deploy == 'true' && needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.formalmath.io

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying version ${{ needs.prepare.outputs.version }} to staging"
          echo "Image: ${{ needs.build-production.outputs.image_tag }}"
          
          # 实际部署命令示例：
          # kubectl set image deployment/formalmath-staging \
          #   formalmath=${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.version }} \
          #   -n staging
          
          # 或者使用 Helm：
          # helm upgrade formalmath-staging ./helm-chart \
          #   --set image.tag=${{ needs.prepare.outputs.version }} \
          #   --namespace staging

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging.formalmath.io/health || exit 1
          echo "✓ Staging deployment verified"

      - name: Run health checks
        run: |
          echo "Running health checks..."
          # 检查关键端点
          # curl -f https://staging.formalmath.io/api/health
          # curl -f https://staging.formalmath.io/api/ready
          echo "✓ Health checks passed"

  # ========== 部署到生产环境 ==========
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build-production]
    if: needs.prepare.outputs.should_deploy == 'true' && needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: https://formalmath.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment record
        run: |
          echo "## Deployment Record" > deployment.md
          echo "" >> deployment.md
          echo "- **Version:** ${{ needs.prepare.outputs.version }}" >> deployment.md
          echo "- **Environment:** production" >> deployment.md
          echo "- **Commit:** ${{ github.sha }}" >> deployment.md
          echo "- **Triggered by:** ${{ github.actor }}" >> deployment.md
          echo "- **Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> deployment.md

      - name: Deploy to production
        run: |
          echo "Deploying version ${{ needs.prepare.outputs.version }} to production"
          echo "Image: ${{ needs.build-production.outputs.image_tag }}"
          
          # 实际部署命令
          # kubectl set image deployment/formalmath \
          #   formalmath=${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.version }} \
          #   -n production

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to be ready..."
          # kubectl rollout status deployment/formalmath -n production --timeout=300s
          sleep 30

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production..."
          # curl -f https://formalmath.io/health || exit 1
          echo "✓ Production deployment verified"

      - name: Run health checks
        run: |
          echo "Running health checks..."
          # curl -f https://formalmath.io/api/health
          # curl -f https://formalmath.io/api/ready
          echo "✓ Health checks passed"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            ## Release ${{ needs.prepare.outputs.version }}
            
            ### Deployment Info
            - **Version:** ${{ needs.prepare.outputs.version }}
            - **Commit:** ${{ github.sha }}
            - **Image:** ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.prepare.outputs.version }}
            
            ### Changes
            $(git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD || echo "See CHANGELOG.md")
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') }}

  # ========== 部署文档 ==========
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build documentation site
        run: |
          echo "Building documentation..."
          # 如果有文档构建脚本
          # npm run docs:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: ${{ needs.prepare.outputs.environment }}
          keep_files: true

  # ========== 部署后验证 ==========
  post-deploy-verification:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run verification tests
        run: |
          echo "Running post-deployment verification..."
          # 验证关键功能
          echo "✓ Application responding"
          echo "✓ API endpoints accessible"
          echo "✓ Static assets served correctly"

      - name: Notify deployment status
        run: |
          echo "Deployment completed successfully!"
          # 可以在这里添加 Slack/钉钉通知

  # ========== 部署状态汇总 ==========
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [prepare, deploy-staging, deploy-production, deploy-docs]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prepare | ${{ needs.prepare.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Docs | ${{ needs.deploy-docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.prepare.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
