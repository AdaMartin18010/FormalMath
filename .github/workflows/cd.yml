name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # 准备发布
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Create release notes
      run: |
        echo "## Release ${{ steps.version.outputs.VERSION }}" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### Changes" >> RELEASE_NOTES.md
        git log --oneline -20 >> RELEASE_NOTES.md

  # 构建 Docker 镜像
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: prepare-release
    if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./FormalMath-Interactive
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:${{ needs.prepare-release.outputs.version }}
          ghcr.io/${{ github.repository }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 部署到 Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare-release, build-docker]
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.formalmath.io
    
    steps:
    - name: Deploy to staging
      run: |
        echo "Deploying version ${{ needs.prepare-release.outputs.version }} to staging"
        # 实际部署命令
        # kubectl set image deployment/formalmath formalmath=ghcr.io/${{ github.repository }}:${{ needs.prepare-release.outputs.version }}
    
    - name: Run smoke tests
      run: |
        sleep 10
        curl -f https://staging.formalmath.io/health || exit 1

  # 部署到 Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare-release, build-docker]
    if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://formalmath.io
    
    steps:
    - name: Deploy to production
      run: |
        echo "Deploying version ${{ needs.prepare-release.outputs.version }} to production"
        # 实际部署命令
    
    - name: Run smoke tests
      run: |
        sleep 10
        curl -f https://formalmath.io/health || exit 1
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false

  # 发布文档
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: prepare-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Build documentation
      run: |
        # 构建文档
        echo "Building documentation..."
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
