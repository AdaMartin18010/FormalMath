name: Build

on:
  push:
    branches: [main, develop, feature/**]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'ref/**'
      - 'research/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'ref/**'
      - 'research/**'
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  LEAN_VERSION: 'v4.6.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 变更检测 ==========
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      lean4: ${{ steps.filter.outputs.lean4 }}
      tools: ${{ steps.filter.outputs.tools }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'FormalMath-Interactive/**'
              - 'tests/frontend/**'
            backend:
              - 'tests/backend/**'
              - 'tools/**/*.py'
            lean4:
              - 'tests/lean4/**'
              - 'docs/09-形式化证明/**'
            tools:
              - 'tools/**/*.py'
            docs:
              - 'docs/**/*.md'
              - '数学家理念体系/**/*.md'

  # ========== 前端构建 ==========
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: ./FormalMath-Interactive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './FormalMath-Interactive/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Build application
        run: npm run build

      - name: Check build output
        run: |
          ls -la dist/
          test -f dist/index.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.run_id }}
          path: FormalMath-Interactive/dist/
          retention-days: 7

  # ========== Python工具构建 ==========
  build-tools:
    name: Build Python Tools
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.tools == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tools/**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/backend/requirements-test.txt

      - name: Verify Python syntax
        run: |
          python -m compileall tools/ -q

      - name: Build Python packages
        run: |
          echo "Building Python tools..."
          # 如果有setup.py，可以在这里构建
          # python setup.py sdist bdist_wheel

  # ========== Lean4构建 ==========
  build-lean4:
    name: Build Lean4
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.lean4 == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/mathlib
            tests/lean4/.lake
          key: ${{ runner.os }}-lean-${{ env.LEAN_VERSION }}-${{ hashFiles('tests/lean4/lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-${{ env.LEAN_VERSION }}-
            ${{ runner.os }}-lean-

      - name: Setup Lean4
        working-directory: ./tests/lean4
        run: |
          elan toolchain install ${{ env.LEAN_VERSION }}
          elan default ${{ env.LEAN_VERSION }}

      - name: Build Lean4 project
        working-directory: ./tests/lean4
        run: lake build

      - name: Upload Lean4 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lean4-build-${{ github.run_id }}
          path: tests/lean4/build/
          retention-days: 7

  # ========== Docker镜像构建 ==========
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./FormalMath-Interactive
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 文档构建 ==========
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate documentation index
        run: |
          echo "# FormalMath 文档索引" > docs/index.md
          echo "" >> docs/index.md
          echo "生成时间: $(date)" >> docs/index.md
          echo "" >> docs/index.md
          echo "## 目录结构" >> docs/index.md
          find docs/ -name "*.md" -type f | head -50 | sed 's|^|- |' >> docs/index.md

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-${{ github.run_id }}
          path: docs/
          retention-days: 7

  # ========== 构建状态汇总 ==========
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, build-tools, build-lean4, build-docker, build-docs]
    if: always()

    steps:
      - name: Build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tools | ${{ needs.build-tools.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lean4 | ${{ needs.build-lean4.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.build-docs.result }} |" >> $GITHUB_STEP_SUMMARY
