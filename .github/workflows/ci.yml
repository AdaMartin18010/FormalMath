name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**/*.md'
      - '数学家理念体系/**/*.md'
      - '**.lean'
      - '**.py'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**/*.md'
      - '数学家理念体系/**/*.md'
      - '**.lean'
      - '**.py'

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint 'docs/**/*.md' '数学家理念体系/**/*.md' \
            --config .markdownlint.json \
            --ignore '**/node_modules/**' \
            || true

  content-check:
    name: Content Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml regex

      - name: Run content checks
        run: |
          python tools/contributor-workflow/ci_content_check.py \
            --paths docs/ 数学家理念体系/ \
            --fail-on-error

  msc-validation:
    name: MSC Encoding Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate MSC codes
        run: |
          python tools/contributor-workflow/validate_msc.py \
            --check-all \
            --report-format github

  link-check:
    name: Link Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check internal links
        run: |
          python tools/contributor-workflow/check_links.py \
            --paths docs/ 数学家理念体系/ \
            --check-internal \
            --fail-on-broken

  lean-check:
    name: Lean4 Build Check
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'lean') || contains(github.event.head_commit.message, 'Lean')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Get Lean version
        run: |
          if [ -f lean-toolchain ]; then
            cat lean-toolchain
          else
            echo "leanprover/lean4:v4.29.0" > lean-toolchain
          fi

      - name: Cache Lean packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.elan
            .lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Build Lean project
        run: |
          lake build || echo "No lakefile found, skipping build"

  stats-report:
    name: Generate Contribution Stats
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate stats
        run: |
          python tools/contributor-workflow/generate_stats.py \
            --output .github/stats.json

      - name: Upload stats
        uses: actions/upload-artifact@v4
        with:
          name: contribution-stats
          path: .github/stats.json

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [markdown-lint, content-check, msc-validation, link-check]
    if: failure() && github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **CI 检查失败**\n\n请检查上述失败的工作流，修复问题后重新提交。\n\n查看 [贡献指南](../../CONTRIBUTING.md) 了解如何修复常见问题。'
            })
