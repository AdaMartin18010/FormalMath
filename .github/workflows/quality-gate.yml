name: FormalMath Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Check Silver Docs Structure
      run: |
        echo "=== Checking silver docs ==="
        find docs -name "*.md" -exec grep -l "level: silver" {} \; | wc -l
        echo "Silver docs should be >= 197"
    
    - name: Check Lean4 Compilation
      run: |
        echo "=== Checking Lean4 build ==="
        cd docs/09-形式化证明/Lean4
        lake build
    
    - name: Check MSC Frontmatter
      run: |
        echo "=== Checking MSC codes ==="
        python tools/audit_msc.py
    
    - name: Check References
      run: |
        echo "=== Checking references ==="
        find docs -name "*.md" -exec grep -L "## 参考文献" {} \; | grep -v "00-归档" | wc -l
        echo "Docs missing references should be 0"