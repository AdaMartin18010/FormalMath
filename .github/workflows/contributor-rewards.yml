name: Contributor Rewards

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行

jobs:
  calculate-points:
    name: Calculate Contribution Points
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate points for PR
        run: |
          python tools/contributor-workflow/calculate_rewards.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --pr-author "${{ github.event.pull_request.user.login }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --output .github/reward.json

      - name: Post reward comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reward = JSON.parse(fs.readFileSync('.github/reward.json', 'utf8'));
            
            let body = `🎉 **感谢贡献！**\n\n`;
            body += `@${reward.contributor} 您的贡献已获得积分奖励！\n\n`;
            body += `| 项目 | 详情 |\n`;
            body += `|------|------|\n`;
            body += `| PR | #${reward.pr_number} |\n`;
            body += `| 类型 | ${reward.contribution_type} |\n`;
            body += `| 积分 | **+${reward.points}** |\n`;
            body += `| 当前等级 | ${reward.level} |\n\n`;
            
            if (reward.badges && reward.badges.length > 0) {
              body += `🏅 **获得徽章**: ${reward.badges.join(', ')}\n\n`;
            }
            
            body += `查看 [贡献者排行榜](../../blob/main/CONTRIBUTORS.md) 了解完整排名。`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  update-leaderboard:
    name: Update Leaderboard
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate leaderboard
        run: |
          python tools/contributor-workflow/update_leaderboard.py \
            --output CONTRIBUTORS.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update contributor leaderboard [skip ci]"
          git push

  monthly-awards:
    name: Monthly Awards
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 1 * *'  # 每月1日
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate monthly awards
        run: |
          python tools/contributor-workflow/calculate_monthly_awards.py \
            --month $(date -d "last month" +%Y-%m) \
            --output .github/monthly_awards.md

      - name: Create awards issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('.github/monthly_awards.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏆 ${new Date().toLocaleString('zh-CN', {month:'long', year:'numeric'})} 月度贡献奖`,
              body: content,
              labels: ['announcement', 'rewards']
            });
