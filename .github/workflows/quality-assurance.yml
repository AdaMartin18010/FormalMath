name: Quality Assurance

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行
  workflow_dispatch:  # 允许手动触发

jobs:
  comprehensive-check:
    name: Comprehensive Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml regex requests

      - name: Run MSC validation
        run: |
          python tools/contributor-workflow/validate_msc.py \
            --check-all \
            --path . \
            > msc_report.txt || true

      - name: Run link check
        run: |
          python tools/contributor-workflow/check_links.py \
            --paths docs/ 数学家理念体系/ \
            --check-internal \
            > link_report.txt || true

      - name: Generate quality report
        run: |
          python tools/contributor-workflow/generate_quality_report.py \
            --output .github/quality_report.md

      - name: Create quality issue
        if: github.event.schedule
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('.github/quality_report.md', 'utf8');
            
            const date = new Date().toISOString().split('T')[0];
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 质量周报 - ${date}`,
              body: report,
              labels: ['quality', 'report', 'automated']
            });

  stale-check:
    name: Stale Content Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find stale content
        run: |
          echo "# 过时内容检查" > stale_report.md
          echo "" >> stale_report.md
          echo "## 超过 6 个月未更新的文档" >> stale_report.md
          echo "" >> stale_report.md
          
          find docs/ 数学家理念体系/ -name "*.md" -type f -mtime +180 | while read file; do
            last_update=$(git log -1 --format=%cd --date=short -- "$file")
            echo "- $file (最后更新: $last_update)" >> stale_report.md
          done
          
          cat stale_report.md

  performance-check:
    name: Performance Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count statistics
        run: |
          echo "# 项目统计" > stats_report.md
          echo "" >> stats_report.md
          
          echo "## 文档统计" >> stats_report.md
          echo "- 总文档数: $(find docs/ 数学家理念体系/ -name '*.md' | wc -l)" >> stats_report.md
          echo "- 基础版: $(find docs/ 数学家理念体系/ -name '*-基础版.md' | wc -l)" >> stats_report.md
          echo "- 增强版: $(find docs/ 数学家理念体系/ -name '*-增强版.md' | wc -l)" >> stats_report.md
          echo "- 深度版: $(find docs/ 数学家理念体系/ -name '*-深度扩展版.md' | wc -l)" >> stats_report.md
          echo "- 国际标准版: $(find docs/ 数学家理念体系/ -name '*-国际标准版.md' | wc -l)" >> stats_report.md
          
          echo "" >> stats_report.md
          echo "## Lean4 形式化" >> stats_report.md
          echo "- Lean 文件数: $(find . -name '*.lean' | wc -l)" >> stats_report.md
          
          cat stats_report.md

      - name: Upload stats
        uses: actions/upload-artifact@v4
        with:
          name: project-stats
          path: stats_report.md
