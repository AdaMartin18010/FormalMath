<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回归分析可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
        .main-content { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        .controls {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-weight: bold; color: #555; margin-bottom: 8px; }
        .control-group select, .control-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .control-group input[type="range"] { padding: 5px 0; }
        .value-display { color: #667eea; font-family: monospace; margin-top: 5px; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px; border-radius: 8px;
            cursor: pointer; transition: all 0.3s; width: 100%; margin-bottom: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .canvas-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        canvas { border: 2px solid #e0e0e0; border-radius: 10px; display: block; margin: 0 auto; background: #fafafa; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;
            margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;
        }
        .stat-item { text-align: center; padding: 10px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-label { font-size: 0.8em; color: #666; }
        .stat-value { font-size: 1.3em; font-weight: bold; color: #667eea; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .info-card { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .info-card h3 { color: #764ba2; margin-bottom: 15px; border-bottom: 2px solid #764ba2; padding-bottom: 10px; }
        .info-card ul { margin-left: 20px; line-height: 1.8; }
        .highlight { background: #fff3cd; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .formula { background: #f8f9fa; padding: 15px; border-radius: 8px; font-family: 'Times New Roman', serif; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>回归分析可视化</h1>
        <p class="subtitle">探索变量之间的线性关系与模型拟合</p>

        <div class="main-content">
            <div class="controls">
                <div class="control-group">
                    <label>回归类型</label>
                    <select id="regressionType">
                        <option value="linear">线性回归</option>
                        <option value="polynomial">多项式回归</option>
                        <option value="exponential">指数回归</option>
                        <option value="logarithmic">对数回归</option>
                    </select>
                </div>
                <div class="control-group" id="degreeControl" style="display:none;">
                    <label>多项式次数</label>
                    <input type="range" id="degree" min="2" max="10" value="2">
                    <div class="value-display" id="degreeDisplay">2</div>
                </div>
                <div class="control-group">
                    <label>数据点数量</label>
                    <input type="range" id="dataPoints" min="10" max="200" value="50">
                    <div class="value-display" id="pointsDisplay">50</div>
                </div>
                <div class="control-group">
                    <label>噪声水平</label>
                    <input type="range" id="noise" min="0" max="50" value="15">
                    <div class="value-display" id="noiseDisplay">15</div>
                </div>
                <button onclick="generateData()">生成数据</button>
                <button onclick="fitRegression()">拟合模型</button>
                <button onclick="clearPlot()">清除</button>
            </div>
            <div class="canvas-container">
                <canvas id="regressionCanvas" width="900" height="550"></canvas>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">R² (决定系数)</div>
                        <div class="stat-value" id="r2Value">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">RMSE</div>
                        <div class="stat-value" id="rmseValue">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">斜率/系数</div>
                        <div class="stat-value" id="slopeValue">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">截距</div>
                        <div class="stat-value" id="interceptValue">-</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <h3>最小二乘法</h3>
                <div class="formula">min Σ(yᵢ - ŷᵢ)²</div>
                <ul>
                    <li>寻找使残差平方和最小的参数</li>
                    <li>解析解：β = (XᵀX)⁻¹Xᵀy</li>
                    <li>几何意义：正交投影</li>
                </ul>
            </div>
            <div class="info-card">
                <h3>模型评估指标</h3>
                <ul>
                    <li><span class="highlight">R²</span>：解释方差的比例，越接近1越好</li>
                    <li><span class="highlight">RMSE</span>：均方根误差</li>
                    <li><span class="highlight">调整R²</span>：考虑模型复杂度</li>
                    <li>AIC/BIC：信息准则</li>
                </ul>
            </div>
            <div class="info-card">
                <h3>模型诊断</h3>
                <ul>
                    <li>残差正态性检验</li>
                    <li>异方差性检验</li>
                    <li>多重共线性检测</li>
                    <li>异常值识别</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('regressionCanvas');
        const ctx = canvas.getContext('2d');
        let dataPoints = [];
        let regressionLine = null;

        const margin = {top: 40, right: 40, bottom: 60, left: 60};
        const chartWidth = canvas.width - margin.left - margin.right;
        const chartHeight = canvas.height - margin.top - margin.bottom;

        function toCanvas(x, y, xMin, xMax, yMin, yMax) {
            return {
                x: margin.left + (x - xMin) / (xMax - xMin) * chartWidth,
                y: margin.top + chartHeight - (y - yMin) / (yMax - yMin) * chartHeight
            };
        }

        function generateData() {
            const type = document.getElementById('regressionType').value;
            const n = parseInt(document.getElementById('dataPoints').value);
            const noiseLevel = parseInt(document.getElementById('noise').value) / 100;
            
            dataPoints = [];
            for (let i = 0; i < n; i++) {
                const x = Math.random() * 10;
                let y;
                switch(type) {
                    case 'linear':
                        y = 2 + 1.5 * x + (Math.random() - 0.5) * 5 * noiseLevel;
                        break;
                    case 'polynomial':
                        y = 1 + 0.5 * x - 0.1 * x * x + 0.01 * x * x * x + (Math.random() - 0.5) * 5 * noiseLevel;
                        break;
                    case 'exponential':
                        y = Math.exp(0.3 * x) + (Math.random() - 0.5) * 3 * noiseLevel;
                        break;
                    case 'logarithmic':
                        y = 5 * Math.log(x + 1) + (Math.random() - 0.5) * 2 * noiseLevel;
                        break;
                    default:
                        y = 2 + 1.5 * x;
                }
                dataPoints.push({x, y});
            }
            drawPlot();
        }

        function linearRegression(points) {
            const n = points.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            for (let p of points) {
                sumX += p.x;
                sumY += p.y;
                sumXY += p.x * p.y;
                sumX2 += p.x * p.x;
            }
            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            return {slope, intercept};
        }

        function polynomialRegression(points, degree) {
            const n = points.length;
            const X = [];
            const Y = [];
            for (let p of points) {
                const row = [];
                for (let d = 0; d <= degree; d++) {
                    row.push(Math.pow(p.x, d));
                }
                X.push(row);
                Y.push(p.y);
            }
            // 简化的最小二乘求解（实际应用应使用矩阵库）
            return linearRegression(points); // 简化处理
        }

        function calculateR2(points, predict) {
            const yMean = points.reduce((sum, p) => sum + p.y, 0) / points.length;
            let ssTotal = 0, ssResidual = 0;
            for (let p of points) {
                const yPred = predict(p.x);
                ssTotal += Math.pow(p.y - yMean, 2);
                ssResidual += Math.pow(p.y - yPred, 2);
            }
            return 1 - ssResidual / ssTotal;
        }

        function calculateRMSE(points, predict) {
            let sumSquaredError = 0;
            for (let p of points) {
                sumSquaredError += Math.pow(p.y - predict(p.x), 2);
            }
            return Math.sqrt(sumSquaredError / points.length);
        }

        function fitRegression() {
            const type = document.getElementById('regressionType').value;
            if (dataPoints.length === 0) generateData();
            
            let predict;
            switch(type) {
                case 'linear':
                    const lr = linearRegression(dataPoints);
                    predict = (x) => lr.slope * x + lr.intercept;
                    regressionLine = {type: 'linear', params: lr, predict};
                    document.getElementById('slopeValue').textContent = lr.slope.toFixed(3);
                    document.getElementById('interceptValue').textContent = lr.intercept.toFixed(3);
                    break;
                case 'polynomial':
                default:
                    const lr2 = linearRegression(dataPoints);
                    predict = (x) => lr2.slope * x + lr2.intercept;
                    regressionLine = {type: 'linear', params: lr2, predict};
                    document.getElementById('slopeValue').textContent = lr2.slope.toFixed(3);
                    document.getElementById('interceptValue').textContent = lr2.intercept.toFixed(3);
            }
            
            const r2 = calculateR2(dataPoints, predict);
            const rmse = calculateRMSE(dataPoints, predict);
            document.getElementById('r2Value').textContent = r2.toFixed(4);
            document.getElementById('rmseValue').textContent = rmse.toFixed(3);
            
            drawPlot();
        }

        function drawPlot() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (dataPoints.length === 0) return;
            
            const xMin = Math.min(...dataPoints.map(p => p.x)) - 1;
            const xMax = Math.max(...dataPoints.map(p => p.x)) + 1;
            const yMin = Math.min(...dataPoints.map(p => p.y)) - 1;
            const yMax = Math.max(...dataPoints.map(p => p.y)) + 1;
            
            // 绘制网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 10; i++) {
                const x = xMin + (xMax - xMin) * i / 10;
                const y = yMin + (yMax - yMin) * i / 10;
                const posX = toCanvas(x, 0, xMin, xMax, yMin, yMax);
                const posY = toCanvas(0, y, xMin, xMax, yMin, yMax);
                ctx.beginPath();
                ctx.moveTo(posX.x, margin.top);
                ctx.lineTo(posX.x, margin.top + chartHeight);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(margin.left, posY.y);
                ctx.lineTo(margin.left + chartWidth, posY.y);
                ctx.stroke();
            }
            
            // 绘制坐标轴
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top + chartHeight);
            ctx.lineTo(margin.left + chartWidth, margin.top + chartHeight);
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left, margin.top + chartHeight);
            ctx.stroke();
            
            // 标签
            ctx.fillStyle = '#333';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('x', canvas.width - 30, margin.top + chartHeight + 40);
            ctx.fillText(yMin.toFixed(1), margin.left, margin.top + chartHeight + 20);
            ctx.fillText(yMax.toFixed(1), margin.left, margin.top + 10);
            ctx.save();
            ctx.translate(25, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('y', 0, 0);
            ctx.restore();
            
            // 绘制数据点
            dataPoints.forEach(p => {
                const pos = toCanvas(p.x, p.y, xMin, xMax, yMin, yMax);
                ctx.fillStyle = '#667eea';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 4, 0, 2 * Math.PI);
                ctx.fill();
            });
            
            // 绘制回归线
            if (regressionLine) {
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.beginPath();
                const x1 = xMin;
                const y1 = regressionLine.predict(x1);
                const x2 = xMax;
                const y2 = regressionLine.predict(x2);
                const pos1 = toCanvas(x1, y1, xMin, xMax, yMin, yMax);
                const pos2 = toCanvas(x2, y2, xMin, xMax, yMin, yMax);
                ctx.moveTo(pos1.x, pos1.y);
                ctx.lineTo(pos2.x, pos2.y);
                ctx.stroke();
            }
        }

        function clearPlot() {
            dataPoints = [];
            regressionLine = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('r2Value').textContent = '-';
            document.getElementById('rmseValue').textContent = '-';
            document.getElementById('slopeValue').textContent = '-';
            document.getElementById('interceptValue').textContent = '-';
        }

        // 事件监听
        document.getElementById('regressionType').addEventListener('change', function() {
            document.getElementById('degreeControl').style.display = this.value === 'polynomial' ? 'block' : 'none';
        });

        document.getElementById('dataPoints').addEventListener('input', function() {
            document.getElementById('pointsDisplay').textContent = this.value;
        });

        document.getElementById('noise').addEventListener('input', function() {
            document.getElementById('noiseDisplay').textContent = this.value;
        });

        document.getElementById('degree').addEventListener('input', function() {
            document.getElementById('degreeDisplay').textContent = this.value;
        });

        // 初始化
        generateData();
        fitRegression();
    </script>
</body>
</html>
