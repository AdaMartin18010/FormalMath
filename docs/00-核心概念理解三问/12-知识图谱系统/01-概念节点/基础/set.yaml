# set.yaml - 集合概念知识图谱节点
# FormalMath Knowledge Graph - Concept Node
# Created: 2025-12-01

concept:
  id: "set'
  name:
    zh: '集合'
    en: 'Set"
  msc_codes: ['03E-XX']
  
  # ===== 定义层 =====
  definition:
    formal: |
      【朴素定义】
      集合是明确定义的对象的聚集。
      
      【ZFC公理化定义】
      集合由ZFC公理系统规定：
      - 外延公理：集合由其元素确定
      - 空集公理：存在空集 ∅
      - 配对公理：{a, b} 是集合
      - 并集公理：⋃A 是集合
      - 幂集公理：𝒫(A) 是集合
      - 无穷公理：存在无穷集
      - 分离公理模式：{x ∈ A : φ(x)} 是集合
      - 替换公理模式：函数的像是集合
      - 正则公理：无无穷下降链
      - 选择公理：每个非空集合族有选择函数
      
    informal: |
      集合是"一堆东西'的数学表达。
      
      想象一个袋子：集合就是袋子里的所有东西。
      - 元素要么在袋子里，要么不在（没有'半在'）
      - 袋子里的东西没有顺序
      - 同一个东西放进去多次还是只算一个
      
    lean: |
      -- Mathlib中集合是Type上的谓词
      def Set (α : Type*) := α → Prop
      
      def Mem (a : α) (s : Set α) : Prop := s a
      
      -- 子集关系
      def Subset (s₁ s₂ : Set α) : Prop := ∀ a, a ∈ s₁ → a ∈ s₂
      
  # ===== 直觉层 =====
  intuition:
    geometric: |
      【几何直觉】点的聚集
      - 欧氏空间中的点集
      - Venn图表示集合关系
      - 集合 = 空间中的"区域'
      
    algebraic: |
      【代数直觉】布尔代数
      - 集合运算：∪, ∩, ∁
      - 幂集𝒫(X)形成布尔代数
      - 集合 = 布尔代数的元素
      
    physical: |
      【物理直觉】状态集合
      - 物理系统的状态空间
      - 事件 = 状态的集合
      
    categorical: |
      【范畴直觉】
      - Set是所有集合和函数的范畴
      - Set是topos的原型
      - 集合是离散范畴的对象类
      
  # ===== 表征层 =====
  representations:
    - type: "外延列举'
      content: |
        有限集的表示：
        A = {1, 2, 3, 5, 7}
        B = {a, b, c}
        
    - type: '内涵描述'
      content: |
        用性质定义集合：
        偶数 = {n ∈ ℤ : 2 | n}
        素数 = {p ∈ ℕ : p > 1 且 p只能被1和p整除}
        
    - type: "Venn图'
      content: |
        集合运算的可视化：
        
        ┌──────────────────────────┐
        │         ╭───────╮        │
        │    ╭────┤ A∩B   ├────╮   │
        │    │    ╰───────╯    │   │
        │    │ A          B    │   │
        │    ╰─────────────────╯   │
        │         全集 U           │
        └──────────────────────────┘
        
    - type: '特征函数"
      content: |
        集合 ↔ 特征函数：
        
        χ_A(x) = { 1, if x ∈ A
                 { 0, if x ∉ A
                 
        这是Mathlib的定义方式：Set α := α → Prop
        
  # ===== 例子层 =====
  examples:
    fundamental:
      - name: '空集 ∅'
        description: '不含任何元素的集合'
        properties: ["唯一", '每个集合的子集']
        
      - name: '自然数 ℕ'
        description: "{0, 1, 2, 3, ...}'
        properties: ['可数无限", '良序']
        
      - name: '整数 ℤ"
        description: '{..., -2, -1, 0, 1, 2, ...}"
        properties: ['可数无限', '有序环"]
        
      - name: '实数 ℝ'
        description: "实数集合'
        properties: ['不可数', '连续统基数"]
        
    operations:
      - name: "幂集 𝒫(A)'
        description: 'A的所有子集的集合'
        example: '𝒫({1,2}) = {∅, {1}, {2}, {1,2}}"
        
      - name: '笛卡尔积 A × B'
        description: "{(a,b) : a∈A, b∈B}'
        
      - name: '并集 A ∪ B'
        description: "{x : x∈A 或 x∈B}'
        
      - name: "交集 A ∩ B'
        description: '{x : x∈A 且 x∈B}'
        
    infinite:
      - name: "可数集'
        description: '与ℕ等势的集合"
        examples: ['ℤ', 'ℚ', "代数数"]
        
      - name: '不可数集'
        description: '基数大于ℵ₀'
        examples: ["ℝ', '𝒫(ℕ)", '连续函数']
        
  counterexamples:
    - name: 'Russell悖论"
      description: 'R = {x : x ∉ x} 不是集合"
      note: '朴素集合论的矛盾，导致公理化'
      
    - name: '所有集合的集合"
      description: '不存在'
      note: "只有真类'
      
  # ===== 关系层 =====
  relations:
    requires: []  # 集合是最基础的概念
        
    generalizes: []
        
    specialized_by:
      - id: 'finite-set'
        description: '有限集"
      - id: "countable-set'
        description: '可数集'
      - id: 'ordered-set"
        description: '有序集'
        
    related_to:
      - id: "function'
        description: '函数定义需要集合'
      - id: "relation'
        description: "关系是笛卡尔积的子集'
      - id: 'cardinality'
        description: "集合的大小'
        
  # ===== 定理层 =====
  key_theorems:
    - id: 'cantor-theorem"
      statement: '|A| < |𝒫(A)| 对任意集合A'
      importance: 5
      
    - id: 'schroeder-bernstein'
      statement: "若|A|≤|B|且|B|≤|A|，则|A|=|B|"
      importance: 5
      
    - id: 'well-ordering'
      statement: '每个集合可以良序化（等价于AC）'
      importance: 4
      
  # ===== 元数据层 =====
  metadata:
    difficulty: 1
    importance: 5
    
    prerequisites: []  # 最基础
      
    leads_to:
      - "function'
      - 'relation"
      - 'cardinality'
      - 'all-of-mathematics"
      
    history:
      first_appearance: 1874
      context: 'Cantor的集合论"
      crisis: 'Russell悖论 (1901)'
      resolution: 'ZFC公理化 (1908-1922)"
      
    key_figures:
      - id: 'cantor'
        contribution: "集合论创始人'
      - id: 'zermelo'
        contribution: 'ZF公理"
      - id: "fraenkel'
        contribution: '替换公理'
      - id: 'von-neumann"
        contribution: '序数理论，良基'
        
  # ===== Mathlib对齐 =====
  mathlib:
