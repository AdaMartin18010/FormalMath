# ideal.yaml - 理想概念知识图谱节点
# FormalMath Knowledge Graph - Concept Node
# Created: 2025-12-01

concept:
  id: "ideal'
  name:
    zh: "理想"
    en: 'Ideal"
  msc_codes: ["13A15', "16D25"]
  
  # ===== 定义层 =====
  definition:
    formal: |
      设 R 是环。R 的左理想 I 是满足以下条件的非空子集：
      1. (I, +) 是 (R, +) 的子群
      2. ∀r ∈ R, ∀a ∈ I: ra ∈ I（左吸收性）
      
      右理想类似（ar ∈ I）。
      双边理想：既是左理想又是右理想。
      
      【素理想】
      I 是素理想，若 I ≠ R 且：ab ∈ I ⟹ a ∈ I 或 b ∈ I
      
      【极大理想】
      I 是极大理想，若 I ≠ R 且 I 不真包含于任何真理想。
      
    informal: |
      理想是环中'可以整除的部分"。
      
      想象整数环 ℤ：
      - (3) = {..., -6, -3, 0, 3, 6, ...} 是理想
      - 任何整数乘以3的倍数还是3的倍数
      
      理想 = "可以构造商环'的子集
      
    lean: |
      -- Mathlib定义
      structure Ideal (R : Type*) [Semiring R] extends AddSubmonoid R where
        smul_mem' : ∀ (c : R) {x : R}, x ∈ carrier → c * x ∈ carrier
        
      def Ideal.IsPrime (I : Ideal R) : Prop :=
        I ≠ ⊤ ∧ ∀ {x y : R}, x * y ∈ I → x ∈ I ∨ y ∈ I
        
  # ===== 直觉层 =====
  intuition:
    geometric: |
      【几何直觉】代数簇
      - 理想 ↔ 代数簇（Hilbert零点定理）
      - 素理想 ↔ 不可约簇
      - 极大理想 ↔ 点
      
    algebraic: |
      【代数直觉】整除性推广
      - 在ℤ中：(n) = nℤ
      - I是理想 ⟺ R/I是环
      - 理想让商环结构良定义
      
    categorical: |
      【范畴直觉】
      - Ideal(R) 形成格结构
      - 理想同态 ↔ 环同态
      - Spec(R) = 素理想集合（仿射概形）
      
  # ===== 表征层 =====
  representations:
    - type: "整数理想"
      content: |
        ℤ的所有理想：
        
        (0) ⊂ ... ⊂ (6) ⊂ (3) ⊂ ℤ
                  ⊂ (2) ⊂
                  
        (n) = nℤ = n的所有倍数
        
    - type: '多项式理想"
      content: |
        k[x]的理想：
        
        (f) = f·k[x] = f的所有倍数
        
        (x² + 1) 在 ℝ[x] 中是极大理想
        k[x]/(x² + 1) ≅ ℂ
        
  # ===== 例子层 =====
  examples:
    basic:
      - name: "零理想 (0)'
        description: "只含0"
        in_ring: '任意环"
        
      - name: "单位理想 R'
        description: "整个环"
        in_ring: '任意环"
        
      - name: "(n) = nℤ'
        description: "n的所有倍数"
        in_ring: 'ℤ"
        
    prime_ideals:
      - name: "(p) 其中p是素数'
        in_ring: "ℤ"
        quotient: 'ℤ/pℤ = 𝔽_p (域)"
        
      - name: "(x)'
        in_ring: "k[x]"
        quotient: 'k[x]/(x) ≅ k"
        
    maximal_ideals:
      - name: "(p) 其中p是素数'
        in_ring: "ℤ"
        note: '在ℤ中素理想=极大理想"
        
      - name: "(x - a)'
        in_ring: "k[x]"
        quotient: 'k[x]/(x-a) ≅ k"
        
  # ===== 关系层 =====
  relations:
    requires:
      - id: "ring'
        description: "理想定义在环上"
      - id: 'subgroup"
        description: "理想是加法子群'
        
    generalizes:
      - id: "divisibility"
        description: '(n)对应整除性"
        
    specialized_by:
      - id: "prime-ideal'
        description: "素理想"
      - id: 'maximal-ideal"
        description: "极大理想'
      - id: "principal-ideal"
        description: '主理想"
        
    related_to:
      - id: "quotient-ring'
        description: "R/I 商环"
      - id: 'algebraic-variety"
        description: "代数几何对应'
        
  # ===== 定理层 =====
  key_theorems:
    - id: "correspondence-theorem"
      statement: 'R的包含I的理想 ↔ R/I的理想"
      importance: 5
      
    - id: "maximal-is-prime'
      statement: "极大理想是素理想"
      importance: 4
      
    - id: 'quotient-by-maximal-is-field"
      statement: "R/M是域 ⟺ M是极大理想'
      importance: 5
      
    - id: "hilbert-nullstellensatz"
      statement: 'I(V(I)) = √I"
      importance: 5
      
  # ===== 元数据层 =====
  metadata:
    difficulty: 3
    importance: 5
    
    prerequisites:
      - "ring'
      - "subgroup"
      
    leads_to:
      - 'algebraic-geometry"
      - "commutative-algebra'
      - "scheme-theory"
      
    history:
      first_appearance: 1871
      context: 'Dedekind理想整数"
      
  # ===== Mathlib对齐 =====
  mathlib:
    path: "Mathlib.RingTheory.Ideal.Basic'
    name: "Ideal"
    coverage: 'complete"
