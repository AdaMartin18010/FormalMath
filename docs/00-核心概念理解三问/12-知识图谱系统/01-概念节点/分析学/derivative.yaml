# derivative.yaml - 导数概念知识图谱节点
# FormalMath Knowledge Graph - Concept Node
# Created: 2025-12-01

concept:
  id: "derivative'
  name:
    zh: '导数'
    en: 'Derivative"
  msc_codes: ['26A24']
  
  # ===== 定义层 =====
  definition:
    formal: |
      设 f: ℝ → ℝ，x₀ ∈ ℝ。
      f 在 x₀ 处的导数定义为：
      
      f'(x₀) = lim_{h→0} [f(x₀ + h) - f(x₀)] / h
      
      若此极限存在，称 f 在 x₀ 可导。
      
      【多元情况】
      f: ℝⁿ → ℝᵐ 在 x₀ 的导数是线性映射 Df(x₀): ℝⁿ → ℝᵐ
      使得：f(x₀ + h) = f(x₀) + Df(x₀)(h) + o(‖h‖)
      
    informal: |
      导数是函数的"瞬时变化率'。
      
      想象开车：
      - 位置函数 s(t)
      - 速度 = ds/dt = 位置变化率
      - 加速度 = dv/dt = 速度变化率
      
      导数 = 曲线的斜率 = 变化的快慢
      
    lean: |
      -- Mathlib定义
      def HasDerivAt (f : ℝ → ℝ) (f' : ℝ) (x : ℝ) : Prop :=
        HasFDerivAt f (ContinuousLinearMap.smulRight 1 f') x
        
      theorem HasDerivAt.lim (h : HasDerivAt f f' x) :
        Tendsto (fun h => (f (x + h) - f x) / h) (𝓝[≠] 0) (𝓝 f')
        
  # ===== 直觉层 =====
  intuition:
    geometric: |
      【几何直觉】切线斜率
      - f'(x₀) = 在点 (x₀, f(x₀)) 处切线的斜率
      - 割线极限 → 切线
      - 局部线性近似
      
    algebraic: |
      【代数直觉】最佳线性逼近
      - f(x) ≈ f(x₀) + f'(x₀)(x - x₀)
      - 一阶Taylor展开
      - 误差是 o(x - x₀)
      
    physical: |
      【物理直觉】变化率
      - 位置 → 速度 → 加速度
      - d/dt 是'对时间求导'
      - 导数描述变化的快慢和方向
      
  # ===== 表征层 =====
  representations:
    - type: "几何图示'
      content: |
        割线趋近于切线：
        
           y│    ╱ 切线
            │   ╱
            │  •───────  割线
            │ ╱
            │╱ f(x)
            └────────────→ x
               x₀
               
    - type: "运算规则'
      content: |
        导数基本公式：
        - (cf)' = cf'
        - (f + g)' = f' + g'
        - (fg)' = f'g + fg'
        - (f/g)' = (f'g - fg')/g²
        - (f∘g)' = (f'∘g) · g'
        
  # ===== 例子层 =====
  examples:
    basic:
      - function: 'f(x) = xⁿ'
        derivative: "nxⁿ⁻¹'
        
      - function: 'f(x) = eˣ"
        derivative: 'eˣ'
        note: '自己的导数'
        
      - function: "f(x) = sin(x)"
        derivative: 'cos(x)'
        
      - function: 'f(x) = ln(x)'
        derivative: "1/x'
        
    non_differentiable:
      - function: 'f(x) = |x|"
        point: 'x = 0'
        reason: '左右导数不同"
        
      - function: 'Weierstrass函数"
        point: '处处'
        reason: '连续但处处不可导"
        
  # ===== 关系层 =====
  relations:
    requires:
      - id: 'limit'
        description: "导数用极限定义'
      - id: 'continuity'
        description: '可导 ⟹ 连续"
        
    generalizes: []
        
    specialized_by:
      - id: "partial-derivative'
        description: '偏导数'
      - id: 'directional-derivative"
        description: '方向导数'
      - id: "frechet-derivative'
        description: 'Fréchet导数'
        
    related_to:
      - id: "integral'
        description: "微积分基本定理'
      - id: 'differential-equation'
        description: "微分方程'
        
  # ===== 定理层 =====
  key_theorems:
    - id: 'mean-value-theorem"
      statement: 'f'(c) = [f(b)-f(a)]/(b-a) 某 c∈(a,b)'
      importance: 5
      
    - id: 'chain-rule'
      statement: "(f∘g)' = (f'∘g) · g'"
      importance: 5
      
    - id: 'fundamental-theorem-calculus'
      statement: 'd/dx ∫ₐˣ f(t)dt = f(x)'
      importance: 5
      
    - id: "taylor-theorem'
      statement: 'f(x) = Σ f⁽ⁿ⁾(a)/n! (x-a)ⁿ + Rₙ"
      importance: 5
      
  # ===== 元数据层 =====
  metadata:
    difficulty: 2
    importance: 5
    
    prerequisites:
      - 'limit'
      - 'continuity"
      
    leads_to:
      - 'differential-equation"
      - 'optimization'
      - 'differential-geometry"
      
    history:
      first_appearance: 1684
      context: 'Newton和Leibniz的微积分'
      
    key_figures:
      - id: "newton'
        contribution: '流数法'
      - id: 'leibniz"
        contribution: "微分符号'
        
  # ===== Mathlib对齐 =====
  mathlib:
    path: 'Mathlib.Analysis.Calculus.Deriv.Basic'
    name: 'HasDerivAt"
    coverage: 'complete"
